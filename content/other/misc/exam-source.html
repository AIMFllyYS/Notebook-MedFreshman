<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUST 真题资源包 · 统一中心</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hlTheme">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0d12;--bg-grad1:#131119;--bg-grad2:#0c0a0f;
  --text:#e8e2d8;--text-secondary:#a09890;--text-muted:#6b6358;
  --border:rgba(200,180,140,0.08);
  --card-bg:rgba(255,250,240,0.025);--card-border:rgba(200,180,140,0.1);
  --accent:#c8a062;--accent-light:#dcb878;--accent-dim:rgba(200,160,98,0.15);
  --sidebar-bg:#0c0a10;--sidebar-text:#a09890;
  --content-bg:#0f0d12;--code-bg:#1a1620;
  --table-border:rgba(200,180,140,0.1);--table-stripe:rgba(200,180,140,0.02);
  --header-bg:#0a0810;--header-text:#c8c0b0;
  --scrollbar-thumb:#3a3428;--scrollbar-track:#0c0a10;
  --tile-glow:rgba(200,160,98,0.08);
  --splash-bg:#08060c;--splash-accent:#c8a062;
}
body.light{
  --bg:#f5f1ea;--bg-grad1:#faf6ef;--bg-grad2:#f0ebe2;
  --text:#2a2520;--text-secondary:#5a5248;--text-muted:#8a8278;
  --border:rgba(60,50,40,0.1);
  --card-bg:rgba(0,0,0,0.025);--card-border:rgba(60,50,40,0.12);
  --accent:#8b6d3a;--accent-light:#a0824a;--accent-dim:rgba(139,109,58,0.12);
  --sidebar-bg:#ede8e0;--sidebar-text:#5a5248;
  --content-bg:#f5f1ea;--code-bg:#e8e2d8;
  --table-border:rgba(60,50,40,0.12);--table-stripe:rgba(60,50,40,0.03);
  --header-bg:#e8e2d8;--header-text:#3a3530;
  --scrollbar-thumb:#c8c0b0;--scrollbar-track:#ede8e0;
  --tile-glow:rgba(139,109,58,0.1);
  --splash-bg:#f5f1ea;--splash-accent:#8b6d3a;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);transition:background .4s,color .4s}

/* ===== Splash ===== */
#splash{position:fixed;inset:0;background:var(--splash-bg);display:flex;align-items:center;justify-content:center;z-index:9999;overflow:hidden;transition:background .4s}
#splash.fade-out{animation:splashOut .7s ease forwards}
@keyframes splashOut{to{opacity:0;pointer-events:none}}
.splash-content{text-align:center;position:relative;z-index:2;user-select:none}
.splash-school{font-size:13px;color:var(--text-muted);letter-spacing:6px;text-transform:uppercase;margin-bottom:24px;opacity:0;animation:splashSlide .5s .2s ease forwards}
.splash-title{font-size:34px;font-weight:800;color:var(--splash-accent);letter-spacing:3px;margin-bottom:18px;opacity:0;animation:splashSlide .5s .45s ease forwards}
.splash-wish{font-size:17px;color:var(--text-secondary);letter-spacing:1px;opacity:0;animation:splashSlide .5s .7s ease forwards;display:flex;align-items:center;justify-content:center;gap:8px}
.splash-wish svg{width:20px;height:20px;stroke:var(--splash-accent)}
.particle-char{position:absolute;top:50%;left:50%;color:var(--splash-accent);font-size:20px;font-weight:800;pointer-events:none;animation:pFly 1s cubic-bezier(0,0.1,0.2,1) forwards}
@keyframes pFly{0%{transform:translate(-50%,-50%) scale(1.1);opacity:1}60%{opacity:.5}100%{transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty))) rotate(var(--rot)) scale(.1);opacity:0}}
@keyframes splashSlide{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}

/* ===== Home Page ===== */
#home{display:flex;flex-direction:column;height:100vh;position:relative;overflow:hidden;background:radial-gradient(ellipse at 30% 20%,var(--bg-grad1) 0%,var(--bg) 50%,var(--bg-grad2) 100%)}
#home.hidden{display:none}
.bg-danmaku{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.danmaku-item{position:absolute;white-space:nowrap;font-weight:600;animation:danmakuScroll linear forwards;will-change:transform}
@keyframes danmakuScroll{from{transform:translateX(100vw)}to{transform:translateX(-100%)}}
.bg-meteor{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.meteor-item{position:absolute;top:-30px;opacity:0;animation:meteorFall linear forwards;will-change:transform,opacity}
@keyframes meteorFall{0%{opacity:0;transform:translateY(-30px) rotate(0deg)}10%{opacity:.35}90%{opacity:.25}100%{opacity:0;transform:translateY(100vh) rotate(360deg)}}
.home-content{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.home-header{text-align:center;margin-bottom:28px}
.home-header h1{font-size:30px;font-weight:800;color:var(--text);letter-spacing:1px;margin-bottom:4px}
.home-header h1 span{color:var(--accent)}
.home-header p{font-size:13px;color:var(--text-muted);letter-spacing:2px}
.bento-grid{display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(2,minmax(0,1fr));gap:14px;max-width:1100px;width:100%;height:min(420px,calc(100vh - 220px))}
.bento-tile{
  position:relative;border-radius:14px;cursor:pointer;overflow:hidden;
  background:var(--card-bg);border:1px solid var(--card-border);
  backdrop-filter:blur(12px);padding:20px;display:flex;flex-direction:column;
  justify-content:space-between;transition:border-color .3s,box-shadow .3s;
}
.bento-tile:hover{border-color:var(--tile-accent);box-shadow:0 8px 32px rgba(0,0,0,.2),0 0 24px var(--tile-glow)}
.bento-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--tile-accent),transparent);opacity:0;transition:opacity .3s}
.bento-tile:hover::before{opacity:.8}
.tile-glow-blob{position:absolute;top:-40%;right:-20%;width:180px;height:180px;border-radius:50%;background:var(--tile-accent);opacity:.04;filter:blur(50px);transition:opacity .4s}
.bento-tile:hover .tile-glow-blob{opacity:.1}
.tile-top{display:flex;align-items:flex-start;justify-content:space-between;position:relative;z-index:1}
.tile-icon{width:36px;height:36px;color:var(--tile-accent);flex-shrink:0;transition:transform .3s cubic-bezier(.22,1,.36,1)}
.bento-tile:hover .tile-icon{transform:scale(1.1)}
.tile-icon svg{width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.tile-count{font-size:11px;color:var(--text-muted);text-align:right;line-height:1.4}
.tile-count strong{display:block;font-size:22px;color:var(--tile-accent);font-weight:700}
.tile-bottom{position:relative;z-index:1}
.tile-name{font-size:16px;font-weight:700;color:var(--text);margin-bottom:2px}
.tile-sub{font-size:11px;color:var(--text-muted);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tile-links{display:flex;gap:8px;align-items:center}
.tile-enter{background:var(--tile-accent);color:#fff;border:none;padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .2s}
.tile-enter:hover{opacity:.85}
.tile-sep{font-size:11px;color:var(--text-muted);text-decoration:none;transition:color .2s;display:flex;align-items:center;gap:3px}
.tile-sep:hover{color:var(--tile-accent)}
.tile-sep svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2}
.bento-tile.large{grid-column:span 2;grid-row:span 2}
.bento-tile.large .tile-icon{width:48px;height:48px}
.bento-tile.large .tile-name{font-size:20px}
.bento-tile.large .tile-sub{font-size:12px}
.bento-tile.wide-l{grid-column:span 2;grid-row:span 1}
.bento-tile.wide-r{grid-column:span 2;grid-row:span 1}

/* ===== Browse Page ===== */
#browse{display:none;flex-direction:row;height:100vh;overflow:hidden}
#browse.active{display:flex}
#sidebar{width:280px;min-width:280px;background:var(--sidebar-bg);color:var(--sidebar-text);display:flex;flex-direction:column;transition:transform .3s,background .4s;z-index:100}
#sidebar.collapsed{transform:translateX(-280px);margin-right:-280px}
.sidebar-header{padding:14px 16px;background:rgba(0,0,0,.15);font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.sidebar-header svg{width:16px;height:16px;stroke:var(--header-text);fill:none;stroke-width:2;flex-shrink:0}
.sidebar-header .back-btn{background:rgba(255,255,255,.08);border:none;color:var(--header-text);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;transition:background .2s;white-space:nowrap;display:flex;align-items:center;gap:4px}
.sidebar-header .back-btn:hover{background:rgba(255,255,255,.16)}
.sidebar-header .back-btn svg{width:14px;height:14px}
#file-tree{flex:1;overflow-y:auto;padding:8px 0;font-size:13px}
#file-tree::-webkit-scrollbar{width:4px}
#file-tree::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:2px}
#file-tree::-webkit-scrollbar-track{background:var(--scrollbar-track)}
.tree-item{display:flex;align-items:center;padding:5px 12px;padding-left:calc(12px + var(--level,0) * 16px);cursor:pointer;user-select:none;transition:background .15s,border-left-color .15s;border-left:2px solid transparent;gap:5px;min-height:28px;color:var(--sidebar-text)}
.tree-item:hover{background:rgba(255,255,255,.05);border-left-color:var(--accent)}
body.light .tree-item:hover{background:rgba(0,0,0,.04)}
.tree-item.active{background:var(--accent-dim);color:var(--accent);border-left-color:var(--accent);font-weight:600}
.tree-item .tree-icon{width:14px;height:14px;flex-shrink:0;color:var(--text-muted)}
.tree-item.active .tree-icon{color:var(--accent)}
.tree-item .tree-icon svg{width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:1.5}
.tree-item .name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.tree-item.folder{font-weight:600;color:var(--header-text)}
.tree-badge{flex-shrink:0;background:var(--accent-dim);color:var(--accent);font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600}
.tree-children{display:none}
.tree-children.open{display:block}
.tree-item.file.stagger{opacity:0;transform:translateX(-10px);animation:treeIn .3s cubic-bezier(.22,1,.36,1) forwards}
@keyframes treeIn{to{opacity:1;transform:translateX(0)}}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#header{background:var(--header-bg);color:var(--header-text);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;font-size:14px;transition:background .4s}
#header .title{font-weight:600;display:flex;align-items:center;gap:8px}
#header .actions{display:flex;gap:8px;align-items:center}
#header button{background:rgba(255,255,255,.08);border:none;color:var(--header-text);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;transition:background .2s;display:flex;align-items:center;gap:6px}
body.light #header button{background:rgba(0,0,0,.06)}
#header button:hover{background:rgba(255,255,255,.16)}
body.light #header button:hover{background:rgba(0,0,0,.1)}
#header button svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}
#content{flex:1;overflow-y:auto;padding:24px 32px;background:var(--content-bg);color:var(--text);transition:background .4s,color .4s}
#content::-webkit-scrollbar{width:6px}
#content::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:3px}
#content h1{font-size:1.8em;margin-bottom:.5em;color:var(--accent)}
#content h2{font-size:1.4em;margin:1.2em 0 .5em;padding-bottom:4px;border-bottom:2px solid var(--accent)}
#content h3{font-size:1.15em;margin:1em 0 .4em;color:var(--text)}
#content p{margin:.6em 0;line-height:1.7;color:var(--text)}
#content table{border-collapse:collapse;width:100%;margin:1em 0;font-size:.9em}
#content th{background:var(--accent);color:#fff;padding:8px 12px;text-align:left}
#content td{padding:6px 12px;border:1px solid var(--table-border);color:var(--text)}
#content tr:nth-child(even){background:var(--table-stripe)}
#content code{background:var(--code-bg);padding:2px 6px;border-radius:3px;font-size:.9em;color:var(--text)}
#content pre{background:var(--code-bg);padding:12px 16px;border-radius:6px;overflow-x:auto;margin:1em 0}
#content pre code{background:none;padding:0}
#content a{color:var(--accent-light)}
#content blockquote{border-left:4px solid var(--accent);padding:8px 16px;margin:1em 0;background:var(--table-stripe);color:var(--text-secondary)}
#content hr{border:none;border-top:1px solid var(--border);margin:1.5em 0}
#content ul,#content ol{padding-left:24px;margin:8px 0;color:var(--text)}
#content li{margin:4px 0}
#content strong{color:var(--text)}
.reveal-item{opacity:0;transform:translateY(12px);transition:opacity .4s ease,transform .4s ease}
.reveal-item.revealed{opacity:1;transform:translateY(0)}
#hamburger{display:none}
#overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:99}
#overlay.show{display:block}
@media(max-width:768px){
  #sidebar{position:fixed;top:0;left:0;height:100%;z-index:100}
  #sidebar.collapsed{transform:translateX(-280px);margin-right:0}
  #hamburger{display:inline-flex}
  #content{padding:16px}
  .bento-grid{grid-template-columns:1fr;grid-template-rows:auto;height:auto}
  .bento-tile.large,.bento-tile.wide-l,.bento-tile.wide-r{grid-column:span 1;grid-row:span 1}
  .home-header h1{font-size:24px}
}
</style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <div class="splash-content">
    <div class="splash-school">华中科技大学 &middot; HUST</div>
    <div class="splash-title" id="splashTitle">真题资源包 · 统一中心</div>
    <div class="splash-wish">
      <svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
      考试顺利！逢考必过！
    </div>
  </div>
</div>

<!-- Home Page -->
<div id="home">
  <div class="bg-danmaku" id="danmakuLayer"></div>
  <div class="bg-meteor" id="meteorLayer"></div>
  <div class="home-content">
    <div class="home-header">
      <h1>HUST <span>真题资源包</span></h1>
      <p>华中科技大学 · 考试复习资源统一中心</p>
    </div>
    <div class="bento-grid" id="cardGrid"></div>
  </div>
</div>

<!-- Browse Page -->
<div id="browse">
  <div id="overlay"></div>
  <div id="sidebar">
    <div class="sidebar-header">
      <button class="back-btn" onclick="goHome()">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        首页
      </button>
      <span id="sidebarSubject">科目</span>
    </div>
    <div id="file-tree"></div>
  </div>
  <div id="main">
    <div id="header">
      <div class="title">
        <button id="hamburger" onclick="toggleSidebar()">
          <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <span id="headerTitle">HUST 真题资源包</span>
      </div>
      <div class="actions">
        <button onclick="toggleTheme()" id="themeBtn">
          <svg id="themeIcon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <span id="themeLabel">浅色模式</span>
        </button>
      </div>
    </div>
    <div id="content"><p style="text-align:center;color:var(--text-muted);margin-top:100px">请从左侧文件树选择文件查看</p></div>
  </div>
</div>

<script>

var ALL_CONTENTS = {

function buildHome(){
  var grid = document.getElementById('cardGrid');
  var html = '';
  SUBJECTS.forEach(function(s, i){
    var fileCount = Object.keys(ALL_CONTENTS[s.key]).length;
    var folderCount = new Set(Object.keys(ALL_CONTENTS[s.key]).map(function(k){return k.split('/')[0];})).size;
    var sizeClass = s.size === 'large' ? 'large' : (s.size === 'wide-l' ? 'wide-l' : 'wide-r');
    html += '<div class="bento-tile '+sizeClass+'" style="--tile-accent:'+s.accent+';--tile-glow:'+s.glow+'" data-subject="'+s.key+'" onclick="enterSubject(\''+s.key+'\')">';
    html += '<div class="tile-glow-blob"></div>';
    html += '<div class="tile-top">';
    html += '<div class="tile-icon">'+SVG_ICONS[s.svg]+'</div>';
    html += '<div class="tile-count"><strong>'+fileCount+'</strong>文件<br>'+folderCount+'分类</div>';
    html += '</div>';
    html += '<div class="tile-bottom">';
    html += '<div class="tile-name">'+s.name+'</div>';
    html += '<div class="tile-sub">'+s.subtitle+'</div>';
    html += '<div class="tile-links">';
    html += '<button class="tile-enter" onclick="event.stopPropagation();enterSubject(\''+s.key+'\')">进入浏览</button>';
    html += '<a class="tile-sep" href="'+s.independent+'" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">独立版 '+SVG_ICONS.external+'</a>';
    html += '</div></div></div>';
  });
  grid.innerHTML = html;
  // GSAP stagger entrance
  if(typeof gsap !== 'undefined'){
    gsap.fromTo('.bento-tile',{opacity:0,y:30,scale:0.96},{opacity:1,y:0,scale:1,duration:0.6,stagger:0.1,ease:'power3.out',delay:0.3});
  } else {
    grid.querySelectorAll('.bento-tile').forEach(function(c,i){
      c.style.opacity='0';c.style.transform='translateY(30px)';
      setTimeout(function(){c.style.transition='opacity .5s,transform .5s';c.style.opacity='1';c.style.transform='';},300+i*100);
    });
  }
  // 3D tilt
  grid.querySelectorAll('.bento-tile').forEach(function(tile){
    tile.addEventListener('mousemove', function(e){
      var rect = tile.getBoundingClientRect();
      var x = (e.clientX - rect.left) / rect.width - 0.5;
      var y = (e.clientY - rect.top) / rect.height - 0.5;
      tile.style.transform = 'perspective(800px) rotateX('+(-y*6)+'deg) rotateY('+(x*6)+'deg) scale(1.02)';
    });
    tile.addEventListener('mouseleave', function(){tile.style.transform='';});
  });
}

    openFile('README.md', s.key);
    var firstFile = fileTree.querySelector('.tree-item.file');
    if(firstFile) firstFile.classList.add('active');
  }
}

function goHome(){
  document.getElementById('browse').classList.remove('active');
  document.getElementById('home').classList.remove('hidden');
  currentSubject = null;
}

function buildTree(files){
  var root = {children:{}, files:{}};
  for(var path in files){
    var parts = path.split('/');
    var node = root;
    for(var i=0;i<parts.length-1;i++){
      if(!node.children[parts[i]]) node.children[parts[i]] = {children:{}, files:{}};
      node = node.children[parts[i]];
    }
    node.files[parts[parts.length-1]] = files[path];
  }
  return root;
}

function countNodeFiles(node){
  var c = Object.keys(node.files).length;
  for(var k in node.children) c += countNodeFiles(node.children[k]);
  return c;
}

function renderTree(node, container, basePath, level){
  level = level || 0;
  var folderNames = Object.keys(node.children).sort(function(a,b){
    var aY = /^\d/.test(a), bY = /^\d/.test(b);
    if(aY && !bY) return -1;
    if(!aY && bY) return 1;
    return a.localeCompare(b,'zh');
  });
  folderNames.forEach(function(name){
    var folderDiv = document.createElement('div');
    folderDiv.className = 'tree-item folder';
    folderDiv.style.setProperty('--level', level);
    var childContainer = document.createElement('div');
    childContainer.className = 'tree-children';
    var fullPath = basePath ? basePath+'/'+name : name;
    var fc = countNodeFiles(node.children[name]);
    folderDiv.innerHTML = '<span class="tree-icon">'+SVG_ICONS.folder+'</span><span class="name">'+name+'</span>'+(fc>0?'<span class="tree-badge">'+fc+'</span>':'');
    folderDiv.addEventListener('click', function(e){
      e.stopPropagation();
      folderDiv.classList.toggle('open');
      childContainer.classList.toggle('open');
    });
    container.appendChild(folderDiv);
    container.appendChild(childContainer);
    renderTree(node.children[name], childContainer, fullPath, level+1);
  });
  var fileNames = Object.keys(node.files).sort();
  fileNames.forEach(function(name){
    var fileDiv = document.createElement('div');
    fileDiv.className = 'tree-item file stagger';
    fileDiv.style.setProperty('--level', level);
    fileDiv.style.animationDelay = (_staggerIdx++ * 26)+'ms';
    var fullPath = basePath ? basePath+'/'+name : name;
    fileDiv.innerHTML = '<span class="tree-icon">'+SVG_ICONS.file+'</span><span class="name">'+name+'</span>';
    fileDiv.addEventListener('click', function(e){
      e.stopPropagation();
      document.querySelectorAll('.tree-item.active').forEach(function(el){el.classList.remove('active');});
      fileDiv.classList.add('active');
      openFile(fullPath, currentSubject.key);
    });
    container.appendChild(fileDiv);
  });
}

function openFile(path, subjectKey){
  var content = ALL_CONTENTS[subjectKey][path];
  var contentEl = document.getElementById('content');
  if(content){
    contentEl.innerHTML = marked.parse(content);
    document.querySelectorAll('#content pre code').forEach(function(block){hljs.highlightElement(block);});
    contentEl.scrollTop = 0;
    if(window.IntersectionObserver){
      var obs = new IntersectionObserver(function(entries){
        entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('revealed');obs.unobserve(e.target);}});
      }, {threshold:0.05});
      contentEl.querySelectorAll('h1,h2,h3,h4,p,table,blockquote,ul,ol,pre').forEach(function(el){el.classList.add('reveal-item');obs.observe(el);});
    }
  }
}

function toggleTheme(){
  var isLight = document.body.classList.toggle('light');
  var icon = document.getElementById('themeIcon');
  var label = document.getElementById('themeLabel');
  if(isLight){
    icon.innerHTML = '<circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42m12.72-12.72l1.42-1.42"/>';
    label.textContent = '深色模式';
  } else {
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    label.textContent = '浅色模式';
  }
  var hl = document.getElementById('hlTheme');
  if(hl) hl.href = isLight
    ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css'
    : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css';
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('collapsed');
  document.getElementById('overlay').classList.toggle('show');
}

document.getElementById('overlay').addEventListener('click', toggleSidebar);

buildHome();
initDanmaku();

// Splash
(function(){
  var splash = document.getElementById('splash');
  setTimeout(function(){
    var title = document.getElementById('splashTitle');
    if(title){
      title.textContent.split('').forEach(function(ch){
        for(var j=0;j<4;j++){
          var p = document.createElement('span');
          p.className = 'particle-char'; p.textContent = ch;
          p.style.setProperty('--tx', (Math.random()*900-450)+'px');
          p.style.setProperty('--ty', (Math.random()*700-350)+'px');
          p.style.setProperty('--rot', (Math.random()*720-360)+'deg');
          p.style.animationDelay = (Math.random()*0.25)+'s';
          splash.appendChild(p);
        }
      });
      title.style.opacity = '0';
    }
    setTimeout(function(){
      splash.classList.add('fade-out');
      setTimeout(function(){splash.style.display='none';}, 700);
    }, 900);
  }, 1600);
})();
</script>
