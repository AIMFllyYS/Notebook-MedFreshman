<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380" font-family="sans-serif" font-size="13">
  <title>双糖结构对比：麦芽糖 vs 蔗糖</title>

  <rect width="900" height="380" fill="white"/>

  <!-- Main title -->
  <text x="450" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">双糖结构对比：还原糖 vs 非还原糖</text>

  <!-- Divider -->
  <line x1="450" y1="40" x2="450" y2="360" stroke="#ddd" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ===== LEFT PANEL: Maltose (麦芽糖) ===== -->
  <text x="225" y="55" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a6496">麦芽糖 (Maltose)</text>
  <text x="225" y="70" text-anchor="middle" font-size="12" fill="#1a6496">alpha-1,4 苷键 | 还原糖</text>

  <!-- First glucose ring (left, donor) centered at (130, 160) -->
  <g transform="translate(130,160)">
    <polygon points="0,-45 39,-22 39,22 0,45 -39,22 -39,-22"
             fill="#e8f4f8" stroke="#1a6496" stroke-width="2"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="#1a6496">Glc</text>
    <!-- O in ring -->
    <text x="48" y="-20" font-size="12" fill="#e63946">O</text>
    <!-- C1 alpha: bond goes DOWN and connects to O of glycosidic bond -->
    <text x="42" y="28" font-size="10" fill="#555">C1</text>
    <!-- CH2OH up from C5 -->
    <line x1="0" y1="-45" x2="0" y2="-62" stroke="#555" stroke-width="1.5"/>
    <text x="0" y="-66" text-anchor="middle" font-size="11" fill="#555">CH2OH</text>
    <!-- Alpha annotation -->
    <text x="-46" y="28" font-size="10" fill="#e63946">alpha</text>
  </g>

  <!-- Glycosidic bond bridge alpha-1,4 -->
  <g>
    <!-- bond line from C1 of first Glc to C4 of second Glc -->
    <line x1="169" y1="178" x2="220" y2="178" stroke="#e63946" stroke-width="2.5"/>
    <text x="194" y="170" text-anchor="middle" font-size="10" fill="#e63946">O</text>
    <text x="194" y="195" text-anchor="middle" font-size="10" font-weight="bold" fill="#e63946">alpha-1,4</text>
  </g>

  <!-- Second glucose ring (right, acceptor) centered at (280, 160) -->
  <g transform="translate(290,160)">
    <polygon points="0,-45 39,-22 39,22 0,45 -39,22 -39,-22"
             fill="#e8f4f8" stroke="#1a6496" stroke-width="2"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="#1a6496">Glc</text>
    <text x="48" y="-20" font-size="12" fill="#e63946">O</text>
    <!-- C4 on left (bonded to glycosidic O) -->
    <text x="-48" y="28" font-size="10" fill="#555">C4</text>
    <!-- C1 with FREE anomeric OH: drawn below -->
    <text x="42" y="28" font-size="10" fill="#555">C1</text>
    <line x1="39" y1="22" x2="58" y2="42" stroke="#2d6a4f" stroke-width="2.2"/>
    <text x="65" y="52" font-size="12" font-weight="bold" fill="#2d6a4f">OH</text>
    <text x="65" y="66" font-size="10" fill="#2d6a4f">游离苷羟基</text>
    <!-- CH2OH up -->
    <line x1="0" y1="-45" x2="0" y2="-62" stroke="#555" stroke-width="1.5"/>
    <text x="0" y="-66" text-anchor="middle" font-size="11" fill="#555">CH2OH</text>
  </g>

  <!-- Maltose label below -->
  <rect x="50" y="240" width="350" height="60" rx="6" fill="#e8f8ee" stroke="#2d6a4f" stroke-width="1.5"/>
  <text x="225" y="261" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d6a4f">有游离苷羟基 (C1-OH)</text>
  <text x="225" y="279" text-anchor="middle" font-size="12" fill="#2d6a4f">能开环 → 具有变旋现象</text>
  <text x="225" y="297" text-anchor="middle" font-size="13" font-weight="bold" fill="#2d6a4f">→ 还原糖（银镜/斐林阳性）</text>

  <!-- ===== RIGHT PANEL: Sucrose (蔗糖) ===== -->
  <text x="675" y="55" text-anchor="middle" font-size="15" font-weight="bold" fill="#c62828">蔗糖 (Sucrose)</text>
  <text x="675" y="70" text-anchor="middle" font-size="12" fill="#c62828">alpha,beta-1,2 苷键 | 非还原糖</text>

  <!-- Glucose ring (left) at (580, 160) -->
  <g transform="translate(580,160)">
    <polygon points="0,-45 39,-22 39,22 0,45 -39,22 -39,-22"
             fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="#c62828">Glc</text>
    <text x="48" y="-20" font-size="12" fill="#e63946">O</text>
    <text x="42" y="28" font-size="10" fill="#555">C1</text>
    <text x="-46" y="28" font-size="10" fill="#e63946">alpha</text>
    <line x1="0" y1="-45" x2="0" y2="-62" stroke="#555" stroke-width="1.5"/>
    <text x="0" y="-66" text-anchor="middle" font-size="11" fill="#555">CH2OH</text>
    <!-- No free OH at C1 - show bond to glycosidic O -->
    <text x="48" y="38" font-size="10" fill="#888">C1 已成苷</text>
  </g>

  <!-- Glycosidic bond alpha,beta-1,2 -->
  <g>
    <line x1="619" y1="173" x2="670" y2="173" stroke="#c62828" stroke-width="2.5"/>
    <text x="644" y="165" text-anchor="middle" font-size="10" fill="#c62828">O</text>
    <text x="644" y="192" text-anchor="middle" font-size="10" font-weight="bold" fill="#c62828">alpha,beta-1,2</text>
  </g>

  <!-- Fructose ring (right, 5-membered) at (740, 160) -->
  <g transform="translate(745,160)">
    <!-- Pentagon for fructofuranose -->
    <polygon points="0,-45 43,-14 27,38 -27,38 -43,-14"
             fill="#fff3e0" stroke="#c62828" stroke-width="2"/>
    <text x="0" y="10" text-anchor="middle" font-size="11" fill="#c62828">Fru</text>
    <text x="50" y="-10" font-size="12" fill="#e63946">O</text>
    <!-- C2 (anomeric of fructose): no free OH -->
    <text x="-50" y="-10" font-size="10" fill="#555">C2</text>
    <text x="-58" y="4" font-size="10" fill="#888">C2 已成苷</text>
    <!-- beta -->
    <text x="-44" y="-22" font-size="10" fill="#e63946">beta</text>
    <!-- CH2OH groups -->
    <line x1="27" y1="38" x2="27" y2="60" stroke="#555" stroke-width="1.5"/>
    <text x="27" y="74" text-anchor="middle" font-size="11" fill="#555">CH2OH</text>
    <line x1="-27" y1="38" x2="-27" y2="60" stroke="#555" stroke-width="1.5"/>
    <text x="-27" y="74" text-anchor="middle" font-size="11" fill="#555">CH2OH</text>
  </g>

  <!-- Sucrose label below -->
  <rect x="500" y="240" width="350" height="60" rx="6" fill="#fff3e0" stroke="#c62828" stroke-width="1.5"/>
  <text x="675" y="261" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">两个苷羟基均参与成键</text>
  <text x="675" y="279" text-anchor="middle" font-size="12" fill="#c62828">无游离苷羟基，无变旋现象</text>
  <text x="675" y="297" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">→ 非还原糖（银镜/斐林阴性）</text>

  <!-- Bottom comparison note -->
  <rect x="100" y="318" width="700" height="46" rx="6" fill="#f5f5f5" stroke="#aaa" stroke-width="1"/>
  <text x="450" y="337" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">还原性测试对比</text>
  <text x="450" y="355" text-anchor="middle" font-size="12" fill="#555">麦芽糖 → 托伦试剂银镜阳性 ✓  |  蔗糖 → 托伦试剂阴性 ✗（水解后方为阳性）</text>
</svg>
