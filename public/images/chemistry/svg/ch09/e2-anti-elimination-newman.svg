<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 195" width="480" height="195" aria-label="E2消除Newman投影——反式共平面导致立体专一性" role="img">
  <title>2-溴丁烷E2消除Newman投影：H-C2-C3-Br反式共平面构象得(E)-2-丁烯61%；syn构象得(Z)-2-丁烯20%</title>
  <defs>
    <marker id="arr_en" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" stroke="currentColor" stroke-width="1.2" fill="none"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="10" y="18" font-size="12" font-weight="bold" fill="currentColor">E2 消除立体专一性——Newman 投影分析（2-溴丁烷）</text>
  <!-- Left: Anti-periplanar conformation (major, gives E) -->
  <text x="20" y="40" font-size="11" font-weight="bold" fill="currentColor">反式共平面（anti）构象</text>
  <!-- Newman circle -->
  <circle cx="90" cy="110" r="32" fill="none" stroke="currentColor" stroke-width="1.8"/>
  <circle cx="90" cy="110" r="4" fill="currentColor"/>
  <!-- Front C2: CH3 (up), and H (left-down), Br (not here - Br on back C3) wait -->
  <!-- C2 front bonds: CH3 (top), H (bottom-left), H (bottom-right if any) -->
  <!-- Actually 2-bromobutane: C2 is CHBr - front C2 has CH3 and H -->
  <!-- Front C = C3, back C = C2 for E2 -->
  <!-- C3 (front): H top, CH3 right, H bottom -->
  <!-- C2 (back): Br bottom (anti to H top of C3), CH3 left, H behind -->
  <!-- Front C (C3) bonds: H at top -->
  <line x1="90" y1="78" x2="90" y2="55" stroke="currentColor" stroke-width="2.2"/>
  <text x="83" y="50" font-size="12" fill="orange">H</text>
  <text x="65" y="44" font-size="9" fill="orange">(β-H, E2)</text>
  <!-- CH3 at right -->
  <line x1="120" y1="116" x2="142" y2="124" stroke="currentColor" stroke-width="2"/>
  <text x="144" y="128" font-size="11" fill="currentColor">CH₃</text>
  <!-- H at lower-left -->
  <line x1="68" y1="128" x2="50" y2="142" stroke="currentColor" stroke-width="2"/>
  <text x="36" y="150" font-size="11" fill="currentColor">H</text>
  <!-- Back C (C2) bonds: Br at bottom (anti to H at top) -->
  <line x1="90" y1="142" x2="90" y2="162" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="83" y="175" font-size="12" fill="red">Br</text>
  <text x="65" y="185" font-size="9" fill="red">(LG, anti to H)</text>
  <!-- CH3 at upper-left (back) -->
  <line x1="60" y1="94" x2="42" y2="78" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="28" y="76" font-size="11" fill="currentColor">CH₃</text>
  <!-- H at upper-right (back) - actually C2 has H, CH3 at C1 -->
  <line x1="118" y1="92" x2="138" y2="78" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="140" y="76" font-size="11" fill="currentColor">H</text>
  <!-- Anti dihedral label -->
  <path d="M90,62 A48,48 0 0 0 90,158" stroke="orange" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
  <text x="14" y="110" font-size="10" fill="orange">180°</text>
  <!-- Arrow to product -->
  <line x1="165" y1="110" x2="195" y2="110" stroke="currentColor" stroke-width="1.5" marker-end="url(#arr_en)"/>
  <text x="165" y="104" font-size="9" fill="currentColor">KOH/醇</text>
  <!-- E-2-butene product -->
  <text x="205" y="80" font-size="11" fill="currentColor">(E)-2-丁烯</text>
  <!-- E-2-butene drawn as zigzag, CH3 and CH3 trans -->
  <line x1="218" y1="115" x2="248" y2="100" stroke="currentColor" stroke-width="2"/>
  <line x1="250" y1="99" x2="252" y2="101" stroke="currentColor" stroke-width="2"/>
  <line x1="248" y1="99" x2="278" y2="114" stroke="currentColor" stroke-width="2"/>
  <!-- double bond indicator -->
  <line x1="249" y1="104" x2="249" y2="95" stroke="currentColor" stroke-width="1.5"/>
  <text x="210" y="130" font-size="11" fill="currentColor">CH₃ 在对侧（E）</text>
  <text x="210" y="148" font-size="13" fill="orange">61%（主）</text>
  <!-- Divider -->
  <line x1="310" y1="30" x2="310" y2="190" stroke="currentColor" stroke-width="1" stroke-dasharray="5,3" opacity="0.3"/>
  <!-- Right: Syn conformation (minor, gives Z) -->
  <text x="328" y="40" font-size="11" font-weight="bold" fill="currentColor">同侧（syn）构象</text>
  <!-- Newman circle -->
  <circle cx="380" cy="110" r="32" fill="none" stroke="currentColor" stroke-width="1.8"/>
  <circle cx="380" cy="110" r="4" fill="currentColor"/>
  <!-- Front C (C3): H at top -->
  <line x1="380" y1="78" x2="380" y2="55" stroke="currentColor" stroke-width="2.2"/>
  <text x="373" y="50" font-size="12" fill="orange">H</text>
  <!-- CH3 at right -->
  <line x1="410" y1="116" x2="432" y2="124" stroke="currentColor" stroke-width="2"/>
  <text x="434" y="128" font-size="11" fill="currentColor">CH₃</text>
  <!-- H at lower-left -->
  <line x1="358" y1="128" x2="340" y2="142" stroke="currentColor" stroke-width="2"/>
  <text x="326" y="150" font-size="11" fill="currentColor">H</text>
  <!-- Back C (C2): Br at TOP too (syn, ~0° dihedral) -->
  <line x1="372" y1="80" x2="360" y2="62" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="350" y="60" font-size="12" fill="red">Br</text>
  <!-- CH3 at lower-left back -->
  <line x1="352" y1="130" x2="334" y2="148" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="320" y="158" font-size="11" fill="currentColor">CH₃</text>
  <!-- H at right back -->
  <line x1="408" y1="96" x2="428" y2="80" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="430" y="78" font-size="11" fill="currentColor">H</text>
  <!-- Syn angle label -->
  <text x="390" y="64" font-size="10" fill="red">≈0°</text>
  <!-- Product label -->
  <text x="325" y="165" font-size="11" fill="currentColor">(Z)-2-丁烯</text>
  <text x="325" y="180" font-size="13" fill="currentColor">20%（次要）</text>
  <text x="325" y="192" font-size="10" fill="currentColor">syn 过渡态位阻大</text>
</svg>
