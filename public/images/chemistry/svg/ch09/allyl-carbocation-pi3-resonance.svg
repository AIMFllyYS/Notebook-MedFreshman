<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 180" width="440" height="180" aria-label="烯丙基碳正离子共振结构——三中心π体系" role="img">
  <title>烯丙基碳正离子CH2=CH-CH2+与+CH2-CH=CH2的共振结构，三中心π3^2体系，正电荷分布在C1和C3上</title>
  <!-- Title -->
  <text x="10" y="18" font-size="12" font-weight="bold" fill="currentColor">烯丙基碳正离子共振——三中心 π 体系（π₃²）</text>
  <!-- Left resonance structure: CH2=CH-CH2+ -->
  <text x="20" y="42" font-size="11" fill="currentColor">共振结构 I</text>
  <!-- C1=C2 double bond -->
  <line x1="28" y1="80" x2="70" y2="80" stroke="currentColor" stroke-width="2.2"/>
  <line x1="28" y1="85" x2="70" y2="85" stroke="currentColor" stroke-width="2.2"/>
  <text x="10" y="85" font-size="11" fill="currentColor">H₂C</text>
  <!-- C2 vertex -->
  <!-- C2-C3 single bond -->
  <line x1="74" y1="82" x2="115" y2="82" stroke="currentColor" stroke-width="2"/>
  <!-- C3 label with + charge -->
  <text x="116" y="86" font-size="11" fill="currentColor">CH₂</text>
  <text x="136" y="72" font-size="14" fill="orange">⁺</text>
  <!-- H2C = label -->
  <text x="68" y="76" font-size="10" fill="currentColor">CH</text>
  <!-- Electrons/arrows showing delocalization -->
  <text x="22" y="110" font-size="10" fill="currentColor">正电荷在 C3</text>
  <!-- Resonance arrow -->
  <text x="155" y="85" font-size="18" fill="currentColor">↔</text>
  <!-- Right resonance structure: +CH2-CH=CH2 -->
  <text x="185" y="42" font-size="11" fill="currentColor">共振结构 II</text>
  <!-- C1: +CH2 -->
  <text x="183" y="86" font-size="14" fill="orange">⁺</text>
  <text x="193" y="86" font-size="11" fill="currentColor">H₂C</text>
  <!-- C1-C2 single bond -->
  <line x1="222" y1="82" x2="262" y2="82" stroke="currentColor" stroke-width="2"/>
  <!-- C2 vertex -->
  <text x="260" y="76" font-size="10" fill="currentColor">CH</text>
  <!-- C2=C3 double bond -->
  <line x1="278" y1="80" x2="318" y2="80" stroke="currentColor" stroke-width="2.2"/>
  <line x1="278" y1="85" x2="318" y2="85" stroke="currentColor" stroke-width="2.2"/>
  <text x="320" y="86" font-size="11" fill="currentColor">CH₂</text>
  <text x="292" y="110" font-size="10" fill="currentColor">正电荷在 C1</text>
  <!-- Delocalized structure below -->
  <line x1="10" y1="130" x2="430" y2="130" stroke="currentColor" stroke-width="0.5" stroke-dasharray="5,5" opacity="0.4"/>
  <text x="10" y="150" font-size="11" font-weight="bold" fill="currentColor">实际结构（共振杂化体）：</text>
  <!-- Draw delocalized allyl cation -->
  <!-- 3 sp2 C in a row: C1, C2, C3 -->
  <circle cx="330" cy="162" r="5" fill="currentColor"/>
  <line x1="335" y1="162" x2="360" y2="162" stroke="currentColor" stroke-width="2"/>
  <circle cx="365" cy="162" r="5" fill="currentColor"/>
  <line x1="370" y1="162" x2="395" y2="162" stroke="currentColor" stroke-width="2"/>
  <circle cx="400" cy="162" r="5" fill="currentColor"/>
  <!-- Positive charges at C1 and C3 -->
  <text x="320" y="158" font-size="13" fill="orange">+δ</text>
  <text x="391" y="158" font-size="13" fill="orange">+δ</text>
  <text x="358" y="177" font-size="10" fill="currentColor">C2 无正电荷</text>
  <!-- p orbital overlap bar -->
  <rect x="325" y="148" width="80" height="8" rx="3" fill="orange" opacity="0.3"/>
  <text x="325" y="145" font-size="9" fill="orange">π₃² ：3 个 p 轨道，2 个 π 电子离域</text>
  <!-- Text summary -->
  <text x="10" y="168" font-size="10" fill="currentColor">C1-C2 和 C2-C3 键长相等（约 140 pm，介于单键 154pm 和双键 134pm 之间）</text>
</svg>
