<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 190" width="480" height="190" aria-label="E2消除机理——反式共平面四中心过渡态" role="img">
  <title>E2消除机理：碱B攻击β-H，通过四中心过渡态[B-H-Cβ-Cα-X]，H-Cβ-Cα-X必须反式共平面，一步协同消除，二级反应</title>
  <defs>
    <marker id="arr_e2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" stroke="currentColor" stroke-width="1.2" fill="none"/>
    </marker>
    <marker id="arrow_curved_half" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,2 L7,4 L0,6" stroke="currentColor" stroke-width="1.2" fill="none"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="10" y="18" font-size="12" font-weight="bold" fill="currentColor">E2 机理——双分子消除（反式共平面要求）</text>
  <!-- Left: reactant structure showing anti-periplanar arrangement -->
  <text x="10" y="38" font-size="11" fill="currentColor">底物构象（H 和 X 反式共平面）</text>
  <!-- Newman projection of β-Cα bond, front C = Cβ, back C = Cα -->
  <!-- Front C (Cβ) circle -->
  <circle cx="90" cy="110" r="28" fill="none" stroke="currentColor" stroke-width="1.8"/>
  <circle cx="90" cy="110" r="4" fill="currentColor"/>
  <!-- Front C bonds: H (top, anti-periplanar to X below), and two R groups -->
  <!-- H at top (beta-H) -->
  <line x1="90" y1="82" x2="90" y2="60" stroke="currentColor" stroke-width="2"/>
  <text x="84" y="55" font-size="12" fill="currentColor">H</text>
  <!-- R1 (front-left) -->
  <line x1="66" y1="124" x2="48" y2="142" stroke="currentColor" stroke-width="2"/>
  <text x="38" y="150" font-size="11" fill="currentColor">R₁</text>
  <!-- R2 (front-right) -->
  <line x1="114" y1="124" x2="132" y2="142" stroke="currentColor" stroke-width="2"/>
  <text x="134" y="150" font-size="11" fill="currentColor">R₂</text>
  <!-- Back C (Cα) - back bonds from edge of circle -->
  <!-- X at bottom (anti-periplanar to H) -->
  <line x1="90" y1="138" x2="90" y2="158" stroke="currentColor" stroke-width="2"/>
  <text x="84" y="170" font-size="12" fill="red">X</text>
  <!-- R3 (back-left) -->
  <line x1="64" y1="96" x2="44" y2="78" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="34" y="75" font-size="11" fill="currentColor">R₃</text>
  <!-- R4 (back-right) -->
  <line x1="116" y1="96" x2="136" y2="78" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="138" y="75" font-size="11" fill="currentColor">R₄</text>
  <!-- Base B approaching H -->
  <text x="60" y="30" font-size="12" fill="currentColor">B:</text>
  <line x1="74" y1="28" x2="85" y2="52" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr_e2)"/>
  <!-- Anti-periplanar annotation -->
  <text x="155" y="62" font-size="10" fill="orange">H 和 X 反式共平面</text>
  <text x="155" y="75" font-size="10" fill="orange">（二面角 ≈ 180°）</text>
  <!-- Dihedral angle arc -->
  <path d="M90,64 A30,30 0 0 1 90,156" stroke="orange" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
  <!-- Transition state box -->
  <rect x="195" y="55" width="130" height="110" rx="6" fill="currentColor" opacity="0.04" stroke="currentColor" stroke-width="1"/>
  <text x="210" y="75" font-size="11" font-weight="bold" fill="currentColor">四中心过渡态</text>
  <text x="200" y="92" font-size="11" fill="currentColor">B⋯H—Cβ—Cα—X</text>
  <!-- Linear arrangement diagram -->
  <text x="205" y="112" font-size="10" fill="currentColor">B ← H</text>
  <line x1="230" y1="122" x2="230" y2="100" stroke="currentColor" stroke-width="1.5"/>
  <text x="225" y="135" font-size="10" fill="currentColor">Cβ</text>
  <line x1="245" y1="127" x2="265" y2="127" stroke="currentColor" stroke-width="1.5"/>
  <text x="265" y="131" font-size="10" fill="currentColor">Cα</text>
  <line x1="265" y1="122" x2="265" y2="142" stroke="currentColor" stroke-width="1.5"/>
  <text x="260" y="155" font-size="10" fill="red">X</text>
  <text x="200" y="155" font-size="10" fill="currentColor">π 键形成</text>
  <!-- Overall arrow -->
  <text x="340" y="105" font-size="18" fill="currentColor">→</text>
  <text x="333" y="120" font-size="10" fill="currentColor">v = k[RX][B]</text>
  <text x="333" y="132" font-size="10" fill="currentColor">二级反应</text>
  <!-- Product: alkene -->
  <text x="375" y="38" font-size="11" fill="currentColor">烯烃产物</text>
  <!-- Draw C=C double bond -->
  <line x1="390" y1="90" x2="425" y2="75" stroke="currentColor" stroke-width="2"/>
  <line x1="392" y1="94" x2="427" y2="79" stroke="currentColor" stroke-width="2"/>
  <!-- R groups -->
  <line x1="390" y1="90" x2="370" y2="110" stroke="currentColor" stroke-width="1.8"/>
  <text x="358" y="118" font-size="10" fill="currentColor">R₁</text>
  <line x1="390" y1="90" x2="375" y2="70" stroke="currentColor" stroke-width="1.8"/>
  <text x="368" y="65" font-size="10" fill="currentColor">R₃</text>
  <line x1="425" y1="75" x2="445" y2="95" stroke="currentColor" stroke-width="1.8"/>
  <text x="448" y="100" font-size="10" fill="currentColor">R₂</text>
  <line x1="425" y1="75" x2="440" y2="55" stroke="currentColor" stroke-width="1.8"/>
  <text x="443" y="52" font-size="10" fill="currentColor">R₄</text>
  <!-- + BH + X- -->
  <text x="360" y="130" font-size="10" fill="currentColor">+ BH + X⁻</text>
  <text x="360" y="150" font-size="10" fill="currentColor">（协同，一步完成）</text>
  <!-- Summary -->
  <text x="10" y="180" font-size="11" fill="currentColor">强碱强制 E2；反式共平面是立体化学要求（trans / anti-periplanar）；Zaitsev 取向给取代最多的烯烃</text>
</svg>
