<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 195" width="460" height="195" aria-label="亲核性在质子溶剂和极性非质子溶剂中的顺序差异" role="img">
  <title>亲核性溶剂效应：质子溶剂中卤素亲核性I->Br->Cl->F（溶剂化强的小离子亲核性弱），非质子溶剂中反转F->Cl->Br->I（本征亲核性）</title>
  <!-- Title -->
  <text x="10" y="18" font-size="12" font-weight="bold" fill="currentColor">亲核性与溶剂效应——质子溶剂 vs 极性非质子溶剂</text>
  <!-- Left section: Protic solvent -->
  <rect x="10" y="28" width="200" height="155" rx="6" fill="currentColor" opacity="0.04" stroke="currentColor" stroke-width="1"/>
  <text x="55" y="45" font-size="11" font-weight="bold" fill="currentColor">质子溶剂（H₂O, ROH）</text>
  <!-- Halogens with solvation shells -->
  <!-- F- (small, heavily solvated, least nucleophilic) -->
  <circle cx="55" cy="115" r="22" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <circle cx="55" cy="115" r="14" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>
  <circle cx="55" cy="115" r="6" fill="currentColor" opacity="0.8"/>
  <text x="49" y="119" font-size="9" fill="white" font-weight="bold">F⁻</text>
  <text x="44" y="148" font-size="9" fill="currentColor">包裹多，</text>
  <text x="44" y="158" font-size="9" fill="currentColor">亲核性弱</text>
  <!-- Cl- -->
  <circle cx="105" cy="115" r="14" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <circle cx="105" cy="115" r="6" fill="currentColor" opacity="0.8"/>
  <text x="99" y="119" font-size="9" fill="white">Cl⁻</text>
  <!-- Br- -->
  <circle cx="148" cy="115" r="10" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
  <circle cx="148" cy="115" r="6" fill="currentColor" opacity="0.8"/>
  <text x="142" y="119" font-size="9" fill="white">Br⁻</text>
  <!-- I- (large, least solvated, most nucleophilic) -->
  <circle cx="185" cy="115" r="6" fill="currentColor" opacity="0.8"/>
  <text x="180" y="119" font-size="9" fill="white">I⁻</text>
  <text x="175" y="148" font-size="9" fill="currentColor">包裹少，</text>
  <text x="175" y="158" font-size="9" fill="currentColor">亲核性强</text>
  <!-- Order arrow -->
  <line x1="38" y1="88" x2="192" y2="88" stroke="currentColor" stroke-width="1.5" marker-end="url(#arr_nu)"/>
  <text x="38" y="82" font-size="11" fill="orange">亲核性增强→</text>
  <text x="30" y="62" font-size="11" fill="currentColor">F⁻ &lt; Cl⁻ &lt; Br⁻ &lt; I⁻</text>
  <defs>
    <marker id="arr_nu" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" stroke="currentColor" stroke-width="1" fill="none"/>
    </marker>
  </defs>
  <!-- Right section: Polar aprotic solvent -->
  <rect x="235" y="28" width="215" height="155" rx="6" fill="currentColor" opacity="0.04" stroke="currentColor" stroke-width="1"/>
  <text x="258" y="45" font-size="11" font-weight="bold" fill="currentColor">极性非质子溶剂（DMSO, DMF）</text>
  <!-- No solvation shells shown -->
  <!-- F- (small, very electronegative, most nucleophilic in aprotic) -->
  <circle cx="265" cy="115" r="6" fill="currentColor" opacity="0.8"/>
  <text x="259" y="119" font-size="9" fill="white">F⁻</text>
  <text x="254" y="148" font-size="9" fill="currentColor">无溶剂化</text>
  <text x="252" y="158" font-size="9" fill="currentColor">亲核性强</text>
  <!-- Cl- -->
  <circle cx="305" cy="115" r="6" fill="currentColor" opacity="0.8"/>
  <text x="299" y="119" font-size="9" fill="white">Cl⁻</text>
  <!-- Br- -->
  <circle cx="355" cy="115" r="6" fill="currentColor" opacity="0.8"/>
  <text x="349" y="119" font-size="9" fill="white">Br⁻</text>
  <!-- I- -->
  <circle cx="415" cy="115" r="6" fill="currentColor" opacity="0.8"/>
  <text x="409" y="119" font-size="9" fill="white">I⁻</text>
  <text x="402" y="148" font-size="9" fill="currentColor">可极化，</text>
  <text x="400" y="158" font-size="9" fill="currentColor">亲核性弱</text>
  <!-- Order arrow (reversed) -->
  <line x1="430" y1="88" x2="245" y2="88" stroke="currentColor" stroke-width="1.5" marker-end="url(#arr_nu2)"/>
  <text x="297" y="82" font-size="11" fill="orange">亲核性增强→</text>
  <text x="250" y="62" font-size="11" fill="currentColor">I⁻ &lt; Br⁻ &lt; Cl⁻ &lt; F⁻（顺序反转！）</text>
  <defs>
    <marker id="arr_nu2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" stroke="currentColor" stroke-width="1" fill="none"/>
    </marker>
  </defs>
  <!-- Bottom summary -->
  <text x="10" y="192" font-size="10" fill="currentColor">溶剂化效应：质子溶剂形成氢键包裹小离子（F⁻最多）→ 削弱其亲核性；非质子溶剂无此效应 → 恢复本征亲核性（电负性大的 F⁻ 更强）</text>
</svg>
