<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="700" height="300" font-family="system-ui,sans-serif" font-size="13">
  <title>罗森孟还原：Pd/BaSO4+喹啉毒化催化剂，酰氯选择性还原为醛</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="currentColor"/>
    </marker>
    <marker id="redarr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c00"/>
    </marker>
    <marker id="grayarr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#999"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="10" y="20" font-size="15" font-weight="bold">罗森孟（Rosenmund）还原</text>

  <!-- Main reaction row -->
  <!-- Acid chloride -->
  <g transform="translate(20,75)">
    <text x="0" y="0" font-weight="bold" font-size="15">R</text>
    <line x1="20" y1="-4" x2="44" y2="-4" stroke="currentColor" stroke-width="2"/>
    <text x="45" y="0" font-weight="bold" font-size="15">C</text>
    <line x1="60" y1="-10" x2="82" y2="-32" stroke="currentColor" stroke-width="2"/>
    <line x1="63" y1="-7" x2="85" y2="-29" stroke="currentColor" stroke-width="2"/>
    <text x="84" y="-28" font-weight="bold" font-size="15">O</text>
    <line x1="60" y1="6" x2="82" y2="28" stroke="currentColor" stroke-width="2"/>
    <text x="84" y="34" font-weight="bold" font-size="15" fill="#a00">Cl</text>
    <text x="10" y="55" font-size="11" fill="#555">酰氯 RC(=O)Cl</text>
  </g>

  <!-- + H2 -->
  <text x="130" y="80" font-size="16">+ H₂</text>

  <!-- Catalyst label on arrow -->
  <line x1="178" y1="75" x2="290" y2="75" stroke="currentColor" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="180" y="45" width="108" height="26" rx="4" fill="#f5f0ff" stroke="#8060c0" stroke-width="1"/>
  <text x="186" y="58" font-size="11" fill="#5030a0" font-weight="bold">Pd/BaSO₄，喹啉</text>
  <text x="188" y="70" font-size="10" fill="#555">甲苯，回流</text>

  <!-- Aldehyde product -->
  <g transform="translate(295,75)">
    <text x="0" y="0" font-weight="bold" font-size="15">R</text>
    <line x1="20" y1="-4" x2="44" y2="-4" stroke="currentColor" stroke-width="2"/>
    <text x="45" y="0" font-weight="bold" font-size="15">C</text>
    <line x1="60" y1="-10" x2="82" y2="-32" stroke="currentColor" stroke-width="2"/>
    <line x1="63" y1="-7" x2="85" y2="-29" stroke="currentColor" stroke-width="2"/>
    <text x="84" y="-28" font-weight="bold" font-size="15">O</text>
    <line x1="60" y1="6" x2="82" y2="28" stroke="currentColor" stroke-width="2"/>
    <text x="84" y="34" font-weight="bold" font-size="15" fill="#090">H</text>
    <text x="10" y="55" font-size="11" fill="#090" font-weight="bold">醛 RCHO</text>
  </g>

  <!-- + HCl byproduct -->
  <text x="400" y="80" font-size="13" fill="#555">+ HCl</text>

  <!-- Selectivity diagram -->
  <rect x="20" y="140" width="660" height="150" rx="6" fill="#fafafa" stroke="#ddd" stroke-width="1"/>

  <!-- Without quinoline (crosses out) -->
  <text x="32" y="162" font-size="12" font-weight="bold" fill="#888">无喹啉（普通 Pd）：</text>
  <text x="32" y="180" font-size="12" fill="#555">RC(=O)Cl</text>
  <line x1="108" y1="175" x2="148" y2="175" stroke="#999" stroke-width="1.5" marker-end="url(#grayarr)"/>
  <text x="115" y="168" font-size="10" fill="#999">H₂/Pd</text>
  <text x="152" y="180" font-size="12" fill="#555">RCHO</text>
  <line x1="195" y1="175" x2="235" y2="175" stroke="#c00" stroke-width="1.5" marker-end="url(#redarr)"/>
  <text x="198" y="168" font-size="10" fill="#c00">继续还原!</text>
  <text x="238" y="180" font-size="12" fill="#c00" font-weight="bold">RCH₂OH</text>
  <text x="298" y="180" font-size="11" fill="#c00">（醛继续被还原为醇，不选择性）</text>

  <!-- Cross (X) over second arrow -->
  <line x1="196" y1="168" x2="234" y2="182" stroke="#c00" stroke-width="2"/>
  <line x1="234" y1="168" x2="196" y2="182" stroke="#c00" stroke-width="2"/>

  <!-- With quinoline -->
  <text x="32" y="208" font-size="12" font-weight="bold" fill="#5030a0">有喹啉（毒化 Pd/BaSO₄）：</text>
  <text x="32" y="226" font-size="12" fill="#555">RC(=O)Cl</text>
  <line x1="108" y1="221" x2="148" y2="221" stroke="#5030a0" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="110" y="214" font-size="10" fill="#5030a0">H₂/Pd*</text>
  <text x="152" y="226" font-size="12" fill="#090" font-weight="bold">RCHO</text>
  <text x="200" y="226" font-size="12" fill="#999">─✗─▶  RCH₂OH</text>
  <text x="310" y="226" font-size="11" fill="#090">（选择性停留在醛，不过度还原）</text>

  <!-- Pd surface diagram -->
  <g transform="translate(460,148)">
    <rect x="0" y="0" width="200" height="90" rx="5" fill="#f0f0f8" stroke="#9080c0" stroke-width="1"/>
    <text x="10" y="16" font-size="11" font-weight="bold" fill="#5030a0">Pd 表面示意</text>
    <!-- Pd atoms -->
    <circle cx="20" cy="50" r="10" fill="#b0a0d0" stroke="#8060c0" stroke-width="1"/>
    <circle cx="50" cy="50" r="10" fill="#b0a0d0" stroke="#8060c0" stroke-width="1"/>
    <circle cx="80" cy="50" r="10" fill="#b0a0d0" stroke="#8060c0" stroke-width="1"/>
    <circle cx="110" cy="50" r="10" fill="#b0a0d0" stroke="#8060c0" stroke-width="1"/>
    <circle cx="140" cy="50" r="10" fill="#b0a0d0" stroke="#8060c0" stroke-width="1"/>
    <circle cx="170" cy="50" r="10" fill="#b0a0d0" stroke="#8060c0" stroke-width="1"/>
    <!-- Quinoline blocking some sites -->
    <rect x="35" y="28" width="30" height="16" rx="3" fill="#f5d060" stroke="#c0a020" stroke-width="1"/>
    <text x="38" y="40" font-size="9" fill="#7a5000">喹啉</text>
    <rect x="95" y="28" width="30" height="16" rx="3" fill="#f5d060" stroke="#c0a020" stroke-width="1"/>
    <text x="98" y="40" font-size="9" fill="#7a5000">喹啉</text>
    <!-- Free sites -->
    <text x="14" y="76" font-size="9" fill="#090">活性</text>
    <text x="74" y="76" font-size="9" fill="#090">活性</text>
    <text x="134" y="76" font-size="9" fill="#090">活性</text>
    <text x="155" y="76" font-size="9" fill="#090">活性</text>
  </g>

  <text x="32" y="278" font-size="11" fill="#555">喹啉部分毒化 Pd，降低催化活性，使酰氯→醛的反应可停止，防止醛进一步加氢。BaSO₄ 为惰性载体，也有助于控制活性。</text>
</svg>
