<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280" font-family="system-ui,sans-serif" font-size="13">
  <title>羧酸根负离子共振结构：两C-O键等长127pm，负电荷平均分布</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- Left resonance structure -->
  <g transform="translate(30,60)">
    <text x="0" y="0" font-weight="bold">R</text>
    <line x1="22" y1="-4" x2="50" y2="-4" stroke="currentColor" stroke-width="1.5"/>
    <!-- C -->
    <text x="52" y="0" font-weight="bold">C</text>
    <!-- C=O (double bond, top) -->
    <line x1="68" y1="-10" x2="100" y2="-30" stroke="currentColor" stroke-width="1.5"/>
    <line x1="71" y1="-6" x2="103" y2="-26" stroke="currentColor" stroke-width="1.5"/>
    <text x="105" y="-28" font-weight="bold">O</text>
    <!-- label C=O 122pm -->
    <text x="60" y="-42" font-size="11" fill="#555">C=O 122 pm</text>
    <!-- C-O- (single bond, bottom) -->
    <line x1="68" y1="6" x2="100" y2="26" stroke="currentColor" stroke-width="1.5"/>
    <text x="105" y="32" font-weight="bold">O</text>
    <text x="122" y="26" font-size="14">⊖</text>
    <!-- label C-O 136pm -->
    <text x="60" y="52" font-size="11" fill="#555">C-O 136 pm</text>
  </g>

  <!-- Double-headed resonance arrow -->
  <line x1="215" y1="60" x2="285" y2="60" stroke="currentColor" stroke-width="1.5"
        marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="237" y="50" font-size="12" fill="#555">共振</text>

  <!-- Right resonance structure (mirror) -->
  <g transform="translate(300,60)">
    <text x="0" y="0" font-weight="bold">R</text>
    <line x1="22" y1="-4" x2="50" y2="-4" stroke="currentColor" stroke-width="1.5"/>
    <text x="52" y="0" font-weight="bold">C</text>
    <!-- C-O- top -->
    <line x1="68" y1="-10" x2="100" y2="-30" stroke="currentColor" stroke-width="1.5"/>
    <text x="105" y="-28" font-weight="bold">O</text>
    <text x="122" y="-34" font-size="14">⊖</text>
    <!-- C=O bottom (double bond) -->
    <line x1="68" y1="6" x2="100" y2="26" stroke="currentColor" stroke-width="1.5"/>
    <line x1="71" y1="2" x2="103" y2="22" stroke="currentColor" stroke-width="1.5"/>
    <text x="105" y="32" font-weight="bold">O</text>
  </g>

  <!-- Actual structure row -->
  <line x1="30" y1="155" x2="570" y2="155" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="30" y="178" font-size="13" font-weight="bold" fill="#333">实际结构：</text>

  <g transform="translate(150,175)">
    <text x="0" y="0" font-weight="bold">R</text>
    <line x1="22" y1="-4" x2="50" y2="-4" stroke="currentColor" stroke-width="1.5"/>
    <text x="52" y="0" font-weight="bold">C</text>
    <!-- 1.5 bond (dashed double) top -->
    <line x1="68" y1="-10" x2="108" y2="-34" stroke="currentColor" stroke-width="1.5"/>
    <line x1="71" y1="-6" x2="111" y2="-30" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="113" y="-32" font-weight="bold">O</text>
    <text x="130" y="-36" font-size="12" fill="#c00">δ⁻/2</text>
    <!-- 1.5 bond (dashed double) bottom -->
    <line x1="68" y1="6" x2="108" y2="30" stroke="currentColor" stroke-width="1.5"/>
    <line x1="71" y1="2" x2="111" y2="26" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="113" y="34" font-weight="bold">O</text>
    <text x="130" y="30" font-size="12" fill="#c00">δ⁻/2</text>
  </g>

  <text x="150" y="248" font-size="12" fill="#555">两 C−O 键键长相等，均为 127 pm（介于单键 136 pm 与双键 122 pm 之间）</text>
  <text x="150" y="265" font-size="12" fill="#555">负电荷平均分散到两个氧原子上，各为 δ⁻/2</text>
</svg>
