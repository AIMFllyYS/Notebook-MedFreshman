<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200" aria-label="多官能团化合物命名：3-羟基丁酸结构式及官能团优先级顺序">
  <title>多官能团化合物命名示例：3-羟基丁酸</title>
  <style>
    text { font-family: serif; font-size: 12px; fill: currentColor; }
    line { stroke: currentColor; }
  </style>

  <!-- 3-Hydroxybutanoic acid: CH3-CH(OH)-CH2-COOH -->
  <text x="10" y="18" font-weight="bold" font-size="13">3-羟基丁酸</text>

  <!-- Structure: C4(CH3) - C3(CH(OH)) - C2(CH2) - C1(COOH) -->
  <!-- Carbon chain zig-zag: C4(30,80) C3(75,60) C2(120,80) C1(165,60) -->
  <line x1="30" y1="80" x2="75" y2="60" stroke-width="1.5" fill="none"/>
  <line x1="75" y1="60" x2="120" y2="80" stroke-width="1.5" fill="none"/>
  <line x1="120" y1="80" x2="165" y2="60" stroke-width="1.5" fill="none"/>

  <!-- Carbon labels -->
  <text x="15" y="95" font-size="11">CH₃</text>
  <text x="12" y="107" font-size="9" opacity="0.7">C4</text>

  <text x="69" y="57" font-size="11">CH</text>
  <text x="68" y="47" font-size="9" opacity="0.7">C3</text>

  <text x="113" y="95" font-size="11">CH₂</text>
  <text x="113" y="107" font-size="9" opacity="0.7">C2</text>

  <!-- COOH group at C1 -->
  <text x="160" y="57">C</text>
  <text x="158" y="47" font-size="9" opacity="0.7">C1</text>
  <!-- C=O double bond going up-right -->
  <line x1="168" y1="52" x2="185" y2="38" stroke-width="1.5" fill="none"/>
  <line x1="171" y1="55" x2="188" y2="41" stroke-width="1.5" fill="none"/>
  <text x="188" y="35">O</text>
  <!-- C-OH going right -->
  <line x1="175" y1="60" x2="200" y2="60" stroke-width="1.5" fill="none"/>
  <text x="202" y="65">OH</text>

  <!-- OH substituent at C3 (down from C3) -->
  <line x1="78" y1="64" x2="78" y2="90" stroke-width="1.5" fill="none"/>
  <text x="72" y="103">OH</text>

  <!-- Annotations -->
  <!-- COOH main functional group arrow -->
  <line x1="215" y1="52" x2="250" y2="52" stroke-width="0.8" fill="none"/>
  <polygon points="250,52 243,48 243,56" fill="currentColor" stroke="none"/>
  <text x="253" y="56" font-size="11" font-weight="bold">主官能团</text>
  <text x="253" y="68" font-size="10">—COOH（羧酸）</text>

  <!-- OH substituent arrow -->
  <line x1="85" y1="103" x2="115" y2="118" stroke-width="0.8" fill="none"/>
  <text x="117" y="122" font-size="11">取代基</text>
  <text x="117" y="134" font-size="10">—OH（羟基）</text>

  <!-- Priority order table -->
  <text x="10" y="150" font-weight="bold" font-size="12">官能团优先级（从高到低）：</text>
  <text x="10" y="165" font-size="10">—COOH &gt; —COOR &gt; —COX &gt; —CONH₂ &gt; —CHO &gt; C=O &gt; —OH &gt; —NH₂ &gt; —OR &gt; C≡C &gt; C=C</text>
  <text x="10" y="178" font-size="10" opacity="0.7">（多官能团时，以优先级最高者作为主官能团，其余作取代基命名）</text>
</svg>
