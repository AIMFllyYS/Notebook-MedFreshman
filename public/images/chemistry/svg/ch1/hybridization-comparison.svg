<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="system-ui, sans-serif" font-size="13" fill="currentColor" stroke="currentColor">
  <title>sp³/sp²/sp 杂化轨道与分子构型对比</title>

  <!-- ── sp³ section (left) ── -->
  <text x="133" y="22" text-anchor="middle" font-weight="bold" font-size="14">sp³ 杂化</text>
  <text x="133" y="38" text-anchor="middle" font-size="11" opacity="0.7">25%s + 75%p</text>

  <!-- tetrahedral CH4: central C, 4 H bonds -->
  <!-- top H -->
  <line x1="133" y1="110" x2="133" y2="65"  stroke-width="2"/>
  <circle cx="133" cy="57" r="10" fill="none" stroke-width="1.5"/>
  <text x="133" y="61" text-anchor="middle" font-size="11">H</text>
  <!-- bottom-left H -->
  <line x1="133" y1="110" x2="88"  y2="155" stroke-width="2"/>
  <circle cx="82"  cy="162" r="10" fill="none" stroke-width="1.5"/>
  <text x="82"  y="166" text-anchor="middle" font-size="11">H</text>
  <!-- bottom-right H -->
  <line x1="133" y1="110" x2="178" y2="155" stroke-width="2"/>
  <circle cx="184" cy="162" r="10" fill="none" stroke-width="1.5"/>
  <text x="184" y="166" text-anchor="middle" font-size="11">H</text>
  <!-- back H (dashed) -->
  <line x1="133" y1="110" x2="133" y2="158" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="133" cy="166" r="10" fill="none" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="133" y="170" text-anchor="middle" font-size="11">H</text>
  <!-- C -->
  <circle cx="133" cy="110" r="13" fill="none" stroke-width="2"/>
  <text x="133" y="115" text-anchor="middle" font-weight="bold">C</text>
  <!-- angle label -->
  <path d="M133,95 A22,22 0 0,1 152,118" fill="none" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="158" y="104" font-size="11">109.5°</text>
  <!-- molecule label -->
  <text x="133" y="200" text-anchor="middle" font-size="12">甲烷 CH₄</text>
  <text x="133" y="216" text-anchor="middle" font-size="11" opacity="0.7">正四面体</text>
  <!-- p orbital unused note -->
  <text x="133" y="240" text-anchor="middle" font-size="10" opacity="0.6">无未杂化 p 轨道</text>

  <!-- divider -->
  <line x1="267" y1="10" x2="267" y2="280" stroke-width="0.5" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- ── sp² section (middle) ── -->
  <text x="400" y="22" text-anchor="middle" font-weight="bold" font-size="14">sp² 杂化</text>
  <text x="400" y="38" text-anchor="middle" font-size="11" opacity="0.7">33%s + 67%p</text>

  <!-- ethylene H2C=CH2, planar triangle around each C -->
  <!-- left C -->
  <circle cx="365" cy="120" r="13" fill="none" stroke-width="2"/>
  <text x="365" y="125" text-anchor="middle" font-weight="bold">C</text>
  <!-- right C -->
  <circle cx="435" cy="120" r="13" fill="none" stroke-width="2"/>
  <text x="435" y="125" text-anchor="middle" font-weight="bold">C</text>
  <!-- sigma bond (solid) -->
  <line x1="378" y1="120" x2="422" y2="120" stroke-width="2"/>
  <!-- pi bond (dashed, above and below) -->
  <path d="M378,107 Q400,98 422,107" fill="none" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M378,133 Q400,142 422,133" fill="none" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="400" y="96" text-anchor="middle" font-size="10" opacity="0.8">π</text>
  <text x="400" y="152" text-anchor="middle" font-size="10" opacity="0.8">π</text>
  <!-- H on left C (top-left, bottom-left) -->
  <line x1="365" y1="107" x2="340" y2="80"  stroke-width="2"/>
  <circle cx="333" cy="73" r="10" fill="none" stroke-width="1.5"/>
  <text x="333" y="77" text-anchor="middle" font-size="11">H</text>
  <line x1="365" y1="133" x2="340" y2="160" stroke-width="2"/>
  <circle cx="333" cy="167" r="10" fill="none" stroke-width="1.5"/>
  <text x="333" y="171" text-anchor="middle" font-size="11">H</text>
  <!-- H on right C -->
  <line x1="435" y1="107" x2="460" y2="80"  stroke-width="2"/>
  <circle cx="467" cy="73" r="10" fill="none" stroke-width="1.5"/>
  <text x="467" y="77" text-anchor="middle" font-size="11">H</text>
  <line x1="435" y1="133" x2="460" y2="160" stroke-width="2"/>
  <circle cx="467" cy="167" r="10" fill="none" stroke-width="1.5"/>
  <text x="467" y="171" text-anchor="middle" font-size="11">H</text>
  <!-- angle label -->
  <text x="400" y="200" text-anchor="middle" font-size="11">120°</text>
  <text x="400" y="216" text-anchor="middle" font-size="12">乙烯 C₂H₄</text>
  <text x="400" y="232" text-anchor="middle" font-size="11" opacity="0.7">平面三角形 + 1个π键</text>
  <!-- unhybridized p note -->
  <text x="400" y="252" text-anchor="middle" font-size="10" opacity="0.6">1个未杂化 p 轨道成π键</text>

  <!-- divider -->
  <line x1="533" y1="10" x2="533" y2="280" stroke-width="0.5" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- ── sp section (right) ── -->
  <text x="666" y="22" text-anchor="middle" font-weight="bold" font-size="14">sp 杂化</text>
  <text x="666" y="38" text-anchor="middle" font-size="11" opacity="0.7">50%s + 50%p</text>

  <!-- acetylene H-C≡C-H linear -->
  <!-- H left -->
  <circle cx="560" cy="120" r="10" fill="none" stroke-width="1.5"/>
  <text x="560" y="124" text-anchor="middle" font-size="11">H</text>
  <!-- left C -->
  <line x1="570" y1="120" x2="612" y2="120" stroke-width="2"/>
  <circle cx="624" cy="120" r="13" fill="none" stroke-width="2"/>
  <text x="624" y="125" text-anchor="middle" font-weight="bold">C</text>
  <!-- triple bond -->
  <line x1="637" y1="117" x2="709" y2="117" stroke-width="2"/>
  <line x1="637" y1="120" x2="709" y2="120" stroke-width="0.5" opacity="0.3"/>
  <line x1="637" y1="123" x2="709" y2="123" stroke-width="2"/>
  <!-- pi bonds dashed above/below -->
  <path d="M637,108 Q673,98 709,108" fill="none" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M637,132 Q673,142 709,132" fill="none" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="673" y="96" text-anchor="middle" font-size="10" opacity="0.8">π</text>
  <text x="673" y="152" text-anchor="middle" font-size="10" opacity="0.8">π</text>
  <!-- right C -->
  <circle cx="722" cy="120" r="13" fill="none" stroke-width="2"/>
  <text x="722" y="125" text-anchor="middle" font-weight="bold">C</text>
  <!-- H right -->
  <line x1="735" y1="120" x2="760" y2="120" stroke-width="2"/>
  <circle cx="771" cy="120" r="10" fill="none" stroke-width="1.5"/>
  <text x="771" y="124" text-anchor="middle" font-size="11">H</text>
  <!-- angle label -->
  <text x="666" y="200" text-anchor="middle" font-size="11">180°</text>
  <text x="666" y="216" text-anchor="middle" font-size="12">乙炔 C₂H₂</text>
  <text x="666" y="232" text-anchor="middle" font-size="11" opacity="0.7">直线形 + 2个π键</text>
  <text x="666" y="252" text-anchor="middle" font-size="10" opacity="0.6">2个未杂化 p 轨道成2个π键</text>

  <!-- bottom caption -->
  <text x="400" y="286" text-anchor="middle" font-size="12" opacity="0.55">s 成分越多 → 键角越大 → 键的方向性越强</text>
</svg>
