<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" font-family="system-ui, sans-serif" font-size="13" fill="currentColor" stroke="currentColor">
  <title>σ键头碰头重叠与π键肩并肩重叠对比</title>

  <!-- ══ LEFT: σ bond head-on overlap ══ -->
  <text x="175" y="22" text-anchor="middle" font-weight="bold" font-size="15">σ 键</text>
  <text x="175" y="40" text-anchor="middle" font-size="12" opacity="0.7">头碰头重叠</text>

  <!-- left orbital lobe -->
  <ellipse cx="120" cy="120" rx="52" ry="30" fill="none" stroke-width="2"/>
  <ellipse cx="90"  cy="120" rx="22" ry="14" fill="none" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.5"/>

  <!-- right orbital lobe -->
  <ellipse cx="230" cy="120" rx="52" ry="30" fill="none" stroke-width="2"/>
  <ellipse cx="260" cy="120" rx="22" ry="14" fill="none" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.5"/>

  <!-- overlap region shaded -->
  <ellipse cx="175" cy="120" rx="22" ry="22" fill="currentColor" opacity="0.12" stroke="none"/>
  <ellipse cx="175" cy="120" rx="22" ry="22" fill="none" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- bond axis arrow -->
  <line x1="68" y1="120" x2="282" y2="120" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>
  <text x="175" y="138" text-anchor="middle" font-size="10" opacity="0.6">键轴</text>

  <!-- atom labels -->
  <text x="110" y="125" text-anchor="middle" font-size="12" font-weight="bold">A</text>
  <text x="240" y="125" text-anchor="middle" font-size="12" font-weight="bold">B</text>

  <!-- electron cloud symmetric note -->
  <text x="175" y="170" text-anchor="middle" font-size="11" opacity="0.75">电子云沿键轴对称分布</text>
  <text x="175" y="188" text-anchor="middle" font-size="11" opacity="0.75">可绕键轴自由旋转</text>

  <!-- label box -->
  <rect x="60" y="204" width="230" height="28" rx="5" fill="none" stroke-width="1" opacity="0.4"/>
  <text x="175" y="223" text-anchor="middle" font-size="12" font-weight="bold">σ 键：重叠程度大，键强</text>

  <!-- ══ DIVIDER ══ -->
  <line x1="350" y1="10" x2="350" y2="250" stroke-width="0.8" stroke-dasharray="6,4" opacity="0.35"/>

  <!-- ══ RIGHT: π bond side-by-side overlap ══ -->
  <text x="525" y="22" text-anchor="middle" font-weight="bold" font-size="15">π 键</text>
  <text x="525" y="40" text-anchor="middle" font-size="12" opacity="0.7">肩并肩重叠</text>

  <!-- two p-orbitals: each has upper and lower lobe -->
  <!-- left p-orbital -->
  <ellipse cx="468" cy="88"  rx="20" ry="34" fill="none" stroke-width="2"/>
  <ellipse cx="468" cy="152" rx="20" ry="34" fill="none" stroke-width="2"/>
  <text x="468" y="123" text-anchor="middle" font-size="11" font-weight="bold">A</text>

  <!-- right p-orbital -->
  <ellipse cx="582" cy="88"  rx="20" ry="34" fill="none" stroke-width="2"/>
  <ellipse cx="582" cy="152" rx="20" ry="34" fill="none" stroke-width="2"/>
  <text x="582" y="123" text-anchor="middle" font-size="11" font-weight="bold">B</text>

  <!-- overlap regions (above and below the axis) -->
  <!-- top overlap -->
  <ellipse cx="525" cy="67" rx="30" ry="16" fill="currentColor" opacity="0.12" stroke="none"/>
  <ellipse cx="525" cy="67" rx="30" ry="16" fill="none" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>
  <!-- bottom overlap -->
  <ellipse cx="525" cy="173" rx="30" ry="16" fill="currentColor" opacity="0.12" stroke="none"/>
  <ellipse cx="525" cy="173" rx="30" ry="16" fill="none" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- node plane (bond axis) -->
  <line x1="410" y1="120" x2="640" y2="120" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>
  <text x="525" y="133" text-anchor="middle" font-size="10" opacity="0.6">节面（键轴平面）</text>

  <!-- π labels -->
  <text x="525" y="55" text-anchor="middle" font-size="11" opacity="0.8">电子云（上）</text>
  <text x="525" y="196" text-anchor="middle" font-size="11" opacity="0.8">电子云（下）</text>

  <!-- label box -->
  <rect x="380" y="204" width="290" height="28" rx="5" fill="none" stroke-width="1" opacity="0.4"/>
  <text x="525" y="223" text-anchor="middle" font-size="12" font-weight="bold">π 键：重叠程度小，键弱</text>

  <!-- bottom note across full width -->
  <text x="350" y="252" text-anchor="middle" font-size="11" opacity="0.55">σ 键重叠程度大，强；π 键重叠程度小，弱，易断裂发生加成反应</text>
</svg>
