<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 220" font-family="system-ui, sans-serif" font-size="13" fill="currentColor" stroke="currentColor">
  <title>魏勒尿素合成：氰酸铵→尿素分子结构</title>

  <!-- ══ Title ══ -->
  <text x="340" y="20" text-anchor="middle" font-size="14" font-weight="bold">魏勒尿素合成（1828）</text>

  <!-- ══ LEFT: NH4OCN ammonium cyanate ══ -->
  <text x="155" y="48" text-anchor="middle" font-size="13" font-weight="bold">氰酸铵 NH₄OCN</text>

  <!-- NH4+ ion box -->
  <rect x="30" y="60" width="115" height="90" rx="8" fill="none" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.5"/>
  <text x="88" y="78" text-anchor="middle" font-size="11" opacity="0.7">NH₄⁺</text>
  <!-- N center -->
  <text x="88" y="108" text-anchor="middle" font-size="13" font-weight="bold">N</text>
  <!-- 4 H bonds -->
  <line x1="88" y1="95" x2="88" y2="72"  stroke-width="1.5"/>
  <text x="88" y="70" text-anchor="middle" font-size="12">H</text>
  <line x1="88" y1="112" x2="88" y2="136" stroke-width="1.5"/>
  <text x="88" y="148" text-anchor="middle" font-size="12">H</text>
  <line x1="78"  y1="103" x2="58"  y2="103" stroke-width="1.5"/>
  <text x="50"  y="107" text-anchor="middle" font-size="12">H</text>
  <line x1="98"  y1="103" x2="118" y2="103" stroke-width="1.5"/>
  <text x="127" y="107" text-anchor="middle" font-size="12">H</text>
  <!-- charge -->
  <text x="136" y="68" font-size="11">⁺</text>

  <!-- OCN- ion box -->
  <rect x="155" y="60" width="115" height="90" rx="8" fill="none" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.5"/>
  <text x="213" y="78" text-anchor="middle" font-size="11" opacity="0.7">OCN⁻</text>
  <!-- O=C≡N linear -->
  <text x="175" y="110" text-anchor="middle" font-size="13" font-weight="bold">O</text>
  <!-- double bond O=C -->
  <line x1="184" y1="107" x2="200" y2="107" stroke-width="1.5"/>
  <line x1="184" y1="112" x2="200" y2="112" stroke-width="1.5"/>
  <text x="213" y="113" text-anchor="middle" font-size="13" font-weight="bold">C</text>
  <!-- triple bond C≡N -->
  <line x1="221" y1="106" x2="237" y2="106" stroke-width="1.5"/>
  <line x1="221" y1="110" x2="237" y2="110" stroke-width="0.8"/>
  <line x1="221" y1="114" x2="237" y2="114" stroke-width="1.5"/>
  <text x="250" y="113" text-anchor="middle" font-size="13" font-weight="bold">N</text>
  <!-- charge -->
  <text x="265" y="100" font-size="11">⁻</text>

  <!-- ion separation indicator -->
  <text x="148" y="108" text-anchor="middle" font-size="16" opacity="0.5">…</text>

  <!-- ══ ARROW ══ -->
  <!-- arrow shaft -->
  <line x1="290" y1="105" x2="380" y2="105" stroke-width="2"/>
  <!-- arrowhead -->
  <polygon points="380,99 392,105 380,111" fill="currentColor" stroke="none"/>
  <!-- condition label -->
  <text x="335" y="96" text-anchor="middle" font-size="12" font-weight="bold">加热 Δ</text>
  <text x="335" y="120" text-anchor="middle" font-size="11" opacity="0.6">异构化</text>

  <!-- ══ RIGHT: Urea (NH2)2CO ══ -->
  <text x="535" y="48" text-anchor="middle" font-size="13" font-weight="bold">尿素 (NH₂)₂CO</text>

  <!-- urea structure: H2N-C(=O)-NH2 planar -->
  <!-- left NH2 -->
  <text x="415" y="110" text-anchor="middle" font-size="13" font-weight="bold">N</text>
  <line x1="400" y1="103" x2="385" y2="92"  stroke-width="1.5"/>
  <text x="380" y="90"  text-anchor="middle" font-size="12">H</text>
  <line x1="400" y1="116" x2="385" y2="127" stroke-width="1.5"/>
  <text x="380" y="133" text-anchor="middle" font-size="12">H</text>
  <!-- N-C bond -->
  <line x1="425" y1="107" x2="465" y2="107" stroke-width="1.5"/>
  <!-- C center -->
  <text x="478" y="112" text-anchor="middle" font-size="13" font-weight="bold">C</text>
  <!-- C=O double bond (downward) -->
  <line x1="474" y1="120" x2="470" y2="148" stroke-width="1.5"/>
  <line x1="481" y1="120" x2="484" y2="148" stroke-width="1.5"/>
  <text x="478" y="163" text-anchor="middle" font-size="13" font-weight="bold">O</text>
  <!-- C=O label -->
  <text x="497" y="140" font-size="11" font-weight="bold">C=O</text>
  <!-- C-N bond right -->
  <line x1="490" y1="107" x2="530" y2="107" stroke-width="1.5"/>
  <!-- right NH2 -->
  <text x="542" y="110" text-anchor="middle" font-size="13" font-weight="bold">N</text>
  <line x1="554" y1="103" x2="568" y2="92"  stroke-width="1.5"/>
  <text x="575" y="90"  text-anchor="middle" font-size="12">H</text>
  <line x1="554" y1="116" x2="568" y2="127" stroke-width="1.5"/>
  <text x="575" y="133" text-anchor="middle" font-size="12">H</text>

  <!-- NH2 labels -->
  <text x="415" y="80" text-anchor="middle" font-size="10" opacity="0.65">—NH₂</text>
  <text x="542" y="80" text-anchor="middle" font-size="10" opacity="0.65">—NH₂</text>

  <!-- bottom note -->
  <text x="340" y="192" text-anchor="middle" font-size="11" opacity="0.6">无机盐 → 有机物，首次证明"生命力"非必需（1828，魏勒）</text>
</svg>
