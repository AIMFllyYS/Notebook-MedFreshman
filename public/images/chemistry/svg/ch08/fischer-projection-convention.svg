<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 190" width="450" height="190" aria-label="Fischer投影式约定与楔形式转换" role="img">
  <title>Fischer投影式：水平键朝前（楔形），垂直键朝后（虚线），与楔形式的对应关系</title>
  <!-- Title -->
  <text x="10" y="18" font-size="13" font-weight="bold" fill="currentColor">Fischer 投影式约定与楔形式转换</text>
  <!-- Left: 3D wedge-dash structure -->
  <text x="20" y="40" font-size="11" font-weight="bold" fill="currentColor">楔形式（三维）</text>
  <!-- Central carbon -->
  <circle cx="90" cy="105" r="5" fill="currentColor"/>
  <!-- Top group (vertical = back, dashed) -->
  <line x1="90" y1="105" x2="90" y2="65" stroke="currentColor" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="82" y="60" font-size="12" fill="currentColor">COOH</text>
  <text x="62" y="52" font-size="10" fill="currentColor">（向后，虚线）</text>
  <!-- Bottom group (vertical = back, dashed) -->
  <line x1="90" y1="105" x2="90" y2="145" stroke="currentColor" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="78" y="158" font-size="12" fill="currentColor">CH₂OH</text>
  <text x="62" y="170" font-size="10" fill="currentColor">（向后，虚线）</text>
  <!-- Right group (horizontal = forward, wedge) -->
  <polygon points="90,105 130,100 130,110" fill="currentColor" opacity="0.85"/>
  <text x="133" y="108" font-size="12" fill="currentColor">OH</text>
  <text x="125" y="95" font-size="10" fill="currentColor">（向前，实心楔）</text>
  <!-- Left group (horizontal = forward, wedge) -->
  <polygon points="90,105 50,100 50,110" fill="currentColor" opacity="0.85"/>
  <text x="28" y="108" font-size="12" fill="currentColor">H</text>
  <text x="14" y="96" font-size="10" fill="currentColor">（向前，实心楔）</text>
  <!-- Conversion arrow -->
  <text x="168" y="108" font-size="22" fill="currentColor">⇔</text>
  <!-- Right: Fischer projection -->
  <text x="210" y="40" font-size="11" font-weight="bold" fill="currentColor">Fischer 投影式</text>
  <!-- Cross lines -->
  <line x1="260" y1="65" x2="260" y2="145" stroke="currentColor" stroke-width="1.8"/>
  <line x1="220" y1="105" x2="300" y2="105" stroke="currentColor" stroke-width="1.8"/>
  <!-- Labels -->
  <text x="252" y="60" font-size="12" fill="currentColor">COOH</text>
  <text x="250" y="158" font-size="12" fill="currentColor">CH₂OH</text>
  <text x="303" y="108" font-size="12" fill="currentColor">OH</text>
  <text x="200" y="108" font-size="12" fill="currentColor">H</text>
  <!-- Chiral carbon at cross -->
  <circle cx="260" cy="105" r="3" fill="currentColor"/>
  <!-- Annotations -->
  <text x="210" y="125" font-size="10" fill="orange">→ 水平键朝前（出纸面）</text>
  <text x="210" y="138" font-size="10" fill="currentColor">→ 垂直键朝后（入纸面）</text>
  <!-- Right side: rules -->
  <rect x="330" y="30" width="115" height="150" rx="5" fill="currentColor" opacity="0.04" stroke="currentColor" stroke-width="1"/>
  <text x="340" y="50" font-size="11" font-weight="bold" fill="currentColor">操作规则</text>
  <text x="335" y="66" font-size="10" fill="green">✓ 纸面旋转 180°</text>
  <text x="335" y="78" font-size="10" fill="green">  → 构型不变</text>
  <text x="335" y="94" font-size="10" fill="red">✗ 纸面旋转 90°</text>
  <text x="335" y="106" font-size="10" fill="red">  → 得对映体</text>
  <text x="335" y="122" font-size="10" fill="red">✗ 翻面（向纸外</text>
  <text x="335" y="134" font-size="10" fill="red">   旋转 180°）</text>
  <text x="335" y="146" font-size="10" fill="red">  → 得对映体</text>
  <text x="335" y="162" font-size="10" fill="currentColor">口诀：H竖直判，</text>
  <text x="335" y="174" font-size="10" fill="currentColor">H水平反转</text>
</svg>
