<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 185" width="400" height="185" aria-label="联苯型手性分子——位阻使两苯环不能共平面" role="img">
  <title>联苯型手性：2,2',6,6'位大体积基团使两苯环以一定角度交叉，无对称面，具手性</title>
  <!-- Title -->
  <text x="10" y="18" font-size="12" font-weight="bold" fill="currentColor">联苯型手性（轴手性，Atropisomerism）</text>
  <!-- Left ring (slightly tilted to show 3D) -->
  <g transform="translate(30, 30)">
    <text x="40" y="18" text-anchor="middle" font-size="11" fill="currentColor">苯环 A</text>
    <!-- Hexagon tilted perspective -->
    <ellipse cx="40" cy="75" rx="35" ry="20" fill="none" stroke="currentColor" stroke-width="1.8"/>
    <!-- Big groups at 2,6 positions -->
    <!-- Group 1 at top -->
    <line x1="40" y1="55" x2="40" y2="38" stroke="currentColor" stroke-width="2"/>
    <rect x="28" y="28" width="24" height="10" rx="2" fill="currentColor" opacity="0.15" stroke="currentColor" stroke-width="1"/>
    <text x="31" y="37" font-size="10" fill="currentColor">NO₂</text>
    <!-- Group 2 at bottom (6-position) -->
    <line x1="40" y1="95" x2="40" y2="108" stroke="currentColor" stroke-width="2"/>
    <rect x="28" y="108" width="24" height="10" rx="2" fill="currentColor" opacity="0.15" stroke="currentColor" stroke-width="1"/>
    <text x="32" y="117" font-size="10" fill="currentColor">COOH</text>
    <!-- Bond to right ring -->
    <line x1="72" y1="75" x2="95" y2="75" stroke="currentColor" stroke-width="2.5"/>
    <text x="62" y="130" font-size="10" fill="currentColor">（A 平面，纸面内）</text>
  </g>
  <!-- Right ring (rotated ~90° out of plane) -->
  <g transform="translate(125, 30)">
    <text x="40" y="18" text-anchor="middle" font-size="11" fill="currentColor">苯环 B</text>
    <!-- Hexagon rotated ~70° - shown as narrow ellipse to indicate perpendicular plane -->
    <ellipse cx="40" cy="75" rx="8" ry="35" fill="none" stroke="currentColor" stroke-width="1.8"/>
    <!-- Big groups at 2',6' positions (now perpendicular) -->
    <!-- Group 1 at left -->
    <line x1="32" y1="50" x2="20" y2="40" stroke="currentColor" stroke-width="2"/>
    <rect x="4" y="30" width="24" height="10" rx="2" fill="currentColor" opacity="0.15" stroke="currentColor" stroke-width="1"/>
    <text x="6" y="38" font-size="10" fill="currentColor">NO₂</text>
    <!-- Group 2 at right -->
    <line x1="48" y1="100" x2="60" y2="110" stroke="currentColor" stroke-width="2"/>
    <rect x="60" y="108" width="28" height="10" rx="2" fill="currentColor" opacity="0.15" stroke="currentColor" stroke-width="1"/>
    <text x="62" y="117" font-size="10" fill="currentColor">COOH</text>
    <text x="15" y="130" font-size="10" fill="currentColor">（B 平面，垂直纸面）</text>
  </g>
  <!-- Angle indicator -->
  <path d="M200,75 Q210,65 220,75" stroke="orange" stroke-width="2" fill="none"/>
  <text x="218" y="65" font-size="10" fill="orange">≈90°</text>
  <!-- Explanation -->
  <text x="10" y="155" font-size="11" fill="currentColor">条件：2,2',6,6' 位基团足够大 → 两环旋转受阻，被"锁"在一定角度</text>
  <text x="10" y="170" font-size="11" fill="currentColor">每个苯环两个邻位取代基不同 → 无对称面 → 手性（无手性碳原子！）</text>
</svg>
