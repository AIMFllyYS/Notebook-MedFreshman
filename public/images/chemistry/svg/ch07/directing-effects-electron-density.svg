<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200" aria-label="邻对位定位基与间位定位基电子效应对比" role="img">
  <title>邻对位定位基（给电子基）vs 间位定位基（吸电子基）的电子云密度分布对比</title>
  <!-- Title -->
  <text x="10" y="18" font-size="12" font-weight="bold" fill="currentColor">定位基的电子效应对比（电子云密度分布）</text>
  <!-- Left: ortho/para director (EDG) -->
  <text x="10" y="38" font-size="11" font-weight="bold" fill="green">邻对位定位基（给电子基）</text>
  <text x="10" y="52" font-size="10" fill="currentColor">如 −CH₃, −OH, −NH₂, −Cl（−I+C）</text>
  <!-- Benzene ring with EDG at top -->
  <polygon points="65,70 88,82 88,108 65,120 42,108 42,82" fill="none" stroke="currentColor" stroke-width="1.8"/>
  <circle cx="65" cy="95" r="14" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- EDG substituent at top -->
  <line x1="65" y1="70" x2="65" y2="55" stroke="currentColor" stroke-width="1.8"/>
  <text x="58" y="52" font-size="12" fill="green">G</text>
  <text x="50" y="48" font-size="10" fill="currentColor">(给e⁻)</text>
  <!-- High electron density at ortho (C2, C6) and para (C4) positions -->
  <circle cx="88" cy="82" r="7" fill="green" opacity="0.3"/>
  <text x="92" y="80" font-size="9" fill="green">邻</text>
  <circle cx="88" cy="108" r="7" fill="green" opacity="0.3"/>
  <text x="92" y="112" font-size="9" fill="green">邻</text>
  <circle cx="65" cy="120" r="7" fill="green" opacity="0.3"/>
  <text x="60" y="134" font-size="9" fill="green">对</text>
  <!-- Low density at meta -->
  <circle cx="42" cy="82" r="4" fill="currentColor" opacity="0.1"/>
  <circle cx="42" cy="108" r="4" fill="currentColor" opacity="0.1"/>
  <!-- Arrows showing electron flow -->
  <path d="M65,60 Q65,68 70,72" stroke="green" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
  <text x="10" y="148" font-size="10" fill="green">邻/对 位 e⁻ 密度高</text>
  <text x="10" y="162" font-size="10" fill="green">→ E⁺ 优先进攻邻/对位</text>
  <text x="10" y="176" font-size="10" fill="currentColor">（大多数致活，卤素致钝但邻对位定位）</text>
  <!-- Divider -->
  <line x1="240" y1="30" x2="240" y2="185" stroke="currentColor" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>
  <!-- Right: meta director (EWG) -->
  <text x="255" y="38" font-size="11" font-weight="bold" fill="red">间位定位基（吸电子基）</text>
  <text x="255" y="52" font-size="10" fill="currentColor">如 −NO₂, −COOH, −CN, −COR</text>
  <!-- Benzene ring with EWG at top -->
  <polygon points="315,70 338,82 338,108 315,120 292,108 292,82" fill="none" stroke="currentColor" stroke-width="1.8"/>
  <circle cx="315" cy="95" r="14" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- EWG substituent at top -->
  <line x1="315" y1="70" x2="315" y2="55" stroke="currentColor" stroke-width="1.8"/>
  <text x="308" y="52" font-size="12" fill="red">G</text>
  <text x="300" y="48" font-size="10" fill="currentColor">(吸e⁻)</text>
  <!-- Low electron density at ortho and para (EWG pulls electrons) -->
  <circle cx="338" cy="82" r="4" fill="red" opacity="0.15"/>
  <text x="342" y="80" font-size="9" fill="red">邻−</text>
  <circle cx="338" cy="108" r="4" fill="red" opacity="0.15"/>
  <text x="342" y="112" font-size="9" fill="red">邻−</text>
  <circle cx="315" cy="120" r="4" fill="red" opacity="0.15"/>
  <text x="310" y="135" font-size="9" fill="red">对−</text>
  <!-- Higher (relative) density at meta -->
  <circle cx="292" cy="82" r="7" fill="currentColor" opacity="0.15"/>
  <text x="270" y="80" font-size="9" fill="currentColor">间</text>
  <circle cx="292" cy="108" r="7" fill="currentColor" opacity="0.15"/>
  <text x="270" y="112" font-size="9" fill="currentColor">间</text>
  <!-- Arrow showing electron withdrawal -->
  <path d="M315,62 Q315,66 315,68" stroke="red" stroke-width="1.5" fill="none" stroke-dasharray="3,2" marker-end="url(#arr8)"/>
  <defs>
    <marker id="arr8" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" stroke="red" stroke-width="1.2" fill="none"/>
    </marker>
  </defs>
  <text x="255" y="148" font-size="10" fill="red">邻/对 位 e⁻ 密度降低</text>
  <text x="255" y="162" font-size="10" fill="currentColor">间位相对较高</text>
  <text x="255" y="176" font-size="10" fill="red">→ E⁺ 进攻间位（致钝）</text>
  <text x="255" y="190" font-size="10" fill="currentColor">（全部致钝 → 反应比苯慢）</text>
</svg>
