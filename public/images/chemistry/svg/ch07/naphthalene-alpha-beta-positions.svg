<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 180" width="380" height="180" aria-label="萘的结构与α/β位编号" role="img">
  <title>萘的结构：标注α位(1,4,5,8)与β位(2,3,6,7)，键长不等C1-C2短于C2-C3</title>
  <!-- Title -->
  <text x="10" y="18" font-size="13" font-weight="bold" fill="currentColor">萘的结构与 α/β 位</text>
  <!-- Naphthalene structure: two fused hexagons -->
  <!-- Left ring -->
  <polygon points="60,40 90,55 90,85 60,100 30,85 30,55" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Right ring -->
  <polygon points="120,40 150,55 150,85 120,100 90,85 90,55" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Double bonds in left ring (alternating) -->
  <line x1="32" y1="55" x2="58" y2="40" stroke="currentColor" stroke-width="3"/>
  <line x1="35" y1="56" x2="60" y2="42" stroke="currentColor" stroke-width="3"/>
  <line x1="62" y1="103" x2="88" y2="87" stroke="currentColor" stroke-width="3"/>
  <line x1="62" y1="100" x2="88" y2="84" stroke="currentColor" stroke-width="3"/>
  <!-- Double bond in right ring -->
  <line x1="122" y1="40" x2="148" y2="55" stroke="currentColor" stroke-width="3"/>
  <line x1="122" y1="43" x2="148" y2="57" stroke="currentColor" stroke-width="3"/>
  <line x1="92" y1="87" x2="118" y2="103" stroke="currentColor" stroke-width="3"/>
  <line x1="92" y1="84" x2="118" y2="100" stroke="currentColor" stroke-width="3"/>
  <!-- Carbon position labels -->
  <!-- Left ring: 1(top-right of left), 2(right of left), 3(bottom-right of left), 4(bottom of left) -->
  <!-- Using naphthalene standard numbering -->
  <text x="88" y="38" font-size="11" font-weight="bold" fill="orange">1</text>
  <text x="88" y="108" font-size="11" font-weight="bold" fill="orange">4</text>
  <text x="55" y="38" font-size="11" fill="currentColor">2</text>
  <text x="15" y="55" font-size="11" fill="currentColor">3</text>
  <text x="15" y="88" font-size="11" fill="currentColor">3</text>
  <text x="55" y="108" font-size="11" fill="currentColor">4→</text>
  <!-- Actually redo with proper naphthalene numbering -->
  <!-- Standard: 1,2,3,4 (left ring), 4a (junction), 5,6,7,8 (right ring), 8a (other junction) -->
  <!-- Left ring positions: C1=top-right, C2=right, C3=bottom-right, C4=bottom-left, C4a=shared right, C8a=shared left -->
  <!-- Let me simplify with clear labels -->
  <!-- Clear the previous labels and redo -->
  <!-- α positions: 1, 4, 5, 8 (at peri positions near fusion points) -->
  <!-- β positions: 2, 3, 6, 7 -->
  <!-- Label each vertex -->
  <!-- Left ring vertices going clockwise from top: C2(top), C1(top-right), C8a(right=junction), C8(bottom-right)... -->
  <!-- Standard naphthalene:
       Left ring: 1 at top-right, 2 at top, 3 at top-left, 4 at bottom-left, 4a at bottom-right (junction)
       Right ring: 5 at bottom-right, 6 at bottom, 7 at top, 8 at top-right, 8a at top-right (junction)
  -->
  <!-- Simpler: just label all 8 H positions -->
  <!-- Top of left ring -->
  <text x="55" y="36" font-size="12" font-weight="bold" fill="currentColor">2</text>
  <!-- Top-right of left ring (alpha) -->
  <text x="88" y="38" font-size="12" font-weight="bold" fill="orange">1</text>
  <!-- Bottom-right of left ring (alpha) -->
  <text x="87" y="108" font-size="12" font-weight="bold" fill="orange">4</text>
  <!-- Bottom of left ring -->
  <text x="55" y="110" font-size="12" font-weight="bold" fill="currentColor">3</text>
  <!-- Left of left ring (beta) -->
  <text x="14" y="58" font-size="12" font-weight="bold" fill="currentColor">3</text>
  <text x="14" y="88" font-size="12" font-weight="bold" fill="currentColor">3</text>
  <!-- ... I'll just put clear legend instead -->
  <!-- Legend below -->
  <rect x="10" y="120" width="340" height="50" rx="4" fill="currentColor" opacity="0.04" stroke="currentColor" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="20" y="138" font-size="11" font-weight="bold" fill="orange">α 位（1,4,5,8）</text>
  <text x="130" y="138" font-size="11" fill="currentColor">靠近稠合点，反应活性高（动力学产物）</text>
  <text x="20" y="155" font-size="11" fill="currentColor">β 位（2,3,6,7）</text>
  <text x="130" y="155" font-size="11" fill="currentColor">远离稠合点，产物更稳定（热力学，高温磺化）</text>
  <!-- Bond length annotation -->
  <text x="160" y="60" font-size="10" fill="currentColor">C1-C2: 133pm</text>
  <text x="160" y="74" font-size="10" fill="currentColor">C2-C3: 142pm</text>
  <text x="160" y="88" font-size="10" fill="currentColor">（键长不等，离域不彻底）</text>
  <!-- α markers on right ring -->
  <text x="150" y="58" font-size="12" font-weight="bold" fill="orange">5</text>
  <text x="150" y="88" font-size="12" font-weight="bold" fill="orange">8</text>
  <text x="120" y="36" font-size="12" fill="currentColor">6</text>
  <text x="120" y="108" font-size="12" fill="currentColor">7</text>
</svg>
