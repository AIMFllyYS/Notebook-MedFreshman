<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 190" width="480" height="190" aria-label="烯烃臭氧化断裂双键机理" role="img">
  <title>烯烃臭氧化断裂双键机理</title>
  <defs>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" stroke="currentColor" stroke-width="1.2" fill="none"/>
    </marker>
  </defs>
  <!-- Title row -->
  <text x="10" y="18" font-size="13" font-weight="bold" fill="currentColor">臭氧化断裂机理与各取代类型产物</text>
  <!-- Top row: generic alkene + O3 -->
  <text x="10" y="50" font-size="13" fill="currentColor">R</text>
  <line x1="22" y1="45" x2="42" y2="45" stroke="currentColor" stroke-width="1.8"/>
  <circle cx="42" cy="45" r="3" fill="currentColor"/>
  <line x1="42" y1="45" x2="72" y2="45" stroke="currentColor" stroke-width="2"/>
  <line x1="42" y1="51" x2="72" y2="51" stroke="currentColor" stroke-width="2"/>
  <circle cx="72" cy="48" r="3" fill="currentColor"/>
  <text x="76" y="45" font-size="13" fill="currentColor">R'</text>
  <text x="50" y="38" font-size="11" fill="currentColor">C=C</text>
  <!-- O3 label -->
  <text x="52" y="78" font-size="13" fill="currentColor">+ O₃</text>
  <!-- Arrow -->
  <text x="105" y="55" font-size="18" fill="currentColor">→</text>
  <!-- Ozonide intermediate -->
  <text x="133" y="30" font-size="11" fill="currentColor">臭氧化物中间体</text>
  <!-- Draw 5-membered ring ozonide -->
  <circle cx="175" cy="65" r="3" fill="currentColor"/>
  <circle cx="215" cy="65" r="3" fill="currentColor"/>
  <line x1="175" y1="65" x2="215" y2="65" stroke="currentColor" stroke-width="1.8"/>
  <!-- O bridge at top -->
  <ellipse cx="195" cy="45" rx="22" ry="14" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <text x="188" y="44" font-size="12" fill="currentColor">O</text>
  <line x1="175" y1="65" x2="174" y2="55" stroke="currentColor" stroke-width="1.5"/>
  <line x1="215" y1="65" x2="216" y2="55" stroke="currentColor" stroke-width="1.5"/>
  <!-- O-O fragment at bottom -->
  <text x="165" y="90" font-size="12" fill="currentColor">O—O</text>
  <line x1="175" y1="65" x2="175" y2="82" stroke="currentColor" stroke-width="1.5"/>
  <line x1="215" y1="65" x2="215" y2="82" stroke="currentColor" stroke-width="1.5"/>
  <line x1="175" y1="85" x2="215" y2="85" stroke="currentColor" stroke-width="1.5"/>
  <!-- R groups -->
  <text x="145" y="62" font-size="12" fill="currentColor">R</text>
  <line x1="157" y1="65" x2="171" y2="65" stroke="currentColor" stroke-width="1.5"/>
  <text x="218" y="62" font-size="12" fill="currentColor">R'</text>
  <!-- Arrow -->
  <text x="248" y="70" font-size="18" fill="currentColor">→</text>
  <text x="242" y="88" font-size="11" fill="currentColor">Zn/H₂O</text>
  <!-- Products -->
  <text x="278" y="30" font-size="11" fill="currentColor">断裂得醛/酮</text>
  <text x="278" y="55" font-size="13" fill="currentColor">R—CHO</text>
  <text x="350" y="55" font-size="14" fill="currentColor">+</text>
  <text x="365" y="55" font-size="13" fill="currentColor">R'—CHO</text>
  <!-- Divider -->
  <line x1="10" y1="105" x2="470" y2="105" stroke="currentColor" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- Bottom: substitution pattern table -->
  <text x="10" y="122" font-size="12" font-weight="bold" fill="currentColor">各取代类型对应臭氧化产物：</text>
  <!-- Table -->
  <text x="15" y="140" font-size="12" fill="currentColor">=CH₂（端碳）</text>
  <text x="155" y="140" font-size="12" fill="currentColor">→  HCHO（甲醛）</text>
  <text x="15" y="157" font-size="12" fill="currentColor">=CHR（一取代）</text>
  <text x="155" y="157" font-size="12" fill="currentColor">→  RCHO（醛）</text>
  <text x="15" y="174" font-size="12" fill="currentColor">=CR₂（二取代）</text>
  <text x="155" y="174" font-size="12" fill="currentColor">→  R₂C=O（酮）</text>
  <text x="300" y="140" font-size="11" fill="currentColor">氧化性条件(H₂O₂)：醛→羧酸</text>
  <text x="300" y="157" font-size="11" fill="currentColor">还原性条件(Zn/H₂O)：醛保留</text>
</svg>
