<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 200" width="440" height="200" aria-label="乙炔的sp杂化结构——直线型三键" role="img">
  <title>乙炔的sp杂化结构：σ键直线型，两个π键圆柱形包绕</title>
  <!-- Title -->
  <text x="10" y="18" font-size="13" font-weight="bold" fill="currentColor">乙炔 HC≡CH 的 sp 杂化结构</text>
  <!-- Linear sigma framework -->
  <text x="10" y="55" font-size="13" fill="currentColor">H</text>
  <line x1="22" y1="50" x2="100" y2="50" stroke="currentColor" stroke-width="2.5"/>
  <!-- Triple bond representation -->
  <line x1="100" y1="44" x2="200" y2="44" stroke="currentColor" stroke-width="2"/>
  <line x1="100" y1="50" x2="200" y2="50" stroke="currentColor" stroke-width="2"/>
  <line x1="100" y1="56" x2="200" y2="56" stroke="currentColor" stroke-width="2"/>
  <line x1="200" y1="50" x2="278" y2="50" stroke="currentColor" stroke-width="2.5"/>
  <text x="282" y="55" font-size="13" fill="currentColor">H</text>
  <!-- Carbon atoms -->
  <circle cx="100" cy="50" r="5" fill="currentColor"/>
  <circle cx="200" cy="50" r="5" fill="currentColor"/>
  <text x="92" y="78" font-size="11" fill="currentColor">C1(sp)</text>
  <text x="192" y="78" font-size="11" fill="currentColor">C2(sp)</text>
  <!-- pi bond ellipses (two perpendicular pi systems) -->
  <!-- Vertical pi bond: p orbitals in xz plane -->
  <ellipse cx="150" cy="50" rx="50" ry="20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <text x="154" y="88" font-size="11" fill="currentColor">π₁</text>
  <!-- Horizontal pi bond: p orbitals in xy plane (shown as wider ellipse in different orientation) -->
  <ellipse cx="150" cy="50" rx="20" ry="50" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7" transform="rotate(0,150,50)"/>
  <!-- Actually draw the second pi as top/bottom lobes -->
  <text x="106" y="30" font-size="11" fill="currentColor">π₂（垂直π₁）</text>
  <!-- Labels for bond types -->
  <text x="140" y="100" font-size="11" fill="currentColor">σ 键（两端相连，直线型）</text>
  <!-- p orbital lobes diagram below -->
  <text x="10" y="130" font-size="12" font-weight="bold" fill="currentColor">p 轨道侧面重叠：</text>
  <!-- Left carbon p orbital lobes (py) -->
  <ellipse cx="100" cy="150" rx="12" ry="22" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <text x="85" y="152" font-size="10" fill="currentColor">py</text>
  <!-- Right carbon p orbital lobes (py) -->
  <ellipse cx="200" cy="150" rx="12" ry="22" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <text x="205" y="152" font-size="10" fill="currentColor">py</text>
  <!-- Pi bond between them (py-py) -->
  <rect x="112" y="132" width="76" height="36" rx="18" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="130" y="152" font-size="10" fill="currentColor">π 键 1</text>
  <!-- pz orbital lobes (orthogonal) -->
  <ellipse cx="100" cy="180" rx="22" ry="12" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <text x="85" y="180" font-size="10" fill="currentColor">pz</text>
  <ellipse cx="200" cy="180" rx="22" ry="12" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <text x="205" y="180" font-size="10" fill="currentColor">pz</text>
  <rect x="122" y="172" width="56" height="16" rx="8" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="130" y="183" font-size="10" fill="currentColor">π 键 2</text>
  <!-- Summary note -->
  <text x="270" y="145" font-size="11" fill="currentColor">三键 = 1σ + 2π</text>
  <text x="270" y="162" font-size="11" fill="currentColor">键角 180°，直线型</text>
  <text x="270" y="179" font-size="11" fill="currentColor">π 电子云呈圆柱状</text>
</svg>
