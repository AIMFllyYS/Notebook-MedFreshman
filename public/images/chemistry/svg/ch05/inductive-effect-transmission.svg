<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 170" width="460" height="170" aria-label="1-氯丙烷诱导效应传递：Cl端δ-，相邻CH2依次δ+，效应逐步衰减">
  <title>1-氯丙烷诱导效应传递示意图</title>
  <style>
    text { font-family: serif; font-size: 12px; fill: currentColor; }
    line, path, polygon { stroke: currentColor; }
  </style>

  <!-- Structure: CH3 - CH2 - CH2 - Cl -->
  <!-- C1(Cl) at right, C2, C3, C4(CH3) at left -->
  <!-- Zig-zag: C4(40,90) - C3(90,65) - C2(140,90) - C1(190,65) - Cl(240,65) -->

  <line x1="40" y1="90" x2="90" y2="65" stroke-width="1.5" fill="none"/>
  <line x1="90" y1="65" x2="140" y2="90" stroke-width="1.5" fill="none"/>
  <line x1="140" y1="90" x2="190" y2="65" stroke-width="1.5" fill="none"/>
  <line x1="190" y1="65" x2="235" y2="65" stroke-width="1.5" fill="none"/>

  <!-- Atom labels -->
  <text x="20" y="105" font-size="12">CH₃</text>
  <text x="83" y="60">CH₂</text>
  <text x="133" y="105">CH₂</text>
  <text x="183" y="60">CH₂</text>
  <text x="237" y="69" font-size="14" font-weight="bold" fill="#dc2626">Cl</text>

  <!-- Delta charge labels -->
  <!-- Cl: δ- (most negative) -->
  <text x="240" y="50" font-size="12" fill="#dc2626">δ−</text>
  <!-- C1 (CH2 next to Cl): δ+ -->
  <text x="183" y="48" font-size="12" fill="#2563eb">δ+</text>
  <!-- C2: δδ+ -->
  <text x="130" y="90" font-size="11" fill="#2563eb">δδ+</text>
  <!-- C3: δδδ+ (effectively 0) -->
  <text x="80" y="48" font-size="11" fill="#2563eb">δδδ+</text>
  <!-- C4 (CH3): essentially neutral -->
  <text x="20" y="78" font-size="10" opacity="0.6">≈0</text>

  <!-- Electron-shifting arrows (σ bond polarization, arrow toward Cl) -->
  <!-- C3→C2 arrow -->
  <path d="M90,68 Q115,68 137,72" stroke-width="1.2" fill="none"/>
  <polygon points="137,72 130,68 131,76" fill="currentColor" stroke="none"/>
  <!-- C2→C1 arrow -->
  <path d="M140,88 Q162,75 185,68" stroke-width="1.2" fill="none"/>
  <polygon points="185,68 178,72 178,64" fill="currentColor" stroke="none"/>
  <!-- C1→Cl arrow -->
  <path d="M193,65 Q212,62 232,64" stroke-width="1.2" fill="none"/>
  <polygon points="232,64 225,60 226,68" fill="currentColor" stroke="none"/>

  <!-- Arrow label -->
  <text x="100" y="48" font-size="10" opacity="0.7">σ键电子云向Cl偏移</text>

  <!-- Attenuation bar -->
  <text x="10" y="130" font-size="12" font-weight="bold">衰减规律：</text>
  <text x="10" y="145" font-size="11">每经过一个 C—C 键，诱导效应衰减约 1/3</text>
  <text x="10" y="158" font-size="11">三个键后（C4 端）基本可忽略（&lt; 0.3% of original）</text>

  <!-- Attenuation visualization -->
  <!-- Bar chart: effect strength -->
  <rect x="290" y="100" width="30" height="50" fill="currentColor" opacity="0.7"/>
  <text x="293" y="160" font-size="9">Cl</text>
  <rect x="330" y="117" width="30" height="33" fill="currentColor" opacity="0.5"/>
  <text x="333" y="160" font-size="9">C1</text>
  <rect x="370" y="133" width="30" height="17" fill="currentColor" opacity="0.35"/>
  <text x="373" y="160" font-size="9">C2</text>
  <rect x="410" y="144" width="30" height="6" fill="currentColor" opacity="0.2"/>
  <text x="413" y="160" font-size="9">C3</text>

  <text x="285" y="95" font-size="10">诱导效应强度</text>
</svg>
