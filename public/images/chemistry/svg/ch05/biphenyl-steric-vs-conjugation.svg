<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 195" width="460" height="195" aria-label="联苯立体效应与共轭效应博弈：无取代联苯共平面π重叠最大，邻位大基团联苯正交避免位阻">
  <title>联苯立体效应与共轭效应博弈示意图</title>
  <style>
    text { font-family: serif; font-size: 11px; fill: currentColor; }
    line, path, ellipse { stroke: currentColor; }
  </style>

  <!-- ===== Unsubstituted biphenyl (coplanar) ===== -->
  <text x="10" y="15" font-weight="bold" font-size="12">无取代联苯（共平面）</text>
  <text x="10" y="27" font-size="10">两环共平面，π 体系重叠最大</text>

  <!-- Left benzene ring centered at (65, 95), r=30 -->
  <line x1="65" y1="65" x2="91" y2="80" stroke-width="1.5" fill="none"/>
  <line x1="91" y1="80" x2="91" y2="110" stroke-width="1.5" fill="none"/>
  <line x1="91" y1="110" x2="65" y2="125" stroke-width="1.5" fill="none"/>
  <line x1="65" y1="125" x2="39" y2="110" stroke-width="1.5" fill="none"/>
  <line x1="39" y1="110" x2="39" y2="80" stroke-width="1.5" fill="none"/>
  <line x1="39" y1="80" x2="65" y2="65" stroke-width="1.5" fill="none"/>
  <!-- inner doubles left ring -->
  <line x1="68" y1="68" x2="88" y2="78" stroke-width="1.5" fill="none"/>
  <line x1="42" y1="83" x2="42" y2="108" stroke-width="1.5" fill="none"/>
  <line x1="68" y1="122" x2="88" y2="112" stroke-width="1.5" fill="none"/>

  <!-- Right benzene ring centered at (140, 95) -->
  <line x1="140" y1="65" x2="166" y2="80" stroke-width="1.5" fill="none"/>
  <line x1="166" y1="80" x2="166" y2="110" stroke-width="1.5" fill="none"/>
  <line x1="166" y1="110" x2="140" y2="125" stroke-width="1.5" fill="none"/>
  <line x1="140" y1="125" x2="114" y2="110" stroke-width="1.5" fill="none"/>
  <line x1="114" y1="110" x2="114" y2="80" stroke-width="1.5" fill="none"/>
  <line x1="114" y1="80" x2="140" y2="65" stroke-width="1.5" fill="none"/>
  <!-- inner doubles right ring -->
  <line x1="143" y1="68" x2="163" y2="78" stroke-width="1.5" fill="none"/>
  <line x1="117" y1="83" x2="117" y2="108" stroke-width="1.5" fill="none"/>
  <line x1="143" y1="122" x2="163" y2="112" stroke-width="1.5" fill="none"/>

  <!-- Central C-C bond connecting rings -->
  <line x1="91" y1="95" x2="114" y2="95" stroke-width="1.5" fill="none"/>

  <!-- π cloud above both rings (showing delocalization) -->
  <path d="M39,62 Q103,40 166,62" stroke-width="1" stroke-dasharray="3,2" fill="none"/>
  <text x="80" y="38" font-size="9" opacity="0.8">共轭π电子云</text>
  <path d="M39,128 Q103,150 166,128" stroke-width="1" stroke-dasharray="3,2" fill="none"/>

  <!-- Dihedral angle = 0° -->
  <text x="85" y="148" font-size="11">二面角 ≈ 0°</text>
  <text x="45" y="160" font-size="10">共轭效应最强，分子最稳定</text>
  <text x="45" y="172" font-size="9" opacity="0.7">H 原子小，无位阻，两环可共平面</text>

  <!-- Divider -->
  <line x1="225" y1="8" x2="225" y2="188" stroke-width="0.5" stroke-dasharray="4,3" fill="none"/>

  <!-- ===== Substituted biphenyl (orthogonal, 90°) ===== -->
  <text x="233" y="15" font-weight="bold" font-size="12">邻位有大基团联苯（正交）</text>
  <text x="233" y="27" font-size="10">两环约 90°，π 重叠降低</text>

  <!-- Left ring in plane (normal) centered at (295, 95) -->
  <line x1="295" y1="65" x2="321" y2="80" stroke-width="1.5" fill="none"/>
  <line x1="321" y1="80" x2="321" y2="110" stroke-width="1.5" fill="none"/>
  <line x1="321" y1="110" x2="295" y2="125" stroke-width="1.5" fill="none"/>
  <line x1="295" y1="125" x2="269" y2="110" stroke-width="1.5" fill="none"/>
  <line x1="269" y1="110" x2="269" y2="80" stroke-width="1.5" fill="none"/>
  <line x1="269" y1="80" x2="295" y2="65" stroke-width="1.5" fill="none"/>
  <line x1="298" y1="68" x2="318" y2="78" stroke-width="1.5" fill="none"/>
  <line x1="272" y1="83" x2="272" y2="108" stroke-width="1.5" fill="none"/>
  <line x1="298" y1="122" x2="318" y2="112" stroke-width="1.5" fill="none"/>

  <!-- NO2 at ortho positions on left ring -->
  <line x1="321" y1="80" x2="342" y2="65" stroke-width="1.3" fill="none"/>
  <text x="344" y="62" font-size="9" fill="#dc2626">NO₂</text>
  <line x1="321" y1="110" x2="342" y2="125" stroke-width="1.3" fill="none"/>
  <text x="344" y="130" font-size="9" fill="#dc2626">NO₂</text>

  <!-- Right ring tilted (perspective, represents ~90° dihedral) -->
  <!-- Draw as compressed ellipse to show tilt -->
  <ellipse cx="385" cy="95" rx="8" ry="30" fill="none" stroke-width="1.5"/>
  <!-- ring suggestion: slightly visible -->
  <line x1="385" y1="65" x2="395" y2="80" stroke-width="1.5" fill="none" opacity="0.7"/>
  <line x1="395" y1="80" x2="395" y2="110" stroke-width="1.5" fill="none" opacity="0.7"/>
  <line x1="395" y1="110" x2="385" y2="125" stroke-width="1.5" fill="none" opacity="0.7"/>
  <line x1="385" y1="125" x2="377" y2="110" stroke-width="1.5" fill="none" opacity="0.7"/>
  <line x1="377" y1="110" x2="377" y2="80" stroke-width="1.5" fill="none" opacity="0.7"/>
  <line x1="377" y1="80" x2="385" y2="65" stroke-width="1.5" fill="none" opacity="0.7"/>
  <text x="398" y="80" font-size="9" opacity="0.7">环₂</text>
  <text x="398" y="92" font-size="9" opacity="0.7">（侧面）</text>

  <!-- Central C-C bond -->
  <line x1="321" y1="95" x2="377" y2="95" stroke-width="1.5" fill="none"/>

  <!-- 90° angle symbol -->
  <path d="M321,95 L340,80 L340,95" stroke-width="0.8" fill="none"/>
  <text x="342" y="80" font-size="10">90°</text>

  <!-- Broken conjugation arrow -->
  <path d="M295,62 Q340,45 385,65" stroke-width="0.8" stroke-dasharray="2,3" fill="none" opacity="0.4"/>
  <!-- X to show broken conjugation -->
  <line x1="336" y1="49" x2="344" y2="57" stroke-width="1.2" stroke="#dc2626" fill="#dc2626"/>
  <line x1="344" y1="49" x2="336" y2="57" stroke-width="1.2" stroke="#dc2626" fill="#dc2626"/>

  <text x="233" y="148" font-size="11">二面角 ≈ 90°</text>
  <text x="233" y="160" font-size="10">立体效应 &gt; 共轭效应</text>
  <text x="233" y="172" font-size="10">NO₂/COOH 邻位大基团 → 两环正交</text>
  <text x="233" y="184" font-size="9" opacity="0.7">π 电子重叠几乎为零，共轭能损失</text>
</svg>
