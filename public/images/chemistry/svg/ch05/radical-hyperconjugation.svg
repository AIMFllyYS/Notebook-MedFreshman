<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 215" width="520" height="215" aria-label="四种自由基σ-p超共轭稳定性对比：甲基自由基0个超共轭最不稳定到叔自由基9个C-H最稳定">
  <title>四种自由基 σ-p 超共轭稳定性对比图</title>
  <style>
    text { font-family: serif; font-size: 11px; fill: currentColor; }
    line, path, ellipse, polygon { stroke: currentColor; }
  </style>

  <!-- ===== Methyl Radical .CH3 ===== -->
  <text x="5" y="15" font-weight="bold" font-size="11">甲基自由基</text>
  <text x="5" y="26">·CH₃</text>
  <text x="5" y="37" font-size="10">sp² 平面型</text>

  <!-- Central C with 3 H, sp2 -->
  <text x="50" y="80">C</text>
  <line x1="52" y1="70" x2="52" y2="50" stroke-width="1.5" fill="none"/>
  <text x="45" y="45">H</text>
  <line x1="48" y1="82" x2="28" y2="100" stroke-width="1.5" fill="none"/>
  <text x="18" y="110">H</text>
  <line x1="58" y1="82" x2="78" y2="100" stroke-width="1.5" fill="none"/>
  <text x="79" y="110">H</text>
  <!-- p orbital -->
  <ellipse cx="54" cy="53" rx="5" ry="10" fill="none" stroke-width="1"/>
  <circle cx="54" cy="46" r="2" fill="currentColor" stroke="none"/>
  <text x="60" y="43" font-size="9">·（单电子）</text>

  <!-- Hyperconjugation count: 0 -->
  <text x="15" y="128" font-size="10" font-weight="bold">0 个相邻 C—H</text>
  <text x="15" y="140" font-size="10" font-weight="bold">0 个超共轭</text>
  <!-- Stability bar: minimal -->
  <rect x="20" y="148" width="5" height="20" fill="currentColor" opacity="0.5" stroke="none"/>
  <text x="15" y="178" font-size="9">最不稳定</text>

  <!-- Divider -->
  <line x1="115" y1="8" x2="115" y2="200" stroke-width="0.5" stroke-dasharray="4,3" fill="none"/>

  <!-- ===== Primary Radical CH3-CH2. ===== -->
  <text x="120" y="15" font-weight="bold" font-size="11">伯自由基</text>
  <text x="120" y="26">CH₃—CH₂·</text>
  <text x="120" y="37" font-size="10">3 个相邻 C—H</text>

  <!-- CH3-CH2· structure -->
  <text x="140" y="80">C</text>
  <line x1="152" y1="77" x2="175" y2="77" stroke-width="1.5" fill="none"/>
  <text x="177" y="80">C</text>
  <!-- 3 H on left C (CH3) -->
  <line x1="142" y1="72" x2="135" y2="55" stroke-width="1.3" fill="none"/>
  <text x="127" y="50">H</text>
  <line x1="140" y1="83" x2="128" y2="95" stroke-width="1.3" fill="none"/>
  <text x="118" y="104">H</text>
  <line x1="148" y1="83" x2="148" y2="98" stroke-width="1.3" fill="none"/>
  <text x="141" y="108">H</text>
  <!-- p orbital on CH2· -->
  <ellipse cx="181" cy="60" rx="5" ry="12" fill="none" stroke-width="1"/>
  <circle cx="181" cy="52" r="2" fill="currentColor" stroke="none"/>

  <!-- σ→p overlap arrows: 3 C-H bonds overlap with p orbital -->
  <path d="M138,72 Q160,60 178,65" stroke-width="0.8" stroke-dasharray="2,2" fill="none"/>
  <polygon points="178,65 171,62 172,69" fill="currentColor" stroke="none"/>
  <text x="147" y="58" font-size="8" opacity="0.7">σ→p</text>

  <text x="128" y="128" font-size="10" font-weight="bold">3 个超共轭</text>
  <rect x="135" y="148" width="20" height="20" fill="currentColor" opacity="0.5" stroke="none"/>
  <text x="130" y="178" font-size="9">稳定性↑</text>

  <!-- Divider -->
  <line x1="250" y1="8" x2="250" y2="200" stroke-width="0.5" stroke-dasharray="4,3" fill="none"/>

  <!-- ===== Secondary Radical (CH3)2CH. ===== -->
  <text x="258" y="15" font-weight="bold" font-size="11">仲自由基</text>
  <text x="258" y="26">(CH₃)₂CH·</text>
  <text x="258" y="37" font-size="10">6 个相邻 C—H</text>

  <!-- (CH3)2CH· structure: central radical C with 2 CH3 -->
  <text x="305" y="80">C·</text>
  <!-- Left CH3 -->
  <line x1="305" y1="78" x2="275" y2="60" stroke-width="1.5" fill="none"/>
  <text x="265" y="55">CH₃</text>
  <!-- Right CH3 -->
  <line x1="313" y1="78" x2="340" y2="60" stroke-width="1.5" fill="none"/>
  <text x="342" y="55">CH₃</text>
  <!-- H on central C (down) -->
  <line x1="308" y1="83" x2="308" y2="100" stroke-width="1.5" fill="none"/>
  <text x="302" y="110">H</text>

  <!-- p orbital on C -->
  <ellipse cx="308" cy="65" rx="5" ry="10" fill="none" stroke-width="1"/>
  <circle cx="308" cy="58" r="2" fill="currentColor" stroke="none"/>

  <!-- 6 σ→p arrows (3 from each CH3) -->
  <path d="M275,62 Q292,60 303,65" stroke-width="0.8" stroke-dasharray="2,2" fill="none"/>
  <polygon points="303,65 298,61 297,68" fill="currentColor" stroke="none"/>
  <path d="M342,62 Q328,60 313,65" stroke-width="0.8" stroke-dasharray="2,2" fill="none"/>
  <polygon points="313,65 319,61 320,68" fill="currentColor" stroke="none"/>
  <text x="280" y="48" font-size="8" opacity="0.7">各3个C—H</text>

  <text x="265" y="128" font-size="10" font-weight="bold">6 个超共轭</text>
  <rect x="272" y="148" width="38" height="20" fill="currentColor" opacity="0.5" stroke="none"/>
  <text x="265" y="178" font-size="9">稳定性↑↑</text>

  <!-- Divider -->
  <line x1="380" y1="8" x2="380" y2="200" stroke-width="0.5" stroke-dasharray="4,3" fill="none"/>

  <!-- ===== Tertiary Radical (CH3)3C. ===== -->
  <text x="388" y="15" font-weight="bold" font-size="11">叔自由基</text>
  <text x="388" y="26">(CH₃)₃C·</text>
  <text x="388" y="37" font-size="10">9 个相邻 C—H</text>

  <!-- (CH3)3C· structure: 3 CH3 groups -->
  <text x="445" y="90">C·</text>
  <!-- Three CH3 at 120° -->
  <line x1="447" y1="87" x2="424" y2="62" stroke-width="1.5" fill="none"/>
  <text x="412" y="57">CH₃</text>
  <line x1="453" y1="87" x2="478" y2="62" stroke-width="1.5" fill="none"/>
  <text x="480" y="57">CH₃</text>
  <line x1="447" y1="92" x2="447" y2="115" stroke-width="1.5" fill="none"/>
  <text x="438" y="126">CH₃</text>

  <!-- p orbital above C -->
  <ellipse cx="450" cy="75" rx="5" ry="10" fill="none" stroke-width="1"/>
  <circle cx="450" cy="68" r="2" fill="currentColor" stroke="none"/>

  <!-- 9 σ→p arrows (3 from each CH3) -->
  <path d="M424,64 Q437,65 444,72" stroke-width="0.8" stroke-dasharray="2,2" fill="none"/>
  <polygon points="444,72 438,70 440,77" fill="currentColor" stroke="none"/>
  <path d="M478,64 Q465,65 456,72" stroke-width="0.8" stroke-dasharray="2,2" fill="none"/>
  <polygon points="456,72 463,70 461,77" fill="currentColor" stroke="none"/>
  <path d="M448,115 Q448,95 450,80" stroke-width="0.8" stroke-dasharray="2,2" fill="none"/>
  <polygon points="450,80 447,87 453,87" fill="currentColor" stroke="none"/>
  <text x="388" y="55" font-size="8" opacity="0.7">各3个C—H</text>

  <text x="395" y="128" font-size="10" font-weight="bold">9 个超共轭</text>
  <rect x="400" y="148" width="60" height="20" fill="currentColor" opacity="0.65" stroke="none"/>
  <text x="395" y="178" font-size="9">最稳定 ★</text>

  <!-- Summary -->
  <text x="5" y="195" font-size="10">稳定性：·CH₃ &lt; 伯(R·) &lt; 仲(R₂CH·) &lt; 叔(R₃C·)　超共轭 C—H 越多越稳定</text>
</svg>
