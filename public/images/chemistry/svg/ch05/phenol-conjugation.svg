<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 210" width="500" height="210" aria-label="苯酚p-π共轭与酚氧负离子稳定：O孤对电子与苯环π体系共轭，负电荷分散到邻对位">
  <title>苯酚 p-π 共轭与酚氧负离子稳定示意图</title>
  <style>
    text { font-family: serif; font-size: 11px; fill: currentColor; }
    line, path, polygon { stroke: currentColor; }
  </style>

  <!-- ===== Phenol p-π conjugation ===== -->
  <text x="10" y="16" font-weight="bold" font-size="12">苯酚 C₆H₅OH</text>
  <text x="10" y="28" font-size="10">p-π 共轭，O 的孤对电子参与π体系</text>

  <!-- Benzene ring centered at (75, 100), r=32 -->
  <line x1="75" y1="68" x2="102" y2="84" stroke-width="1.5" fill="none"/>
  <line x1="102" y1="84" x2="102" y2="116" stroke-width="1.5" fill="none"/>
  <line x1="102" y1="116" x2="75" y2="132" stroke-width="1.5" fill="none"/>
  <line x1="75" y1="132" x2="48" y2="116" stroke-width="1.5" fill="none"/>
  <line x1="48" y1="116" x2="48" y2="84" stroke-width="1.5" fill="none"/>
  <line x1="48" y1="84" x2="75" y2="68" stroke-width="1.5" fill="none"/>
  <!-- Inner double bonds -->
  <line x1="78" y1="71" x2="100" y2="83" stroke-width="1.5" fill="none"/>
  <line x1="51" y1="87" x2="51" y2="114" stroke-width="1.5" fill="none"/>
  <line x1="78" y1="129" x2="100" y2="117" stroke-width="1.5" fill="none"/>

  <!-- OH group at bottom (para to nothing, at C1 top) -->
  <!-- Actually O-H at C1 (top position) -->
  <line x1="75" y1="132" x2="75" y2="152" stroke-width="1.5" fill="none"/>
  <text x="69" y="163">O</text>
  <line x1="81" y1="162" x2="94" y2="170" stroke-width="1.5" fill="none"/>
  <text x="96" y="174">H</text>

  <!-- O lone pair p orbital arrow into ring -->
  <path d="M69,155 Q60,135 62,110" stroke-width="1" stroke-dasharray="3,2" fill="none"/>
  <polygon points="62,110 60,118 67,115" fill="currentColor" stroke="none"/>
  <text x="20" y="140" font-size="10">孤对电子</text>
  <text x="20" y="151" font-size="10">→ 共轭</text>

  <!-- electron density arrows at ortho/para positions -->
  <text x="104" y="82" font-size="9" fill="#2563eb">↑e⁻</text>
  <text x="104" y="118" font-size="9" fill="#2563eb">↑e⁻</text>
  <text x="70" y="62" font-size="9" fill="#2563eb">↑e⁻</text>
  <text x="15" y="118" font-size="9" opacity="0.6">对位</text>
  <text x="15" y="82" font-size="9" opacity="0.6">邻位</text>

  <text x="10" y="188" font-size="11">使 O—H 键电子云向 O 偏移 → H 易离去</text>
  <text x="10" y="200" font-size="10" opacity="0.7">环己醇 pKₐ=17 vs 苯酚 pKₐ=9.99（酸性强100万倍）</text>

  <!-- Divider -->
  <line x1="170" y1="10" x2="170" y2="205" stroke-width="0.5" stroke-dasharray="4,3" fill="none"/>

  <!-- ===== Phenoxide anion resonance ===== -->
  <text x="180" y="16" font-weight="bold" font-size="12">酚氧负离子 C₆H₅O⁻</text>
  <text x="180" y="28" font-size="10">负电荷通过共轭分散到苯环邻/对位</text>

  <!-- Show 4 resonance structures abbreviated -->
  <!-- Structure 1: O- at bottom -->
  <!-- Ring 1: center (220, 100) -->
  <line x1="220" y1="68" x2="247" y2="84" stroke-width="1.5" fill="none"/>
  <line x1="247" y1="84" x2="247" y2="116" stroke-width="1.5" fill="none"/>
  <line x1="247" y1="116" x2="220" y2="132" stroke-width="1.5" fill="none"/>
  <line x1="220" y1="132" x2="193" y2="116" stroke-width="1.5" fill="none"/>
  <line x1="193" y1="116" x2="193" y2="84" stroke-width="1.5" fill="none"/>
  <line x1="193" y1="84" x2="220" y2="68" stroke-width="1.5" fill="none"/>
  <!-- inner double bonds -->
  <line x1="223" y1="71" x2="245" y2="83" stroke-width="1.5" fill="none"/>
  <line x1="196" y1="87" x2="196" y2="114" stroke-width="1.5" fill="none"/>
  <line x1="223" y1="129" x2="245" y2="117" stroke-width="1.5" fill="none"/>
  <!-- O- -->
  <line x1="220" y1="132" x2="220" y2="152" stroke-width="1.5" fill="none"/>
  <text x="214" y="163">O⁻</text>
  <text x="208" y="50" font-size="9">主共振式</text>

  <!-- Arrow to resonance -->
  <text x="258" y="108">↔</text>

  <!-- Structure 2: charge at ortho -->
  <!-- Ring 2: center (300, 100) -->
  <line x1="300" y1="68" x2="327" y2="84" stroke-width="1.5" fill="none"/>
  <line x1="327" y1="84" x2="327" y2="116" stroke-width="1.5" fill="none"/>
  <line x1="327" y1="116" x2="300" y2="132" stroke-width="1.5" fill="none"/>
  <line x1="300" y1="132" x2="273" y2="116" stroke-width="1.5" fill="none"/>
  <line x1="273" y1="116" x2="273" y2="84" stroke-width="1.5" fill="none"/>
  <line x1="273" y1="84" x2="300" y2="68" stroke-width="1.5" fill="none"/>
  <!-- partial double bond to O (C=O) -->
  <line x1="299" y1="134" x2="299" y2="152" stroke-width="1.5" fill="none"/>
  <line x1="303" y1="134" x2="303" y2="152" stroke-width="1.5" fill="none"/>
  <text x="296" y="162">O</text>
  <!-- negative charge on ring (ortho C) -->
  <text x="267" y="80" font-size="10" fill="#dc2626">⁻</text>
  <text x="288" y="50" font-size="9">邻位负电荷</text>

  <!-- Arrow to resonance -->
  <text x="338" y="108">↔</text>

  <!-- Structure 3: charge at para -->
  <!-- Ring 3: center (385, 100) -->
  <line x1="385" y1="68" x2="412" y2="84" stroke-width="1.5" fill="none"/>
  <line x1="412" y1="84" x2="412" y2="116" stroke-width="1.5" fill="none"/>
  <line x1="412" y1="116" x2="385" y2="132" stroke-width="1.5" fill="none"/>
  <line x1="385" y1="132" x2="358" y2="116" stroke-width="1.5" fill="none"/>
  <line x1="358" y1="116" x2="358" y2="84" stroke-width="1.5" fill="none"/>
  <line x1="358" y1="84" x2="385" y2="68" stroke-width="1.5" fill="none"/>
  <!-- C=O bond -->
  <line x1="384" y1="134" x2="384" y2="152" stroke-width="1.5" fill="none"/>
  <line x1="388" y1="134" x2="388" y2="152" stroke-width="1.5" fill="none"/>
  <text x="382" y="162">O</text>
  <!-- negative on para C (top) -->
  <text x="384" y="60" font-size="10" fill="#dc2626">⁻</text>
  <text x="368" y="50" font-size="9">对位负电荷</text>

  <text x="180" y="185" font-size="11">4个共振式 → 负电荷离域到邻、对位</text>
  <text x="180" y="198" font-size="10" opacity="0.7">高度离域 → 酚氧负离子比醇氧负离子稳定得多</text>
</svg>
