<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" width="500" height="220" aria-label="环己烷椅式构象a键e键分布及椅式翻转示意图：a键垂直于环面，e键平行于环面">
  <title>环己烷椅式构象 a 键与 e 键分布及椅式翻转</title>
  <style>
    text { font-family: serif; font-size: 11px; fill: currentColor; }
    line, path, polygon { stroke: currentColor; }
  </style>

  <!-- ===== Left chair with a and e bonds labeled ===== -->
  <text x="10" y="16" font-weight="bold" font-size="12">椅式₁：a/e 键标注</text>

  <!-- Chair ring: C1-C6 -->
  <!-- C1(30,120), C2(70,140), C3(110,120), C4(130,90), C5(90,70), C6(50,90) -->
  <line x1="30" y1="120" x2="70" y2="140" stroke-width="2" fill="none"/>
  <line x1="70" y1="140" x2="110" y2="120" stroke-width="2" fill="none"/>
  <line x1="110" y1="120" x2="130" y2="90" stroke-width="2" fill="none"/>
  <line x1="130" y1="90" x2="90" y2="70" stroke-width="2" fill="none"/>
  <line x1="90" y1="70" x2="50" y2="90" stroke-width="2" fill="none"/>
  <line x1="50" y1="90" x2="30" y2="120" stroke-width="2" fill="none"/>

  <!-- Axial bonds (a): vertical, alternating up/down -->
  <!-- Up axial at C1(30,120), C3(110,120), C5(90,70) -->
  <line x1="30" y1="120" x2="30" y2="95" stroke-width="1.3" fill="none"/>
  <text x="20" y="91" font-size="10" font-weight="bold" fill="#2563eb">a</text>
  <line x1="110" y1="120" x2="110" y2="95" stroke-width="1.3" fill="none"/>
  <text x="100" y="91" font-size="10" font-weight="bold" fill="#2563eb">a</text>
  <line x1="90" y1="70" x2="90" y2="45" stroke-width="1.3" fill="none"/>
  <text x="80" y="41" font-size="10" font-weight="bold" fill="#2563eb">a</text>

  <!-- Down axial at C2(70,140), C4(130,90), C6(50,90) -->
  <line x1="70" y1="140" x2="70" y2="160" stroke-width="1.3" fill="none"/>
  <text x="60" y="172" font-size="10" font-weight="bold" fill="#2563eb">a</text>
  <line x1="130" y1="90" x2="130" y2="110" stroke-width="1.3" fill="none"/>
  <text x="120" y="122" font-size="10" font-weight="bold" fill="#2563eb">a</text>
  <line x1="50" y1="90" x2="50" y2="110" stroke-width="1.3" fill="none"/>
  <text x="40" y="122" font-size="10" font-weight="bold" fill="#2563eb">a</text>

  <!-- Equatorial bonds (e): approximately parallel to ring bonds -->
  <!-- e at C1(30,120) going upper-right -->
  <line x1="30" y1="120" x2="10" y2="105" stroke-width="1.3" fill="none"/>
  <text x="0" y="102" font-size="10" font-weight="bold" fill="#dc2626">e</text>
  <!-- e at C3(110,120) going lower-right -->
  <line x1="110" y1="120" x2="142" y2="130" stroke-width="1.3" fill="none"/>
  <text x="144" y="132" font-size="10" font-weight="bold" fill="#dc2626">e</text>
  <!-- e at C5(90,70) going lower-left -->
  <line x1="90" y1="70" x2="60" y2="60" stroke-width="1.3" fill="none"/>
  <text x="48" y="57" font-size="10" font-weight="bold" fill="#dc2626">e</text>
  <!-- e at C2(70,140) going lower-left -->
  <line x1="70" y1="140" x2="45" y2="148" stroke-width="1.3" fill="none"/>
  <text x="33" y="150" font-size="10" font-weight="bold" fill="#dc2626">e</text>
  <!-- e at C4(130,90) going upper-right -->
  <line x1="130" y1="90" x2="158" y2="80" stroke-width="1.3" fill="none"/>
  <text x="160" y="78" font-size="10" font-weight="bold" fill="#dc2626">e</text>
  <!-- e at C6(50,90) going lower-right -->
  <line x1="50" y1="90" x2="20" y2="80" stroke-width="1.3" fill="none"/>
  <text x="8" y="78" font-size="10" font-weight="bold" fill="#dc2626">e</text>

  <!-- Legend -->
  <line x1="30" y1="190" x2="45" y2="190" stroke-width="1.3" fill="none"/>
  <text x="47" y="193" font-size="10" fill="#2563eb">a键（轴键，垂直于环面）</text>
  <line x1="30" y1="205" x2="45" y2="205" stroke-width="1.3" fill="none"/>
  <text x="47" y="208" font-size="10" fill="#dc2626">e键（赤道键，平行于环面）</text>

  <!-- ===== Ring flip arrow ===== -->
  <path d="M190,100 Q220,70 250,100" stroke-width="1.5" fill="none"/>
  <polygon points="250,100 242,92 242,100" fill="currentColor" stroke="none"/>
  <path d="M250,120 Q220,150 190,120" stroke-width="1.5" fill="none"/>
  <polygon points="190,120 198,128 198,120" fill="currentColor" stroke="none"/>
  <text x="200" y="108" font-size="10">翻转</text>
  <text x="198" y="120" font-size="9" opacity="0.7">45 kJ/mol</text>

  <!-- ===== Right chair (after flip, a and e swapped) ===== -->
  <text x="280" y="16" font-weight="bold" font-size="12">椅式₂：翻转后（a↔e 互换）</text>

  <!-- Chair ring flipped: C1-C6 -->
  <line x1="295" y1="90" x2="335" y2="70" stroke-width="2" fill="none"/>
  <line x1="335" y1="70" x2="375" y2="90" stroke-width="2" fill="none"/>
  <line x1="375" y1="90" x2="395" y2="120" stroke-width="2" fill="none"/>
  <line x1="395" y1="120" x2="355" y2="140" stroke-width="2" fill="none"/>
  <line x1="355" y1="140" x2="315" y2="120" stroke-width="2" fill="none"/>
  <line x1="315" y1="120" x2="295" y2="90" stroke-width="2" fill="none"/>

  <!-- Axial bonds flipped: C1(295,90), C3(375,90), C5(355,140) now down -->
  <line x1="295" y1="90" x2="295" y2="110" stroke-width="1.3" fill="none"/>
  <text x="285" y="122" font-size="10" font-weight="bold" fill="#2563eb">a</text>
  <line x1="375" y1="90" x2="375" y2="110" stroke-width="1.3" fill="none"/>
  <text x="365" y="122" font-size="10" font-weight="bold" fill="#2563eb">a</text>
  <line x1="355" y1="140" x2="355" y2="160" stroke-width="1.3" fill="none"/>
  <text x="345" y="172" font-size="10" font-weight="bold" fill="#2563eb">a</text>

  <!-- Up axial: C2(335,70), C4(395,120), C6(315,120) -->
  <line x1="335" y1="70" x2="335" y2="45" stroke-width="1.3" fill="none"/>
  <text x="325" y="41" font-size="10" font-weight="bold" fill="#2563eb">a</text>
  <line x1="395" y1="120" x2="395" y2="95" stroke-width="1.3" fill="none"/>
  <text x="385" y="91" font-size="10" font-weight="bold" fill="#2563eb">a</text>
  <line x1="315" y1="120" x2="315" y2="95" stroke-width="1.3" fill="none"/>
  <text x="305" y="91" font-size="10" font-weight="bold" fill="#2563eb">a</text>

  <!-- Equatorial bonds (e) after flip (now equatorial where axial was) -->
  <line x1="295" y1="90" x2="275" y2="80" stroke-width="1.3" fill="none"/>
  <text x="263" y="78" font-size="10" font-weight="bold" fill="#dc2626">e</text>
  <line x1="375" y1="90" x2="405" y2="80" stroke-width="1.3" fill="none"/>
  <text x="407" y="78" font-size="10" font-weight="bold" fill="#dc2626">e</text>
  <line x1="355" y1="140" x2="383" y2="150" stroke-width="1.3" fill="none"/>
  <text x="385" y="152" font-size="10" font-weight="bold" fill="#dc2626">e</text>
  <line x1="335" y1="70" x2="315" y2="57" stroke-width="1.3" fill="none"/>
  <text x="303" y="55" font-size="10" font-weight="bold" fill="#dc2626">e</text>
  <line x1="395" y1="120" x2="420" y2="128" stroke-width="1.3" fill="none"/>
  <text x="422" y="130" font-size="10" font-weight="bold" fill="#dc2626">e</text>
  <line x1="315" y1="120" x2="288" y2="130" stroke-width="1.3" fill="none"/>
  <text x="276" y="132" font-size="10" font-weight="bold" fill="#dc2626">e</text>

  <text x="280" y="192" font-size="11">翻转后：原 a 键 → e 键；原 e 键 → a 键</text>
  <text x="280" y="205" font-size="10" opacity="0.7">大基团优先占 e 键（减少1,3-二轴向位阻）</text>
</svg>
