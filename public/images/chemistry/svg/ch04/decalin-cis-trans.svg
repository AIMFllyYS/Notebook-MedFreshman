<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 210" width="500" height="210" aria-label="十氢萘顺反构象对比：反式十氢萘e,e构象两环完美椅式；顺式十氢萘a,e构象有1,3-二轴向位阻">
  <title>十氢萘顺反构象对比图</title>
  <style>
    text { font-family: serif; font-size: 11px; fill: currentColor; }
    line, polygon { stroke: currentColor; }
  </style>

  <!-- ===== trans-Decalin (反式十氢萘) ===== -->
  <text x="10" y="16" font-weight="bold" font-size="13">反式十氢萘</text>
  <text x="10" y="29" font-size="11">e,e 构象，能量低</text>

  <!-- Left chair ring: C1-C6 -->
  <!-- C1(40,110), C2(80,130), C3(120,110), C4(140,80), C5(100,60), C6(60,80) -->
  <line x1="40" y1="110" x2="80" y2="130" stroke-width="2" fill="none"/>
  <line x1="80" y1="130" x2="120" y2="110" stroke-width="2" fill="none"/>
  <line x1="120" y1="110" x2="140" y2="80" stroke-width="2" fill="none"/>
  <line x1="140" y1="80" x2="100" y2="60" stroke-width="2" fill="none"/>
  <line x1="100" y1="60" x2="60" y2="80" stroke-width="2" fill="none"/>
  <line x1="60" y1="80" x2="40" y2="110" stroke-width="2" fill="none"/>

  <!-- Right chair ring sharing C4(140,80) and C5 position, -->
  <!-- fusion bond between C4(140,80) and C5b(140,110 approximate) -->
  <!-- second ring: C4(140,80), C4b(180,60), C5b(200,80), C6b(200,110), C5(180,130), and back to C4 via C5 -->
  <!-- Actually decalin shares 2 carbons (C4a and C8a in IUPAC) -->
  <!-- Let's use: ring junction at (140,80) and (120,110) -->
  <!-- Right ring: (140,80)-(170,60)-(205,70)-(220,100)-(200,130)-(165,130)-(140,110)-(120,110) -->
  <!-- Simplify: share bond C4-C4a between the two chairs -->
  <!-- Junction carbons at C4(140,80) and C8a(120,110) -->

  <!-- Right chair: C4(140,80), C9(170,60), C10(205,70), C5(220,100), C6(200,130), C7(165,130), C8(120,110) -->
  <!-- Note: C8 = C3 of left ring (shared bond C3-C4) -->
  <line x1="140" y1="80" x2="170" y2="60" stroke-width="2" fill="none"/>
  <line x1="170" y1="60" x2="205" y2="70" stroke-width="2" fill="none"/>
  <line x1="205" y1="70" x2="220" y2="100" stroke-width="2" fill="none"/>
  <line x1="220" y1="100" x2="200" y2="130" stroke-width="2" fill="none"/>
  <line x1="200" y1="130" x2="165" y2="130" stroke-width="2" fill="none"/>
  <line x1="165" y1="130" x2="120" y2="110" stroke-width="2" fill="none"/>
  <!-- Junction bond already in left ring: C4-C3 = (140,80)-(120,110) ✓ -->

  <!-- Both fusion H in equatorial positions -->
  <!-- H at C4(140,80): equatorial, going up-right -->
  <line x1="140" y1="80" x2="155" y2="60" stroke-width="1.3" fill="none"/>
  <text x="156" y="55" font-size="10" fill="#2563eb">H(e)</text>
  <!-- H at C3=C8a(120,110): equatorial, going lower-right -->
  <line x1="120" y1="110" x2="140" y2="120" stroke-width="1.3" fill="none"/>
  <text x="141" y="122" font-size="10" fill="#2563eb">H(e)</text>

  <text x="15" y="165" font-size="11">两个稠合 H 均 e 键</text>
  <text x="15" y="178" font-size="11">两环均为完美椅式</text>
  <text x="15" y="191" font-size="10" opacity="0.7">ΔE = 0（稳定）</text>

  <!-- Divider -->
  <line x1="260" y1="10" x2="260" y2="200" stroke-width="0.5" stroke-dasharray="4,3" fill="none"/>

  <!-- ===== cis-Decalin (顺式十氢萘) ===== -->
  <text x="275" y="16" font-weight="bold" font-size="13">顺式十氢萘</text>
  <text x="275" y="29" font-size="11">a,e 构象，能量高</text>

  <!-- Left chair ring shifted right -->
  <line x1="305" y1="110" x2="345" y2="130" stroke-width="2" fill="none"/>
  <line x1="345" y1="130" x2="385" y2="110" stroke-width="2" fill="none"/>
  <line x1="385" y1="110" x2="405" y2="80" stroke-width="2" fill="none"/>
  <line x1="405" y1="80" x2="365" y2="60" stroke-width="2" fill="none"/>
  <line x1="365" y1="60" x2="325" y2="80" stroke-width="2" fill="none"/>
  <line x1="325" y1="80" x2="305" y2="110" stroke-width="2" fill="none"/>

  <!-- Right chair ring sharing C3=C8a(385,110) and C4(405,80) -->
  <line x1="405" y1="80" x2="435" y2="60" stroke-width="2" fill="none"/>
  <line x1="435" y1="60" x2="470" y2="70" stroke-width="2" fill="none"/>
  <line x1="470" y1="70" x2="485" y2="100" stroke-width="2" fill="none"/>
  <line x1="485" y1="100" x2="465" y2="130" stroke-width="2" fill="none"/>
  <line x1="465" y1="130" x2="430" y2="130" stroke-width="2" fill="none"/>
  <line x1="430" y1="130" x2="385" y2="110" stroke-width="2" fill="none"/>

  <!-- H at C4(405,80): equatorial going up-right -->
  <line x1="405" y1="80" x2="420" y2="60" stroke-width="1.3" fill="none"/>
  <text x="421" y="55" font-size="10" fill="#dc2626">H(e)</text>
  <!-- H at C3=C8a(385,110): AXIAL going down (perpendicular) -->
  <line x1="385" y1="110" x2="385" y2="135" stroke-width="1.3" fill="none"/>
  <text x="387" y="147" font-size="10" fill="#dc2626">H(a)</text>

  <!-- 1,3-diaxial interaction arrow -->
  <path d="M355,80 Q370,105 385,110 Q390,125 385,135" stroke-width="0.8" stroke-dasharray="3,2" fill="none"/>
  <text x="275" y="165" font-size="10" opacity="0.8">1,3-二轴向位阻</text>

  <text x="275" y="178" font-size="11">一个稠合 H 为 a 键，一个为 e 键</text>
  <text x="275" y="191" font-size="10" opacity="0.7">ΔE ≈ +11 kJ/mol（相对反式）</text>
</svg>
