<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <title>取代基对酚酸性的影响：吸电子基增强，给电子基减弱</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e05050"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/>
    </marker>
  </defs>

  <rect width="800" height="400" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="400" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">取代基对酚酸性的影响</text>

  <!-- ===== Panel 1: Phenol (center ~133) ===== -->
  <rect x="10" y="38" width="240" height="310" fill="#f0f8ff" stroke="#3a7bd5" stroke-width="1.5" rx="6"/>
  <text x="130" y="58" text-anchor="middle" font-size="12" font-weight="bold" fill="#3a7bd5">苯酚（基准）</text>

  <!-- Benzene ring for phenol, center 130,150 r=38 -->
  <polygon points="130,112 163,131 163,169 130,188 97,169 97,131"
           fill="none" stroke="#2c3e50" stroke-width="2"/>
  <circle cx="130" cy="150" r="19" fill="none" stroke="#2c3e50" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- O- group -->
  <line x1="130" y1="112" x2="130" y2="90" stroke="#2c3e50" stroke-width="2"/>
  <text x="130" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#cc3333">O⁻</text>
  <text x="108" y="82" text-anchor="end" font-size="10" fill="#cc3333">ArO⁻</text>

  <!-- Negative charge resonance at ortho/para -->
  <text x="97" y="128" text-anchor="middle" font-size="11" fill="#8e44ad">δ−</text>
  <text x="163" y="128" text-anchor="middle" font-size="11" fill="#8e44ad">δ−</text>
  <text x="130" y="205" text-anchor="middle" font-size="11" fill="#8e44ad">δ−</text>

  <!-- Resonance arrows -->
  <path d="M120,94 Q95,110 100,128" fill="none" stroke="#8e44ad" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="3,2"/>
  <path d="M140,94 Q158,112 158,128" fill="none" stroke="#8e44ad" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="3,2"/>
  <path d="M130,97 Q130,160 130,193" fill="none" stroke="#8e44ad" stroke-width="1.2" marker-end="url(#arr)" stroke-dasharray="3,2"/>

  <text x="130" y="222" text-anchor="middle" font-size="11" fill="#555">负电荷离域到</text>
  <text x="130" y="236" text-anchor="middle" font-size="11" fill="#555">苯环邻对位</text>

  <!-- pKa label -->
  <rect x="65" y="255" width="130" height="34" fill="#e8f4fd" stroke="#3a7bd5" stroke-width="1" rx="4"/>
  <text x="130" y="269" text-anchor="middle" font-size="12" font-weight="bold" fill="#2874a6">苯酚</text>
  <text x="130" y="283" text-anchor="middle" font-size="12" font-weight="bold" fill="#2874a6">pKa = 10.0</text>

  <text x="130" y="330" text-anchor="middle" font-size="10" fill="#555">ArO⁻ 负电荷部分离域</text>
  <text x="130" y="343" text-anchor="middle" font-size="10" fill="#555">比醇稳定，酸性强于醇</text>

  <!-- ===== Panel 2: 4-nitrophenol (center ~400) ===== -->
  <rect x="280" y="38" width="240" height="310" fill="#fff5f5" stroke="#e05050" stroke-width="1.5" rx="6"/>
  <text x="400" y="58" text-anchor="middle" font-size="12" font-weight="bold" fill="#e05050">对硝基苯酚</text>
  <text x="400" y="72" text-anchor="middle" font-size="11" fill="#e05050">−NO₂（吸电子基）</text>

  <!-- Benzene ring, center 400,150 -->
  <polygon points="400,112 433,131 433,169 400,188 367,169 367,131"
           fill="none" stroke="#2c3e50" stroke-width="2"/>
  <circle cx="400" cy="150" r="19" fill="none" stroke="#2c3e50" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- O- -->
  <line x1="400" y1="112" x2="400" y2="90" stroke="#2c3e50" stroke-width="2"/>
  <text x="400" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#cc3333">O⁻</text>

  <!-- NO2 at para position (bottom C4) -->
  <line x1="400" y1="188" x2="400" y2="208" stroke="#2c3e50" stroke-width="2"/>
  <rect x="374" y="208" width="52" height="18" fill="#fde8e8" stroke="#e05050" stroke-width="1" rx="2"/>
  <text x="400" y="221" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">NO₂</text>

  <!-- Stabilizing arrow: NO2 pulls electron -->
  <path d="M400,226 Q400,245 400,260" fill="none" stroke="#e05050" stroke-width="1.5" marker-end="url(#arr-red)" stroke-dasharray="3,2"/>
  <text x="400" y="256" text-anchor="middle" font-size="10" fill="#c0392b">↑ 进一步分散</text>
  <text x="400" y="268" text-anchor="middle" font-size="10" fill="#c0392b">负电荷</text>

  <!-- pKa -->
  <rect x="335" y="278" width="130" height="34" fill="#fde8e8" stroke="#e05050" stroke-width="1" rx="4"/>
  <text x="400" y="292" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">对硝基苯酚</text>
  <text x="400" y="306" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">pKa = 7.1</text>

  <text x="400" y="330" text-anchor="middle" font-size="10" fill="#555">−NO₂ 稳定 ArO⁻</text>
  <text x="400" y="343" text-anchor="middle" font-size="10" fill="#e05050">酸性增强 ↑</text>

  <!-- ===== Panel 3: 4-methylphenol (center ~668) ===== -->
  <rect x="550" y="38" width="240" height="310" fill="#f0fff4" stroke="#27ae60" stroke-width="1.5" rx="6"/>
  <text x="670" y="58" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">对甲苯酚</text>
  <text x="670" y="72" text-anchor="middle" font-size="11" fill="#27ae60">−CH₃（给电子基）</text>

  <!-- Benzene ring, center 670,150 -->
  <polygon points="670,112 703,131 703,169 670,188 637,169 637,131"
           fill="none" stroke="#2c3e50" stroke-width="2"/>
  <circle cx="670" cy="150" r="19" fill="none" stroke="#2c3e50" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- O- -->
  <line x1="670" y1="112" x2="670" y2="90" stroke="#2c3e50" stroke-width="2"/>
  <text x="670" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#cc3333">O⁻</text>

  <!-- CH3 at para position (bottom C4) -->
  <line x1="670" y1="188" x2="670" y2="208" stroke="#2c3e50" stroke-width="2"/>
  <rect x="648" y="208" width="44" height="18" fill="#e8f8f0" stroke="#27ae60" stroke-width="1" rx="2"/>
  <text x="670" y="221" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a8a4a">CH₃</text>

  <!-- Destabilizing arrow: CH3 pushes electron -->
  <path d="M670,226 Q670,245 670,255" fill="none" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="670" y="256" text-anchor="middle" font-size="10" fill="#1a6b3c">↓ 推电子给 O⁻</text>
  <text x="670" y="268" text-anchor="middle" font-size="10" fill="#1a6b3c">使 ArO⁻ 不稳定</text>

  <!-- pKa -->
  <rect x="605" y="278" width="130" height="34" fill="#e8f8f0" stroke="#27ae60" stroke-width="1" rx="4"/>
  <text x="670" y="292" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a8a4a">对甲苯酚</text>
  <text x="670" y="306" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a8a4a">pKa = 10.3</text>

  <text x="670" y="330" text-anchor="middle" font-size="10" fill="#555">−CH₃ 使 ArO⁻ 不稳定</text>
  <text x="670" y="343" text-anchor="middle" font-size="10" fill="#27ae60">酸性减弱 ↓</text>

  <!-- Bottom comparison bar -->
  <rect x="10" y="362" width="780" height="32" fill="#f8f8f8" stroke="#ddd" stroke-width="1" rx="4"/>
  <text x="130" y="375" text-anchor="middle" font-size="11" fill="#555">pKa 7.1</text>
  <text x="400" y="375" text-anchor="middle" font-size="11" fill="#555">pKa 10.0</text>
  <text x="670" y="375" text-anchor="middle" font-size="11" fill="#555">pKa 10.3</text>
  <text x="130" y="388" text-anchor="middle" font-size="11" fill="#e05050" font-weight="bold">酸性最强</text>
  <text x="400" y="388" text-anchor="middle" font-size="11" fill="#3a7bd5" font-weight="bold">中间</text>
  <text x="670" y="388" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="bold">酸性最弱</text>
</svg>
