<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200" aria-label="σ键与π键形成示意图：σ键头对头重叠，π键肩并肩侧面重叠">
  <title>σ键与π键形成示意图</title>
  <style>
    text { font-family: serif; font-size: 12px; fill: currentColor; }
    ellipse, line, path { stroke: currentColor; }
  </style>

  <!-- ===== σ bond (head-to-head overlap) ===== -->
  <text x="20" y="18" font-weight="bold" font-size="13">σ 键（头对头重叠）</text>

  <!-- Left orbital -->
  <ellipse cx="65" cy="90" rx="40" ry="20" fill="none" stroke-width="1.5"/>
  <ellipse cx="65" cy="90" rx="18" ry="10" fill="currentColor" opacity="0.15" stroke="none"/>
  <!-- Right orbital -->
  <ellipse cx="135" cy="90" rx="40" ry="20" fill="none" stroke-width="1.5"/>
  <ellipse cx="135" cy="90" rx="18" ry="10" fill="currentColor" opacity="0.15" stroke="none"/>

  <!-- Overlap region shaded -->
  <ellipse cx="100" cy="90" rx="20" ry="18" fill="currentColor" opacity="0.3" stroke="none"/>

  <!-- Bond axis -->
  <line x1="20" y1="90" x2="180" y2="90" stroke-width="0.7" stroke-dasharray="4,3" fill="none"/>
  <text x="17" y="88" font-size="9">轴</text>

  <!-- Labels -->
  <text x="50" y="125" font-size="11">电子云沿键轴</text>
  <text x="50" y="138" font-size="11">对称分布</text>
  <text x="50" y="155" font-size="11">可自由旋转</text>

  <!-- σ label -->
  <text x="90" y="75" font-size="14" font-style="italic">σ</text>

  <!-- Divider -->
  <line x1="200" y1="10" x2="200" y2="190" stroke-width="0.5" stroke-dasharray="4,3" fill="none"/>

  <!-- ===== π bond (side-by-side overlap) ===== -->
  <text x="215" y="18" font-weight="bold" font-size="13">π 键（肩并肩重叠）</text>

  <!-- Two parallel p orbitals - upper lobes -->
  <ellipse cx="280" cy="55" rx="18" ry="30" fill="none" stroke-width="1.5"/>
  <ellipse cx="330" cy="55" rx="18" ry="30" fill="none" stroke-width="1.5"/>
  <!-- Upper overlap -->
  <ellipse cx="305" cy="52" rx="22" ry="14" fill="currentColor" opacity="0.25" stroke="none"/>

  <!-- Bond axis line (node plane) -->
  <line x1="220" y1="90" x2="390" y2="90" stroke-width="1" stroke-dasharray="3,3" fill="none"/>
  <text x="215" y="88" font-size="9">节面</text>

  <!-- Two parallel p orbitals - lower lobes -->
  <ellipse cx="280" cy="125" rx="18" ry="30" fill="none" stroke-width="1.5"/>
  <ellipse cx="330" cy="125" rx="18" ry="30" fill="none" stroke-width="1.5"/>
  <!-- Lower overlap -->
  <ellipse cx="305" cy="128" rx="22" ry="14" fill="currentColor" opacity="0.25" stroke="none"/>

  <!-- π label -->
  <text x="296" y="87" font-size="14" font-style="italic">π</text>

  <!-- Labels -->
  <text x="218" y="170" font-size="11">电子云在键轴平面</text>
  <text x="218" y="183" font-size="11">上下两侧，不可旋转</text>

  <!-- Comparison note -->
  <text x="50" y="180" font-size="10" opacity="0.7">重叠程度：σ &gt; π</text>
</svg>
