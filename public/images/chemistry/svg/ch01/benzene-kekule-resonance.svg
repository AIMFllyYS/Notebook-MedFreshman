<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" width="400" height="180" aria-label="苯的两个Kekulé共振结构式，双向箭头连接，所有C-C键长139pm">
  <title>苯的两个 Kekulé 共振结构式</title>
  <style>
    text { font-family: serif; font-size: 12px; fill: currentColor; }
    line, polygon { stroke: currentColor; }
  </style>

  <!-- ===== Left Kekulé structure ===== -->
  <!-- Benzene hexagon centered at (90, 90), radius 45 -->
  <!-- Vertices: top(90,45), TR(129,67.5), BR(129,112.5), B(90,135), BL(51,112.5), TL(51,67.5) -->
  <!-- Single bonds: top-TL, TL-BL, BL-B; Double bonds: top-TR, TR-BR, BR-B  (alternating) -->

  <!-- All 6 C-C bonds first (single) -->
  <line x1="90" y1="45" x2="129" y2="67.5" stroke-width="1.5" fill="none"/>
  <line x1="129" y1="67.5" x2="129" y2="112.5" stroke-width="1.5" fill="none"/>
  <line x1="129" y1="112.5" x2="90" y2="135" stroke-width="1.5" fill="none"/>
  <line x1="90" y1="135" x2="51" y2="112.5" stroke-width="1.5" fill="none"/>
  <line x1="51" y1="112.5" x2="51" y2="67.5" stroke-width="1.5" fill="none"/>
  <line x1="51" y1="67.5" x2="90" y2="45" stroke-width="1.5" fill="none"/>

  <!-- Double bonds (offset inward ~4px): top-TR, BR-B, TL-BL wait offset bond -->
  <!-- top-TR double bond (offset inward) -->
  <line x1="93" y1="49" x2="127" y2="70" stroke-width="1.5" fill="none"/>
  <!-- BR - B double bond -->
  <line x1="126" y1="115" x2="93" y2="132" stroke-width="1.5" fill="none"/>
  <!-- TL - BL double bond -->
  <line x1="54" y1="70" x2="54" y2="111" stroke-width="1.5" fill="none"/>

  <!-- H labels at vertices -->
  <text x="83" y="35">H</text>
  <text x="133" y="63">H</text>
  <text x="133" y="120">H</text>
  <text x="83" y="150">H</text>
  <text x="37" y="120">H</text>
  <text x="37" y="63">H</text>

  <!-- Bond length label -->
  <text x="50" y="170" font-size="10" opacity="0.8">C-C 键长 139 pm</text>

  <!-- ===== Double-headed resonance arrow ===== -->
  <line x1="175" y1="90" x2="225" y2="90" stroke-width="1.5" fill="none"/>
  <polygon points="225,90 216,85 216,95" fill="currentColor" stroke="none"/>
  <polygon points="175,90 184,85 184,95" fill="currentColor" stroke="none"/>
  <text x="183" y="80" font-size="11">共振</text>

  <!-- ===== Right Kekulé structure (rotated double bonds) ===== -->
  <!-- Center at (310, 90), r=45 -->
  <!-- Vertices same relative positions -->
  <!-- All 6 single bonds -->
  <line x1="310" y1="45" x2="349" y2="67.5" stroke-width="1.5" fill="none"/>
  <line x1="349" y1="67.5" x2="349" y2="112.5" stroke-width="1.5" fill="none"/>
  <line x1="349" y1="112.5" x2="310" y2="135" stroke-width="1.5" fill="none"/>
  <line x1="310" y1="135" x2="271" y2="112.5" stroke-width="1.5" fill="none"/>
  <line x1="271" y1="112.5" x2="271" y2="67.5" stroke-width="1.5" fill="none"/>
  <line x1="271" y1="67.5" x2="310" y2="45" stroke-width="1.5" fill="none"/>

  <!-- Double bonds at alternating positions (opposite to left): TR-BR, B-BL, TL-top -->
  <!-- TR-BR double bond -->
  <line x1="352" y1="70" x2="352" y2="111" stroke-width="1.5" fill="none"/>
  <!-- B-BL double bond -->
  <line x1="307" y1="132" x2="274" y2="115" stroke-width="1.5" fill="none"/>
  <!-- TL-top double bond -->
  <line x1="274" y1="70" x2="307" y2="49" stroke-width="1.5" fill="none"/>

  <!-- H labels -->
  <text x="303" y="35">H</text>
  <text x="353" y="63">H</text>
  <text x="353" y="120">H</text>
  <text x="303" y="150">H</text>
  <text x="257" y="120">H</text>
  <text x="257" y="63">H</text>

  <!-- Bond length annotations -->
  <text x="266" y="170" font-size="10" opacity="0.8">单键 154 pm &lt; 139 &lt; 双键 134 pm</text>
</svg>
