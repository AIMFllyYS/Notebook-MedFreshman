<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 320" width="850" height="320" font-family="sans-serif">
  <title>Wittig反应：膦叶立德→四元环中间体→烯烃+Ph₃P=O</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" stroke="currentColor" fill="none" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" stroke="#8e44ad" fill="none" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" stroke="#c0392b" fill="none" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="850" height="320" fill="white" rx="8"/>
  <text x="425" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Wittig 反应机理</text>

  <!-- Step 1: Ylide + Carbonyl -->
  <!-- Ph3P=CH2 ylide -->
  <rect x="15" y="50" width="185" height="105" fill="#f3e5f5" stroke="#8e44ad" stroke-width="1.5" rx="6"/>
  <text x="107" y="70" text-anchor="middle" font-size="11" font-weight="bold" fill="#8e44ad">膦叶立德</text>
  <text x="25" y="98" font-size="13" fill="#8e44ad" font-weight="bold">Ph₃P</text>
  <line x1="60" y1="94" x2="80" y2="94" stroke="#8e44ad" stroke-width="2.5"/>
  <line x1="60" y1="100" x2="80" y2="100" stroke="#8e44ad" stroke-width="2.5"/>
  <text x="83" y="98" font-size="14" font-weight="bold" fill="#2980b9">C</text>
  <line x1="93" y1="94" x2="110" y2="87" stroke="#555" stroke-width="1.5"/>
  <text x="113" y="86" font-size="13" fill="#555">H</text>
  <line x1="93" y1="98" x2="110" y2="107" stroke="#555" stroke-width="1.5"/>
  <text x="113" y="110" font-size="13" fill="#555">H</text>
  <text x="78" y="82" font-size="13" fill="#2980b9">⊖</text>
  <!-- Carbanion character note -->
  <text x="107" y="128" text-anchor="middle" font-size="10" fill="#8e44ad">碳负离子特征</text>
  <text x="107" y="142" text-anchor="middle" font-size="10" fill="#7f8c8d">Ph₃P=CH₂</text>

  <!-- Plus sign -->
  <text x="210" y="105" font-size="20" fill="#555">+</text>

  <!-- Carbonyl compound -->
  <rect x="230" y="60" width="130" height="85" fill="#fdecea" stroke="#c0392b" stroke-width="1.5" rx="6"/>
  <text x="295" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">醛或酮</text>
  <text x="248" y="108" font-size="13" fill="#555">R</text>
  <line x1="260" y1="105" x2="275" y2="105" stroke="#555" stroke-width="1.5"/>
  <text x="278" y="108" font-size="13" font-weight="bold" fill="#2980b9">C</text>
  <line x1="288" y1="101" x2="312" y2="101" stroke="#c0392b" stroke-width="2.5"/>
  <line x1="288" y1="108" x2="312" y2="108" stroke="#c0392b" stroke-width="2.5"/>
  <text x="315" y="108" font-size="13" font-weight="bold" fill="#c0392b">O</text>
  <line x1="285" y1="109" x2="272" y2="125" stroke="#555" stroke-width="1.5"/>
  <text x="264" y="137" font-size="13" fill="#555">R'</text>

  <!-- Curved attack arrow -->
  <path d="M 90,93 Q 150,50 278,100" stroke="#8e44ad" fill="none" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="183" y="58" text-anchor="middle" font-size="11" fill="#8e44ad">亲核进攻</text>

  <!-- Arrow Step 1→2 -->
  <line x1="368" y1="103" x2="405" y2="103" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="387" y="94" text-anchor="middle" font-size="11" fill="#555">成键</text>

  <!-- Step 2: Oxaphosphetane (4-membered ring) -->
  <rect x="410" y="50" width="165" height="115" fill="#fff9c4" stroke="#f39c12" stroke-width="2" rx="6"/>
  <text x="492" y="70" text-anchor="middle" font-size="11" font-weight="bold" fill="#f39c12">氧磷杂环丁烷</text>
  <text x="492" y="84" text-anchor="middle" font-size="10" fill="#7f8c8d">（四元环中间体）</text>
  <!-- Draw 4-membered ring: P-C-C-O square -->
  <rect x="445" y="90" width="90" height="55" fill="none" stroke="#555" stroke-width="2.5" rx="3"/>
  <!-- P label (top-left) -->
  <text x="445" y="104" font-size="14" font-weight="bold" fill="#8e44ad">P</text>
  <!-- C label (top-right) -->
  <text x="527" y="104" font-size="14" font-weight="bold" fill="#2980b9">C</text>
  <!-- O label (bottom-right) -->
  <text x="527" y="152" font-size="14" font-weight="bold" fill="#c0392b">O</text>
  <!-- C label (bottom-left) -->
  <text x="445" y="152" font-size="14" font-weight="bold" fill="#2980b9">C</text>
  <!-- Ph3 on P -->
  <line x1="451" y1="90" x2="451" y2="73" stroke="#555" stroke-width="1.5"/>
  <text x="435" y="70" font-size="11" fill="#8e44ad">Ph₃</text>
  <!-- R groups on C (top-right) -->
  <line x1="535" y1="90" x2="545" y2="73" stroke="#555" stroke-width="1.5"/>
  <text x="546" y="70" font-size="11" fill="#555">R,R'</text>
  <!-- Ring label -->
  <text x="492" y="155" text-anchor="middle" font-size="10" fill="#7f8c8d">P–C–C–O 四元环</text>

  <!-- Arrow Step 2→3 -->
  <line x1="578" y1="103" x2="615" y2="103" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="597" y="93" text-anchor="middle" font-size="11" fill="#555">环消除</text>
  <text x="597" y="118" text-anchor="middle" font-size="10" fill="#c0392b">逆[2+2]</text>

  <!-- Step 3: Products -->
  <!-- Alkene product -->
  <rect x="620" y="50" width="110" height="75" fill="#e8f8f0" stroke="#27ae60" stroke-width="1.5" rx="6"/>
  <text x="675" y="70" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">烯烃</text>
  <text x="630" y="95" font-size="13" fill="#555">R</text>
  <line x1="641" y1="92" x2="658" y2="92" stroke="#27ae60" stroke-width="2.5"/>
  <line x1="641" y1="98" x2="658" y2="98" stroke="#27ae60" stroke-width="2.5"/>
  <text x="661" y="95" font-size="14" font-weight="bold" fill="#27ae60">C</text>
  <line x1="671" y1="90" x2="692" y2="90" stroke="#27ae60" stroke-width="2.5"/>
  <line x1="671" y1="97" x2="692" y2="97" stroke="#27ae60" stroke-width="2.5"/>
  <text x="695" y="95" font-size="14" font-weight="bold" fill="#27ae60">C</text>
  <line x1="704" y1="92" x2="716" y2="82" stroke="#555" stroke-width="1.5"/>
  <text x="717" y="80" font-size="12" fill="#555">H</text>
  <line x1="704" y1="97" x2="716" y2="108" stroke="#555" stroke-width="1.5"/>
  <text x="717" y="112" font-size="12" fill="#555">H</text>
  <text x="675" y="115" text-anchor="middle" font-size="10" fill="#7f8c8d">R'R"C=CH₂</text>

  <!-- Plus sign -->
  <text x="733" y="100" font-size="20" fill="#555">+</text>

  <!-- Ph3P=O byproduct -->
  <rect x="748" y="50" width="90" height="75" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1.5" rx="6"/>
  <text x="793" y="70" text-anchor="middle" font-size="11" font-weight="bold" fill="#95a5a6">副产物</text>
  <text x="757" y="98" font-size="12" fill="#8e44ad" font-weight="bold">Ph₃P</text>
  <line x1="788" y1="94" x2="808" y2="94" stroke="#c0392b" stroke-width="2.5"/>
  <line x1="788" y1="100" x2="808" y2="100" stroke="#c0392b" stroke-width="2.5"/>
  <text x="811" y="100" font-size="13" font-weight="bold" fill="#c0392b">O</text>
  <text x="793" y="118" text-anchor="middle" font-size="10" fill="#7f8c8d">Ph₃P=O</text>

  <!-- Key features box -->
  <rect x="15" y="185" width="820" height="120" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="6"/>
  <text x="425" y="205" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Wittig 反应特点</text>
  <text x="30" y="225" font-size="11" fill="#555">• 双键位置确定——烯键就在原羰基位置，无重排</text>
  <text x="30" y="243" font-size="11" fill="#555">• 立体选择性：不稳定叶立德 → Z 型烯烃（主）；稳定叶立德 → E 型烯烃（主）</text>
  <text x="30" y="261" font-size="11" fill="#555">• 副产物 Ph₃P=O 稳定易分离</text>
  <text x="30" y="279" font-size="11" fill="#555">• 应用：维生素 A、β-胡萝卜素等含共轭双键天然产物的合成</text>
  <text x="30" y="297" font-size="11" fill="#555">• 整体反应：R₂C=O + Ph₃P=CR'₂  →  R₂C=CR'₂ + Ph₃P=O</text>
</svg>
