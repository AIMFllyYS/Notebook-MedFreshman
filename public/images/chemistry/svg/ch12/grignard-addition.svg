<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380" font-family="sans-serif">
  <title>格氏试剂亲核加成：甲醛→1°醇，醛→2°醇，酮→3°醇</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" stroke="currentColor" fill="none" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" stroke="#2980b9" fill="none" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" stroke="#27ae60" fill="none" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="900" height="380" fill="white" rx="8"/>
  <text x="450" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">格氏试剂与醛酮亲核加成机理</text>

  <!-- Column headers -->
  <text x="100" y="52" text-anchor="middle" font-size="12" fill="#7f8c8d">底物</text>
  <text x="260" y="52" text-anchor="middle" font-size="12" fill="#7f8c8d">格氏试剂</text>
  <text x="420" y="52" text-anchor="middle" font-size="12" fill="#7f8c8d">四面体中间体</text>
  <text x="620" y="52" text-anchor="middle" font-size="12" fill="#7f8c8d">水解 (H₃O⁺)</text>
  <text x="800" y="52" text-anchor="middle" font-size="12" fill="#7f8c8d">产物</text>

  <!-- Divider line -->
  <line x1="20" y1="58" x2="880" y2="58" stroke="#eee" stroke-width="1.5"/>

  <!-- ===== Row 1: HCHO + RMgX → primary alcohol ===== -->
  <rect x="20" y="65" width="860" height="85" fill="#fef9e7" rx="4"/>
  <text x="20" y="82" font-size="11" fill="#f39c12" font-weight="bold">甲醛 → 伯醇 (1°)</text>

  <!-- HCHO -->
  <text x="65" y="115" font-size="14" font-weight="bold" fill="#2980b9">H</text>
  <line x1="75" y1="111" x2="90" y2="111" stroke="#555" stroke-width="1.5"/>
  <text x="93" y="115" font-size="14" font-weight="bold" fill="#2980b9">C</text>
  <line x1="103" y1="107" x2="127" y2="107" stroke="#c0392b" stroke-width="2.5"/>
  <line x1="103" y1="114" x2="127" y2="114" stroke="#c0392b" stroke-width="2.5"/>
  <text x="130" y="115" font-size="14" font-weight="bold" fill="#c0392b">O</text>
  <line x1="100" y1="116" x2="100" y2="133" stroke="#555" stroke-width="1.5"/>
  <text x="94" y="145" font-size="13" fill="#555">H</text>

  <!-- Arrow 1 -->
  <line x1="158" y1="112" x2="195" y2="112" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="177" y="105" text-anchor="middle" font-size="11" fill="#2980b9">RMgX</text>

  <!-- Intermediate 1 -->
  <text x="210" y="115" font-size="13" fill="#2980b9">R</text>
  <text x="225" y="105" font-size="11" fill="#2980b9">δ⁻</text>
  <path d="M 218,108 Q 235,95 250,105" stroke="#2980b9" fill="none" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="255" y="115" font-size="13" font-weight="bold" fill="#2980b9">C</text>
  <line x1="265" y1="111" x2="288" y2="111" stroke="#555" stroke-width="1.5"/>
  <text x="290" y="115" font-size="13" fill="#c0392b">O⁻MgX</text>
  <line x1="261" y1="116" x2="248" y2="132" stroke="#555" stroke-width="1.5"/>
  <text x="238" y="143" font-size="12" fill="#555">H</text>
  <line x1="261" y1="116" x2="268" y2="133" stroke="#555" stroke-width="1.5"/>
  <text x="264" y="145" font-size="12" fill="#555">H</text>

  <!-- Arrow 2 -->
  <line x1="348" y1="112" x2="385" y2="112" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="367" y="105" text-anchor="middle" font-size="10" fill="#555">H₃O⁺</text>

  <!-- Product 1: primary alcohol -->
  <text x="400" y="115" font-size="13" fill="#555">R</text>
  <line x1="412" y1="111" x2="430" y2="111" stroke="#555" stroke-width="1.5"/>
  <text x="433" y="115" font-size="13" font-weight="bold" fill="#2980b9">C</text>
  <line x1="444" y1="111" x2="462" y2="111" stroke="#555" stroke-width="1.5"/>
  <text x="464" y="115" font-size="13" fill="#c0392b">OH</text>
  <line x1="440" y1="116" x2="427" y2="132" stroke="#555" stroke-width="1.5"/>
  <text x="418" y="143" font-size="12" fill="#555">H</text>
  <line x1="440" y1="116" x2="447" y2="132" stroke="#555" stroke-width="1.5"/>
  <text x="443" y="143" font-size="12" fill="#555">H</text>
  <!-- Product label -->
  <rect x="570" y="75" width="140" height="65" fill="#27ae60" fill-opacity="0.15" stroke="#27ae60" stroke-width="1.5" rx="4"/>
  <text x="640" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">伯醇 (1°)</text>
  <text x="640" y="120" text-anchor="middle" font-size="12" fill="#27ae60">RCH₂OH</text>
  <text x="640" y="135" text-anchor="middle" font-size="11" fill="#7f8c8d">—CH₂OH 末端</text>

  <!-- ===== Row 2: RCHO + R'MgX → secondary alcohol ===== -->
  <rect x="20" y="157" width="860" height="85" fill="#e8f8f0" rx="4"/>
  <text x="20" y="174" font-size="11" fill="#27ae60" font-weight="bold">醛 → 仲醇 (2°)</text>

  <text x="60" y="207" font-size="13" fill="#555">R</text>
  <line x1="72" y1="204" x2="87" y2="204" stroke="#555" stroke-width="1.5"/>
  <text x="90" y="207" font-size="13" font-weight="bold" fill="#2980b9">C</text>
  <line x1="100" y1="200" x2="124" y2="200" stroke="#c0392b" stroke-width="2.5"/>
  <line x1="100" y1="207" x2="124" y2="207" stroke="#c0392b" stroke-width="2.5"/>
  <text x="127" y="207" font-size="13" font-weight="bold" fill="#c0392b">O</text>
  <line x1="97" y1="209" x2="97" y2="225" stroke="#555" stroke-width="1.5"/>
  <text x="90" y="237" font-size="13" fill="#555">H</text>

  <line x1="158" y1="205" x2="195" y2="205" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="177" y="198" text-anchor="middle" font-size="11" fill="#2980b9">R'MgX</text>

  <text x="208" y="207" font-size="13" fill="#555">R</text>
  <line x1="219" y1="204" x2="250" y2="204" stroke="#555" stroke-width="1.5"/>
  <text x="253" y="207" font-size="13" font-weight="bold" fill="#2980b9">C</text>
  <line x1="263" y1="200" x2="287" y2="200" stroke="#555" stroke-width="1.5"/>
  <text x="289" y="200" font-size="13" fill="#c0392b">O⁻MgX</text>
  <line x1="260" y1="209" x2="246" y2="224" stroke="#555" stroke-width="1.5"/>
  <text x="238" y="235" font-size="12" fill="#555">H</text>
  <line x1="260" y1="209" x2="268" y2="224" stroke="#555" stroke-width="1.5"/>
  <text x="264" y="235" font-size="13" fill="#2980b9">R'</text>

  <line x1="348" y1="205" x2="385" y2="205" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="367" y="198" text-anchor="middle" font-size="10" fill="#555">H₃O⁺</text>

  <text x="399" y="207" font-size="13" fill="#555">R</text>
  <line x1="410" y1="204" x2="427" y2="204" stroke="#555" stroke-width="1.5"/>
  <text x="430" y="207" font-size="13" font-weight="bold" fill="#2980b9">C</text>
  <line x1="440" y1="200" x2="460" y2="200" stroke="#555" stroke-width="1.5"/>
  <text x="462" y="200" font-size="13" fill="#c0392b">OH</text>
  <line x1="437" y1="209" x2="424" y2="224" stroke="#555" stroke-width="1.5"/>
  <text x="416" y="235" font-size="12" fill="#555">H</text>
  <line x1="437" y1="209" x2="445" y2="224" stroke="#555" stroke-width="1.5"/>
  <text x="441" y="235" font-size="13" fill="#2980b9">R'</text>

  <rect x="570" y="165" width="140" height="65" fill="#2980b9" fill-opacity="0.15" stroke="#2980b9" stroke-width="1.5" rx="4"/>
  <text x="640" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="#2980b9">仲醇 (2°)</text>
  <text x="640" y="210" text-anchor="middle" font-size="12" fill="#2980b9">RR'CHOH</text>
  <text x="640" y="225" text-anchor="middle" font-size="11" fill="#7f8c8d">两个碳取代基</text>

  <!-- ===== Row 3: R2C=O + R''MgX → tertiary alcohol ===== -->
  <rect x="20" y="250" width="860" height="85" fill="#fdecea" rx="4"/>
  <text x="20" y="267" font-size="11" fill="#c0392b" font-weight="bold">酮 → 叔醇 (3°)</text>

  <text x="50" y="300" font-size="13" fill="#555">R</text>
  <line x1="61" y1="297" x2="80" y2="297" stroke="#555" stroke-width="1.5"/>
  <text x="83" y="300" font-size="13" font-weight="bold" fill="#2980b9">C</text>
  <line x1="93" y1="293" x2="117" y2="293" stroke="#c0392b" stroke-width="2.5"/>
  <line x1="93" y1="300" x2="117" y2="300" stroke="#c0392b" stroke-width="2.5"/>
  <text x="120" y="300" font-size="13" font-weight="bold" fill="#c0392b">O</text>
  <line x1="89" y1="301" x2="75" y2="316" stroke="#555" stroke-width="1.5"/>
  <text x="66" y="328" font-size="13" fill="#555">R</text>

  <line x1="155" y1="298" x2="192" y2="298" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="174" y="291" text-anchor="middle" font-size="11" fill="#2980b9">R''MgX</text>

  <text x="205" y="300" font-size="13" fill="#555">R</text>
  <line x1="216" y1="297" x2="247" y2="297" stroke="#555" stroke-width="1.5"/>
  <text x="250" y="300" font-size="13" font-weight="bold" fill="#2980b9">C</text>
  <line x1="260" y1="293" x2="284" y2="293" stroke="#555" stroke-width="1.5"/>
  <text x="286" y="293" font-size="13" fill="#c0392b">O⁻MgX</text>
  <line x1="256" y1="302" x2="242" y2="317" stroke="#555" stroke-width="1.5"/>
  <text x="234" y="328" font-size="13" fill="#555">R</text>
  <line x1="256" y1="302" x2="264" y2="317" stroke="#555" stroke-width="1.5"/>
  <text x="260" y="328" font-size="13" fill="#2980b9">R''</text>

  <line x1="345" y1="298" x2="382" y2="298" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="364" y="291" text-anchor="middle" font-size="10" fill="#555">H₃O⁺</text>

  <text x="396" y="300" font-size="13" fill="#555">R</text>
  <line x1="407" y1="297" x2="425" y2="297" stroke="#555" stroke-width="1.5"/>
  <text x="428" y="300" font-size="13" font-weight="bold" fill="#2980b9">C</text>
  <line x1="438" y1="293" x2="458" y2="293" stroke="#555" stroke-width="1.5"/>
  <text x="460" y="293" font-size="13" fill="#c0392b">OH</text>
  <line x1="435" y1="302" x2="421" y2="317" stroke="#555" stroke-width="1.5"/>
  <text x="413" y="328" font-size="13" fill="#555">R</text>
  <line x1="435" y1="302" x2="443" y2="317" stroke="#555" stroke-width="1.5"/>
  <text x="439" y="328" font-size="13" fill="#2980b9">R''</text>

  <rect x="570" y="258" width="140" height="65" fill="#c0392b" fill-opacity="0.12" stroke="#c0392b" stroke-width="1.5" rx="4"/>
  <text x="640" y="282" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">叔醇 (3°)</text>
  <text x="640" y="302" text-anchor="middle" font-size="12" fill="#c0392b">RR'R''COH</text>
  <text x="640" y="317" text-anchor="middle" font-size="11" fill="#7f8c8d">三个碳取代基</text>

  <!-- Mg-O bond label -->
  <text x="760" y="185" text-anchor="middle" font-size="11" fill="#8e44ad">Mg–O 键</text>
  <text x="760" y="198" text-anchor="middle" font-size="11" fill="#8e44ad">（配位键）</text>
  <text x="760" y="215" text-anchor="middle" font-size="10" fill="#7f8c8d">水解断裂得醇</text>
</svg>
