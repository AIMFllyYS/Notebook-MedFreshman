<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380" font-family="sans-serif">
  <title>共轭醛酮1,2-加成vs1,4-加成（Michael加成）</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" stroke="currentColor" fill="none" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" stroke="#2980b9" fill="none" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" stroke="#e67e22" fill="none" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" stroke="#27ae60" fill="none" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="800" height="380" fill="white" rx="8"/>
  <text x="400" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">共轭醛酮 1,2-加成 vs 1,4-加成</text>

  <!-- Conjugated system: CH2=CH-CH=O (but-2-enal) with numbering -->
  <!-- Atoms: C4=C3-C2=C1(O) -->
  <rect x="220" y="42" width="360" height="80" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1.5" rx="6"/>
  <text x="400" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">共轭体系（丁烯醛 CH₂=CH-CH=O）</text>

  <!-- C4 -->
  <text x="250" y="100" font-size="14" font-weight="bold" fill="#e67e22">C</text>
  <text x="245" y="115" font-size="11" fill="#e67e22">C4(β)</text>
  <line x1="258" y1="97" x2="276" y2="97" stroke="#27ae60" stroke-width="2.5"/>
  <line x1="258" y1="103" x2="276" y2="103" stroke="#27ae60" stroke-width="2.5"/>
  <!-- C3 -->
  <text x="278" y="100" font-size="14" font-weight="bold" fill="#555">C</text>
  <text x="273" y="115" font-size="11" fill="#7f8c8d">C3</text>
  <line x1="287" y1="100" x2="315" y2="100" stroke="#555" stroke-width="1.5"/>
  <!-- C2 -->
  <text x="318" y="100" font-size="14" font-weight="bold" fill="#2980b9">C</text>
  <text x="313" y="115" font-size="11" fill="#2980b9">C2(α)</text>
  <line x1="328" y1="96" x2="356" y2="96" stroke="#c0392b" stroke-width="2.5"/>
  <line x1="328" y1="103" x2="356" y2="103" stroke="#c0392b" stroke-width="2.5"/>
  <!-- C1=O (carbonyl) -->
  <text x="359" y="100" font-size="14" font-weight="bold" fill="#2980b9">C</text>
  <text x="354" y="115" font-size="11" fill="#2980b9">C1</text>
  <line x1="369" y1="96" x2="393" y2="96" stroke="#c0392b" stroke-width="2.5"/>
  <line x1="369" y1="103" x2="393" y2="103" stroke="#c0392b" stroke-width="2.5"/>
  <text x="397" y="100" font-size="14" font-weight="bold" fill="#c0392b">O</text>

  <!-- H2 on C4 -->
  <line x1="253" y1="97" x2="240" y2="82" stroke="#555" stroke-width="1.5"/>
  <text x="230" y="80" font-size="12" fill="#555">H</text>
  <line x1="253" y1="103" x2="240" y2="115" stroke="#555" stroke-width="1.5"/>
  <text x="230" y="119" font-size="12" fill="#555">H</text>
  <!-- H on C3 -->
  <line x1="285" y1="96" x2="285" y2="80" stroke="#555" stroke-width="1.5"/>
  <text x="280" y="77" font-size="12" fill="#555">H</text>
  <!-- H on C2 -->
  <line x1="325" y1="96" x2="325" y2="80" stroke="#555" stroke-width="1.5"/>
  <text x="320" y="77" font-size="12" fill="#555">H</text>
  <!-- H on C1 (aldehyde H) -->
  <line x1="366" y1="100" x2="366" y2="116" stroke="#555" stroke-width="1.5"/>
  <text x="360" y="128" font-size="12" fill="#555">H</text>

  <!-- Nu- label -->
  <text x="440" y="90" font-size="13" fill="#8e44ad" font-weight="bold">Nu⁻</text>
  <text x="438" y="108" font-size="10" fill="#8e44ad">亲核试剂</text>

  <!-- LHBR: Conjugation resonance showing C4 partial positive -->
  <text x="450" y="78" font-size="10" fill="#e67e22">C4: δ⁺（共轭极化）</text>

  <!-- Two arrows going down to two pathways -->
  <!-- Left arrow to 1,2-addition -->
  <line x1="320" y1="132" x2="220" y2="175" stroke="#2980b9" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="235" y="162" font-size="11" fill="#2980b9">Nu 进攻 C1</text>

  <!-- Right arrow to 1,4-addition -->
  <line x1="350" y1="132" x2="540" y2="175" stroke="#e67e22" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="510" y="162" font-size="11" fill="#e67e22">Nu 进攻 C4</text>

  <!-- ===== 1,2-Addition (Left) ===== -->
  <rect x="15" y="180" width="320" height="155" fill="#e8f4fd" stroke="#2980b9" stroke-width="2" rx="6"/>
  <text x="175" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#2980b9">1,2-加成</text>
  <text x="175" y="216" text-anchor="middle" font-size="10" fill="#7f8c8d">（动力学产物）</text>

  <!-- Product: allylic alcohol -->
  <!-- CH2=CH-CH(Nu)(O-) → protonation → CH2=CH-CH(Nu)(OH) -->
  <text x="30" y="250" font-size="12" fill="#555">Nu</text>
  <line x1="46" y1="247" x2="60" y2="247" stroke="#555" stroke-width="1.5"/>
  <text x="63" y="250" font-size="12" font-weight="bold" fill="#2980b9">C</text>
  <line x1="73" y1="247" x2="87" y2="247" stroke="#555" stroke-width="1.5"/>
  <line x1="73" y1="252" x2="87" y2="252" stroke="#555" stroke-width="1.5"/>
  <text x="90" y="250" font-size="12" font-weight="bold" fill="#555">CH</text>
  <line x1="106" y1="247" x2="120" y2="247" stroke="#555" stroke-width="1.5"/>
  <text x="122" y="250" font-size="12" font-weight="bold" fill="#555">CH</text>
  <line x1="137" y1="243" x2="155" y2="243" stroke="#555" stroke-width="1.5"/>
  <text x="157" y="243" font-size="12" fill="#c0392b">O⁻</text>
  <line x1="134" y1="250" x2="134" y2="264" stroke="#555" stroke-width="1.5"/>
  <text x="128" y="275" font-size="12" fill="#555">H</text>

  <!-- Protonation step -->
  <text x="175" y="295" text-anchor="middle" font-size="10" fill="#555">↓ H⁺（质子化）</text>

  <!-- Final 1,2-product: allylic alcohol -->
  <text x="30" y="325" font-size="12" fill="#555">Nu</text>
  <line x1="46" y1="322" x2="60" y2="322" stroke="#555" stroke-width="1.5"/>
  <text x="63" y="325" font-size="12" font-weight="bold" fill="#2980b9">CH</text>
  <line x1="78" y1="322" x2="92" y2="322" stroke="#555" stroke-width="1.5"/>
  <line x1="78" y1="316" x2="92" y2="316" stroke="#555" stroke-width="1.5"/>
  <text x="94" y="325" font-size="12" font-weight="bold" fill="#555">CH</text>
  <line x1="110" y1="322" x2="124" y2="322" stroke="#555" stroke-width="1.5"/>
  <text x="126" y="325" font-size="12" font-weight="bold" fill="#555">CH</text>
  <line x1="141" y1="318" x2="159" y2="318" stroke="#555" stroke-width="1.5"/>
  <text x="161" y="318" font-size="12" fill="#c0392b">OH</text>
  <line x1="138" y1="325" x2="138" y2="339" stroke="#555" stroke-width="1.5"/>
  <text x="132" y="350" font-size="12" fill="#555">H</text>
  <text x="220" y="330" font-size="11" fill="#2980b9">烯丙醇型产物</text>
  <text x="220" y="346" font-size="10" fill="#7f8c8d">C=C 保留，-OH 在 C1</text>

  <!-- ===== 1,4-Addition (Right) ===== -->
  <rect x="460" y="180" width="325" height="155" fill="#fff3e0" stroke="#e67e22" stroke-width="2" rx="6"/>
  <text x="622" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">1,4-加成（Michael 加成）</text>
  <text x="622" y="216" text-anchor="middle" font-size="10" fill="#7f8c8d">（热力学产物）</text>

  <!-- Enolate intermediate -->
  <text x="475" y="250" font-size="12" fill="#555">Nu</text>
  <line x1="491" y1="247" x2="505" y2="247" stroke="#555" stroke-width="1.5"/>
  <text x="508" y="250" font-size="12" font-weight="bold" fill="#e67e22">CH₂</text>
  <line x1="526" y1="247" x2="540" y2="247" stroke="#555" stroke-width="1.5"/>
  <line x1="526" y1="252" x2="540" y2="252" stroke="#555" stroke-width="1.5"/>
  <text x="542" y="250" font-size="12" font-weight="bold" fill="#555">CH</text>
  <line x1="558" y1="247" x2="572" y2="247" stroke="#555" stroke-width="1.5"/>
  <text x="574" y="250" font-size="12" font-weight="bold" fill="#555">CH</text>
  <line x1="589" y1="244" x2="607" y2="244" stroke="#c0392b" stroke-width="2.5"/>
  <line x1="589" y1="250" x2="607" y2="250" stroke="#c0392b" stroke-width="2.5"/>
  <text x="610" y="250" font-size="12" font-weight="bold" fill="#c0392b">O⁻</text>
  <text x="571" y="268" text-anchor="middle" font-size="10" fill="#7f8c8d">烯醇负离子中间体</text>

  <!-- Protonation & tautomerism step -->
  <text x="622" y="290" text-anchor="middle" font-size="10" fill="#555">↓ H⁺（质子化）→ 互变异构</text>

  <!-- Final 1,4-product: saturated carbonyl -->
  <text x="475" y="325" font-size="12" fill="#555">Nu</text>
  <line x1="491" y1="322" x2="505" y2="322" stroke="#555" stroke-width="1.5"/>
  <text x="508" y="325" font-size="12" font-weight="bold" fill="#e67e22">CH₂</text>
  <line x1="526" y1="322" x2="540" y2="322" stroke="#555" stroke-width="1.5"/>
  <text x="542" y="325" font-size="12" font-weight="bold" fill="#555">CH₂</text>
  <line x1="560" y1="322" x2="574" y2="322" stroke="#555" stroke-width="1.5"/>
  <text x="576" y="325" font-size="12" font-weight="bold" fill="#555">CH</text>
  <line x1="591" y1="318" x2="615" y2="318" stroke="#c0392b" stroke-width="2.5"/>
  <line x1="591" y1="325" x2="615" y2="325" stroke="#c0392b" stroke-width="2.5"/>
  <text x="618" y="325" font-size="12" font-weight="bold" fill="#c0392b">O</text>
  <line x1="588" y1="326" x2="588" y2="340" stroke="#555" stroke-width="1.5"/>
  <text x="582" y="352" font-size="12" fill="#555">H</text>
  <text x="670" y="330" font-size="11" fill="#e67e22">饱和羰基产物</text>
  <text x="670" y="346" font-size="10" fill="#7f8c8d">C=C 消失，Nu 在 C4</text>

  <!-- Selection rule annotation at bottom -->
  <rect x="15" y="343" width="770" height="28" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="4"/>
  <text x="400" y="361" text-anchor="middle" font-size="11" fill="#555">硬亲核试剂（RLi、RMgX）→ 1,2-加成（动力学）；软亲核试剂（R₂CuLi、RS⁻）→ 1,4-加成（热力学）</text>
</svg>
