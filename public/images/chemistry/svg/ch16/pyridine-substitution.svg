<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <title>吡啶亲电取代β位vs亲核取代α位的中间体稳定性对比</title>
  <style>
    text { font-family: sans-serif; fill: currentColor; }
    .atom { font-size: 12px; font-weight: bold; }
    .label { font-size: 11px; }
    .note { font-size: 10px; fill: #555; }
    .title { font-size: 13px; font-weight: bold; }
    .bond { stroke: currentColor; stroke-width: 1.6; fill: none; }
    .bond2 { stroke: currentColor; stroke-width: 1.2; fill: none; }
    .arrow-rx { stroke: #333; stroke-width: 1.8; fill: none; marker-end: url(#rxArr); }
    .resonance { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#resArr); marker-start: url(#resArrL); }
    .bad { fill: rgba(220,50,50,0.15); stroke: #cc3333; stroke-width: 1; rx: 6; }
    .good { fill: rgba(50,150,50,0.15); stroke: #338833; stroke-width: 1; }
    .charge-pos { fill: #cc3333; font-size: 11px; font-weight: bold; }
    .charge-neg { fill: #1155aa; font-size: 11px; font-weight: bold; }
    .section-bg-e { fill: #fff8f0; stroke: #ddaa66; stroke-width: 1; }
    .section-bg-n { fill: #f0f4ff; stroke: #6688cc; stroke-width: 1; }
  </style>
  <defs>
    <marker id="rxArr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#333"/>
    </marker>
    <marker id="resArr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#666"/>
    </marker>
    <marker id="resArrL" markerWidth="6" markerHeight="6" refX="1" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L6,3 L0,6 Z" fill="#666"/>
    </marker>
  </defs>

  <rect width="900" height="420" fill="white" rx="8"/>

  <!-- ======= TOP SECTION: Electrophilic Substitution at β-position ======= -->
  <rect x="10" y="10" width="880" height="188" rx="6" class="section-bg-e"/>
  <text x="450" y="30" class="title" text-anchor="middle" fill="#cc6600">亲电取代（E⁺ 进攻 β 位 / 3-位）→ 正电荷不落在 N 上 → 较稳定</text>

  <!-- Pyridine + E+ → intermediate -->
  <!-- Draw small pyridine rings as reaction scheme -->

  <!-- Step 1: Pyridine + E+ -->
  <!-- Mini hexagon at (80,110), r=36 -->
  <text x="80" y="48" class="label" text-anchor="middle" fill="#cc6600">吡啶</text>
  <line x1="80" y1="74" x2="111" y2="92" class="bond"/>
  <line x1="111" y1="92" x2="111" y2="128" class="bond"/>
  <line x1="111" y1="128" x2="80" y2="146" class="bond"/>
  <line x1="80" y1="146" x2="49" y2="128" class="bond"/>
  <line x1="49" y1="128" x2="49" y2="92" class="bond"/>
  <line x1="49" y1="92" x2="80" y2="74" class="bond"/>
  <circle cx="80" cy="110" r="20" stroke="#4477cc" stroke-width="1.2" fill="none" stroke-dasharray="3,2"/>
  <text x="80" y="72" class="atom" text-anchor="middle" fill="#cc3333">N</text>
  <!-- E+ label -->
  <text x="130" y="115" font-size="12" font-weight="bold" fill="#cc6600">+ E⁺</text>

  <!-- Arrow -->
  <line x1="158" y1="110" x2="178" y2="110" class="arrow-rx"/>

  <!-- Wheland intermediate: E at C3(beta) -->
  <!-- Ring at (240, 110) -->
  <text x="240" y="48" class="label" text-anchor="middle" fill="#cc6600">Wheland 中间体 (β 进攻)</text>
  <!-- Draw ring: N(top)=240,74; C2=271,92; C3=271,128(sp3,E attached); C4=240,146; C5=209,128; C6=209,92 -->
  <line x1="240" y1="74" x2="271" y2="92" class="bond"/>
  <line x1="271" y1="92" x2="271" y2="128" class="bond2"/>
  <!-- C3 sp3 - single bonds -->
  <line x1="271" y1="128" x2="240" y2="146" class="bond"/>
  <line x1="240" y1="146" x2="209" y2="128" class="bond"/>
  <line x1="240" y1="74" x2="209" y2="92" class="bond"/>
  <line x1="209" y1="92" x2="209" y2="128" class="bond2"/>
  <!-- Double bond C4-C5 -->
  <line x1="237" y1="146" x2="206" y2="128" class="bond2" stroke-dasharray="none"/>

  <text x="240" y="72" class="atom" text-anchor="middle" fill="#cc3333">N</text>
  <text x="279" y="97" class="atom">C2</text>
  <!-- C3 with E -->
  <text x="279" y="133" class="atom">C3</text>
  <text x="295" y="133" class="atom" fill="#cc6600">E</text>
  <text x="240" y="158" class="atom" text-anchor="middle">C4</text>
  <text x="193" y="133" class="atom" text-anchor="end">C5</text>
  <text x="193" y="97" class="atom" text-anchor="end">C6</text>
  <!-- Positive charge at C4 -->
  <text x="248" y="162" class="charge-pos">⊕</text>

  <!-- Resonance arrow -->
  <line x1="305" y1="110" x2="325" y2="110" class="resonance"/>

  <!-- Resonance structure 2: charge at C2 -->
  <text x="390" y="48" class="label" text-anchor="middle" fill="#cc6600">共振式 (⊕ 在 C2)</text>
  <line x1="390" y1="74" x2="421" y2="92" class="bond"/>
  <line x1="421" y1="92" x2="421" y2="128" class="bond"/>
  <line x1="421" y1="128" x2="390" y2="146" class="bond"/>
  <line x1="390" y1="146" x2="359" y2="128" class="bond"/>
  <line x1="359" y1="128" x2="359" y2="92" class="bond2"/>
  <line x1="359" y1="92" x2="390" y2="74" class="bond2"/>
  <line x1="388" y1="74" x2="419" y2="90" class="bond2"/>
  <!-- E still at C3 -->
  <line x1="421" y1="128" x2="440" y2="136" class="bond" stroke-width="1.2"/>
  <text x="444" y="140" class="atom" fill="#cc6600">E</text>
  <text x="390" y="72" class="atom" text-anchor="middle" fill="#cc3333">N</text>
  <text x="429" y="97" class="atom">C2</text>
  <!-- ⊕ at C2 -->
  <text x="433" y="100" class="charge-pos">⊕</text>
  <text x="429" y="133" class="atom">C3</text>
  <text x="390" y="158" class="atom" text-anchor="middle">C4</text>
  <text x="351" y="133" class="atom" text-anchor="end">C5</text>
  <text x="351" y="97" class="atom" text-anchor="end">C6</text>

  <!-- Resonance arrow -->
  <line x1="458" y1="110" x2="478" y2="110" class="resonance"/>

  <!-- Resonance structure 3: charge at C6 -->
  <text x="545" y="48" class="label" text-anchor="middle" fill="#cc6600">共振式 (⊕ 在 C6，不在 N)</text>
  <line x1="545" y1="74" x2="576" y2="92" class="bond"/>
  <line x1="576" y1="92" x2="576" y2="128" class="bond"/>
  <line x1="576" y1="128" x2="545" y2="146" class="bond"/>
  <line x1="545" y1="146" x2="514" y2="128" class="bond"/>
  <line x1="514" y1="128" x2="514" y2="92" class="bond2"/>
  <line x1="543" y1="74" x2="514" y2="90" class="bond2"/>
  <line x1="545" y1="74" x2="576" y2="90" class="bond2"/>
  <line x1="576" y1="128" x2="595" y2="136" class="bond" stroke-width="1.2"/>
  <text x="599" y="140" class="atom" fill="#cc6600">E</text>
  <text x="545" y="72" class="atom" text-anchor="middle" fill="#cc3333">N</text>
  <text x="584" y="97" class="atom">C2</text>
  <text x="584" y="133" class="atom">C3</text>
  <text x="545" y="158" class="atom" text-anchor="middle">C4</text>
  <text x="506" y="133" class="atom" text-anchor="end">C5</text>
  <text x="506" y="97" class="atom" text-anchor="end">C6</text>
  <!-- ⊕ at C6 -->
  <text x="499" y="100" class="charge-pos">⊕</text>

  <!-- Good label -->
  <rect x="630" y="70" width="240" height="72" rx="5" class="good"/>
  <text x="750" y="88" font-size="11" text-anchor="middle" fill="#338833" font-weight="bold">β 进攻优点：</text>
  <text x="750" y="104" font-size="10" text-anchor="middle" fill="#338833">所有共振结构中</text>
  <text x="750" y="118" font-size="10" text-anchor="middle" fill="#338833">正电荷均不落在 N 上</text>
  <text x="750" y="132" font-size="10" text-anchor="middle" fill="#338833">→ 中间体相对稳定</text>

  <text x="450" y="183" font-size="10" text-anchor="middle" fill="#cc6600" font-family="sans-serif">注：若进攻 α/γ 位，某共振结构正电荷落在 N 上（⊕N，极不稳定）→ 中间体不稳定 → 因此 β 位优先</text>

  <!-- ======= BOTTOM SECTION: Nucleophilic Substitution at α-position ======= -->
  <rect x="10" y="207" width="880" height="188" rx="6" class="section-bg-n"/>
  <text x="450" y="228" class="title" text-anchor="middle" fill="#1155aa">亲核取代（Nu:⁻ 进攻 α 位 / 2-位）→ 负电荷落在 N 上 → 被 N 电负性稳定</text>

  <!-- Pyridine + Nu- -->
  <text x="80" y="248" class="label" text-anchor="middle" fill="#1155aa">吡啶</text>
  <line x1="80" y1="270" x2="111" y2="288" class="bond"/>
  <line x1="111" y1="288" x2="111" y2="324" class="bond"/>
  <line x1="111" y1="324" x2="80" y2="342" class="bond"/>
  <line x1="80" y1="342" x2="49" y2="324" class="bond"/>
  <line x1="49" y1="324" x2="49" y2="288" class="bond"/>
  <line x1="49" y1="288" x2="80" y2="270" class="bond"/>
  <circle cx="80" cy="306" r="20" stroke="#4477cc" stroke-width="1.2" fill="none" stroke-dasharray="3,2"/>
  <text x="80" y="268" class="atom" text-anchor="middle" fill="#cc3333">N</text>
  <text x="130" y="311" font-size="12" font-weight="bold" fill="#1155aa">+ Nu:⁻</text>
  <line x1="158" y1="306" x2="178" y2="306" class="arrow-rx"/>

  <!-- Meisenheimer complex: Nu at C2(alpha) -->
  <text x="240" y="248" class="label" text-anchor="middle" fill="#1155aa">Meisenheimer 络合物 (α 进攻)</text>
  <line x1="240" y1="270" x2="271" y2="288" class="bond"/>
  <line x1="271" y1="288" x2="271" y2="324" class="bond2"/>
  <line x1="271" y1="324" x2="240" y2="342" class="bond"/>
  <line x1="240" y1="342" x2="209" y2="324" class="bond"/>
  <line x1="209" y1="324" x2="209" y2="288" class="bond"/>
  <line x1="209" y1="288" x2="240" y2="270" class="bond2"/>
  <!-- Nu at C2 -->
  <line x1="271" y1="288" x2="292" y2="279" class="bond" stroke-width="1.2"/>
  <text x="296" y="283" class="atom" fill="#1155aa">Nu</text>
  <text x="240" y="268" class="atom" text-anchor="middle" fill="#cc3333">N</text>
  <text x="279" y="293" class="atom">C2</text>
  <text x="279" y="329" class="atom">C3</text>
  <text x="240" y="354" class="atom" text-anchor="middle">C4</text>
  <text x="193" y="329" class="atom" text-anchor="end">C5</text>
  <text x="193" y="293" class="atom" text-anchor="end">C6</text>
  <!-- negative charge at C3 -->
  <text x="282" y="336" class="charge-neg">⊖</text>

  <line x1="310" y1="306" x2="330" y2="306" class="resonance"/>

  <!-- Resonance 2: charge at N -->
  <text x="400" y="248" class="label" text-anchor="middle" fill="#1155aa">共振式 (⊖ 在 N) ← 关键！</text>
  <line x1="400" y1="270" x2="431" y2="288" class="bond"/>
  <line x1="431" y1="288" x2="431" y2="324" class="bond2"/>
  <line x1="431" y1="324" x2="400" y2="342" class="bond"/>
  <line x1="400" y1="342" x2="369" y2="324" class="bond"/>
  <line x1="369" y1="324" x2="369" y2="288" class="bond2"/>
  <line x1="369" y1="288" x2="400" y2="270" class="bond"/>
  <line x1="398" y1="270" x2="369" y2="286" class="bond2"/>
  <line x1="431" y1="288" x2="452" y2="279" class="bond" stroke-width="1.2"/>
  <text x="456" y="283" class="atom" fill="#1155aa">Nu</text>
  <text x="400" y="268" class="atom" text-anchor="middle" fill="#1155aa">N</text>
  <!-- ⊖ on N -->
  <text x="407" y="262" class="charge-neg">⊖</text>
  <text x="439" y="293" class="atom">C2</text>
  <text x="439" y="329" class="atom">C3</text>
  <text x="400" y="354" class="atom" text-anchor="middle">C4</text>
  <text x="361" y="329" class="atom" text-anchor="end">C5</text>
  <text x="361" y="293" class="atom" text-anchor="end">C6</text>

  <line x1="470" y1="306" x2="490" y2="306" class="resonance"/>

  <!-- Resonance 3: charge at C5 -->
  <text x="560" y="248" class="label" text-anchor="middle" fill="#1155aa">共振式 (⊖ 在 C5)</text>
  <line x1="560" y1="270" x2="591" y2="288" class="bond"/>
  <line x1="591" y1="288" x2="591" y2="324" class="bond"/>
  <line x1="591" y1="324" x2="560" y2="342" class="bond"/>
  <line x1="560" y1="342" x2="529" y2="324" class="bond2"/>
  <line x1="529" y1="324" x2="529" y2="288" class="bond2"/>
  <line x1="529" y1="288" x2="560" y2="270" class="bond"/>
  <line x1="558" y1="270" x2="529" y2="286" class="bond2"/>
  <line x1="591" y1="288" x2="612" y2="279" class="bond" stroke-width="1.2"/>
  <text x="616" y="283" class="atom" fill="#1155aa">Nu</text>
  <text x="560" y="268" class="atom" text-anchor="middle" fill="#cc3333">N</text>
  <text x="599" y="293" class="atom">C2</text>
  <text x="599" y="329" class="atom">C3</text>
  <text x="560" y="354" class="atom" text-anchor="middle">C4</text>
  <text x="521" y="329" class="atom" text-anchor="end">C5</text>
  <!-- ⊖ at C5 -->
  <text x="517" y="329" class="charge-neg">⊖</text>
  <text x="521" y="293" class="atom" text-anchor="end">C6</text>

  <!-- Stable label for nucleophilic -->
  <rect x="640" y="265" width="240" height="78" rx="5" fill="rgba(50,100,220,0.1)" stroke="#6688cc" stroke-width="1"/>
  <text x="760" y="283" font-size="11" text-anchor="middle" fill="#1155aa" font-weight="bold">α 进攻优点：</text>
  <text x="760" y="299" font-size="10" text-anchor="middle" fill="#1155aa">⊖ 可落在电负性大的 N 上</text>
  <text x="760" y="313" font-size="10" text-anchor="middle" fill="#1155aa">→ 负电荷被 N 稳定</text>
  <text x="760" y="327" font-size="10" text-anchor="middle" fill="#1155aa">→ Meisenheimer 络合物稳定</text>
  <text x="760" y="341" font-size="10" text-anchor="middle" fill="#1155aa">→ 亲核取代 α 位优先</text>

  <!-- Final footer -->
  <rect x="10" y="400" width="880" height="16" rx="3" fill="#f5f5f5" stroke="#ddd"/>
  <text x="450" y="412" font-size="10" text-anchor="middle" fill="#555" font-family="sans-serif">典型反应：Chichibabin 反应 Py + NaNH₂ → 2-氨基吡啶（亲核取代 α 位）</text>
</svg>
