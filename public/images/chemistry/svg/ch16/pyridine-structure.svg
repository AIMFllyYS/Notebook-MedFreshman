<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 350" width="650" height="350">
  <title>吡啶结构：N吸电子使环缺电子，对比苯的均匀电子云</title>
  <style>
    text { font-family: sans-serif; fill: currentColor; }
    .atom { font-size: 13px; font-weight: bold; }
    .label { font-size: 11px; }
    .note { font-size: 10px; fill: #555; }
    .title { font-size: 14px; font-weight: bold; }
    .bond { stroke: currentColor; stroke-width: 1.8; fill: none; }
    .bond2 { stroke: currentColor; stroke-width: 1.2; fill: none; }
    .cloud { fill: rgba(100,149,237,0.18); stroke: #4477cc; stroke-width: 1; }
    .cloud-low { fill: rgba(230,80,80,0.15); stroke: #cc3333; stroke-width: 1; }
    .arrow-e { stroke: #cc3333; stroke-width: 1.5; fill: none; marker-end: url(#arrowE); }
    .footer { font-size: 11px; fill: #444; }
  </style>
  <defs>
    <marker id="arrowE" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#cc3333"/>
    </marker>
  </defs>

  <rect width="650" height="350" fill="white" rx="8"/>

  <!-- ===== LEFT: BENZENE ===== -->
  <!-- Hexagon center (160, 150), r=58 -->
  <!-- Vertices: top(160,92), TR(210,121), BR(210,179), Bot(160,208), BL(110,179), TL(110,121) -->

  <!-- Uniform electron cloud -->
  <circle cx="160" cy="150" r="62" class="cloud"/>

  <!-- Benzene bonds -->
  <line x1="160" y1="92" x2="210" y2="121" class="bond"/>
  <line x1="210" y1="121" x2="210" y2="179" class="bond"/>
  <line x1="210" y1="179" x2="160" y2="208" class="bond"/>
  <line x1="160" y1="208" x2="110" y2="179" class="bond"/>
  <line x1="110" y1="179" x2="110" y2="121" class="bond"/>
  <line x1="110" y1="121" x2="160" y2="92" class="bond"/>
  <!-- Inner circle for aromatic -->
  <circle cx="160" cy="150" r="32" stroke="#4477cc" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>

  <!-- Atom labels (C only) -->
  <text x="160" y="85" class="atom" text-anchor="middle">C</text>
  <text x="218" y="127" class="atom">C</text>
  <text x="218" y="183" class="atom">C</text>
  <text x="160" y="220" class="atom" text-anchor="middle">C</text>
  <text x="94" y="183" class="atom" text-anchor="end">C</text>
  <text x="94" y="127" class="atom" text-anchor="end">C</text>

  <text x="160" y="240" class="title" text-anchor="middle">苯 (Benzene)</text>
  <text x="160" y="256" class="label" text-anchor="middle">均匀 π 电子云</text>
  <text x="160" y="270" class="label" text-anchor="middle">各碳电子密度相等</text>
  <text x="160" y="285" class="label" text-anchor="middle">标准亲电取代活性</text>

  <!-- Divider -->
  <line x1="325" y1="20" x2="325" y2="310" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== RIGHT: PYRIDINE ===== -->
  <!-- Hexagon center (490, 150) -->
  <!-- N at top(490,92), C2=(540,121), C3=(540,179), C4=(490,208), C5=(440,179), C6=(440,121) -->

  <!-- Depleted electron cloud -->
  <ellipse cx="490" cy="145" rx="62" ry="62" class="cloud-low"/>

  <!-- Pyridine bonds with alternating double -->
  <line x1="490" y1="92" x2="540" y2="121" class="bond"/>
  <line x1="487" y1="96" x2="537" y2="125" class="bond2"/>
  <line x1="540" y1="121" x2="540" y2="179" class="bond"/>
  <line x1="540" y1="179" x2="490" y2="208" class="bond"/>
  <line x1="537" y1="175" x2="487" y2="204" class="bond2"/>
  <line x1="490" y1="208" x2="440" y2="179" class="bond"/>
  <line x1="440" y1="179" x2="440" y2="121" class="bond"/>
  <line x1="443" y1="175" x2="443" y2="125" class="bond2"/>
  <line x1="440" y1="121" x2="490" y2="92" class="bond"/>
  <!-- Inner circle for aromatic -->
  <circle cx="490" cy="150" r="32" stroke="#cc6666" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>

  <!-- Atom labels Pyridine -->
  <text x="490" y="85" class="atom" text-anchor="middle" fill="#cc3333">N</text>
  <text x="549" y="127" class="atom">C</text>
  <text x="549" y="183" class="atom">C</text>
  <text x="490" y="220" class="atom" text-anchor="middle">C</text>
  <text x="424" y="183" class="atom" text-anchor="end">C</text>
  <text x="424" y="127" class="atom" text-anchor="end">C</text>

  <!-- Position labels -->
  <text x="490" y="71" class="note" text-anchor="middle" font-size="9" fill="#cc3333">1(N)</text>
  <text x="556" y="118" class="note" font-size="9">2(α)</text>
  <text x="556" y="186" class="note" font-size="9">3(β)</text>
  <text x="490" y="230" class="note" text-anchor="middle" font-size="9">4(γ)</text>
  <text x="416" y="186" class="note" text-anchor="end" font-size="9">5(β)</text>
  <text x="416" y="118" class="note" text-anchor="end" font-size="9">6(α)</text>

  <!-- Electron-pulling arrows toward N -->
  <path d="M 534,127 Q 512,107 495,95" class="arrow-e"/>
  <path d="M 446,127 Q 468,107 485,95" class="arrow-e"/>

  <!-- Depleted labels -->
  <text x="566" y="109" class="note" fill="#cc3333" font-size="10">缺电子</text>
  <text x="490" y="246" class="note" text-anchor="middle" fill="#cc3333" font-size="10">缺电子 (γ)</text>

  <!-- Pyridine labels -->
  <text x="490" y="262" class="title" text-anchor="middle">吡啶 (Pyridine)</text>
  <text x="490" y="278" class="label" text-anchor="middle">N 吸电子 → α/γ 位缺电子</text>
  <text x="490" y="293" class="label" text-anchor="middle" fill="#cc3333">缺电子环（比苯难亲电取代）</text>
  <text x="490" y="308" class="label" text-anchor="middle">N 孤对电子在 sp² 轨道，不参与共轭</text>

  <!-- Footer -->
  <rect x="10" y="320" width="630" height="24" rx="4" fill="#f5f5f5" stroke="#ddd"/>
  <text x="325" y="335" class="footer" text-anchor="middle">比苯难亲电取代（需剧烈条件，β 位）；易亲核取代（α 位，负电荷可落在 N 上）</text>
</svg>
