<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 200" width="460" height="200" aria-label="邻羟基苯甲醛分子内氢键五元环（沸点197°C）与对羟基苯甲醛分子间氢键链（沸点246°C）对比">
  <title>邻羟基苯甲醛与对羟基苯甲醛的氢键类型对比</title>
  <style>
    text { font-family: serif; font-size: 11px; fill: currentColor; }
    line, path { stroke: currentColor; }
  </style>

  <!-- ===== ortho-Hydroxybenzaldehyde (intramolecular H-bond) ===== -->
  <text x="10" y="15" font-weight="bold" font-size="12">邻羟基苯甲醛</text>
  <text x="10" y="27" font-size="10">分子内氢键 → 五元环</text>

  <!-- Benzene ring centered at (80, 105), r=35 -->
  <!-- Hexagon vertices: top(80,70), TR(110,87.5), BR(110,122.5), B(80,140), BL(50,122.5), TL(50,87.5) -->
  <line x1="80" y1="70" x2="110" y2="87.5" stroke-width="1.5" fill="none"/>
  <line x1="110" y1="87.5" x2="110" y2="122.5" stroke-width="1.5" fill="none"/>
  <line x1="110" y1="122.5" x2="80" y2="140" stroke-width="1.5" fill="none"/>
  <line x1="80" y1="140" x2="50" y2="122.5" stroke-width="1.5" fill="none"/>
  <line x1="50" y1="122.5" x2="50" y2="87.5" stroke-width="1.5" fill="none"/>
  <line x1="50" y1="87.5" x2="80" y2="70" stroke-width="1.5" fill="none"/>
  <!-- Alternating double bonds (inner offset) -->
  <line x1="83" y1="73" x2="107" y2="88" stroke-width="1.5" fill="none"/>
  <line x1="53" y1="90" x2="53" y2="121" stroke-width="1.5" fill="none"/>
  <line x1="83" y1="137" x2="107" y2="122" stroke-width="1.5" fill="none"/>

  <!-- CHO at top (C1 position): going up-right -->
  <line x1="80" y1="70" x2="80" y2="48" stroke-width="1.5" fill="none"/>
  <text x="74" y="45">C</text>
  <line x1="77" y1="38" x2="65" y2="28" stroke-width="1.5" fill="none"/>
  <line x1="80" y1="38" x2="68" y2="28" stroke-width="1.5" fill="none"/>
  <text x="58" y="26">O</text>
  <!-- H on CHO -->
  <line x1="82" y1="38" x2="93" y2="27" stroke-width="1.5" fill="none"/>
  <text x="94" y="25">H</text>

  <!-- OH at ortho position (C2 = TR, i.e. 110,87.5): going right -->
  <line x1="110" y1="87.5" x2="138" y2="75" stroke-width="1.5" fill="none"/>
  <text x="140" y="73">O</text>
  <line x1="152" y1="72" x2="163" y2="63" stroke-width="1.5" fill="none"/>
  <text x="164" y="61">H</text>

  <!-- Intramolecular H-bond: from H to O(CHO) dashed arc -->
  <!-- H at (163,61), O at (65,26) -->
  <path d="M158,62 Q125,35 72,34" stroke-width="1.2" stroke-dasharray="4,3" fill="none"/>
  <text x="95" y="22" font-size="10" opacity="0.8">分子内氢键</text>
  <text x="100" y="33" font-size="9" opacity="0.7">五元环</text>

  <text x="18" y="170" font-size="11">沸点 197°C（较低）</text>
  <text x="18" y="183" font-size="10" opacity="0.7">分子内氢键 → 无法形成分子间氢键</text>

  <!-- Divider -->
  <line x1="220" y1="10" x2="220" y2="195" stroke-width="0.5" stroke-dasharray="4,3" fill="none"/>

  <!-- ===== para-Hydroxybenzaldehyde (intermolecular H-bond) ===== -->
  <text x="232" y="15" font-weight="bold" font-size="12">对羟基苯甲醛</text>
  <text x="232" y="27" font-size="10">分子间氢键 → 链状缔合</text>

  <!-- Benzene ring centered at (310, 105) -->
  <line x1="310" y1="70" x2="340" y2="87.5" stroke-width="1.5" fill="none"/>
  <line x1="340" y1="87.5" x2="340" y2="122.5" stroke-width="1.5" fill="none"/>
  <line x1="340" y1="122.5" x2="310" y2="140" stroke-width="1.5" fill="none"/>
  <line x1="310" y1="140" x2="280" y2="122.5" stroke-width="1.5" fill="none"/>
  <line x1="280" y1="122.5" x2="280" y2="87.5" stroke-width="1.5" fill="none"/>
  <line x1="280" y1="87.5" x2="310" y2="70" stroke-width="1.5" fill="none"/>
  <!-- Inner double bonds -->
  <line x1="313" y1="73" x2="337" y2="88" stroke-width="1.5" fill="none"/>
  <line x1="283" y1="90" x2="283" y2="121" stroke-width="1.5" fill="none"/>
  <line x1="313" y1="137" x2="337" y2="122" stroke-width="1.5" fill="none"/>

  <!-- CHO at top (C1) -->
  <line x1="310" y1="70" x2="310" y2="48" stroke-width="1.5" fill="none"/>
  <text x="304" y="45">C</text>
  <line x1="307" y1="38" x2="295" y2="28" stroke-width="1.5" fill="none"/>
  <line x1="310" y1="38" x2="298" y2="28" stroke-width="1.5" fill="none"/>
  <text x="288" y="26">O</text>
  <line x1="312" y1="38" x2="323" y2="27" stroke-width="1.5" fill="none"/>
  <text x="324" y="25">H</text>

  <!-- OH at para position (C4 = bottom, 310, 140): going down -->
  <line x1="310" y1="140" x2="310" y2="162" stroke-width="1.5" fill="none"/>
  <text x="304" y="172">O</text>
  <line x1="316" y1="172" x2="326" y2="180" stroke-width="1.5" fill="none"/>
  <text x="327" y="183">H</text>

  <!-- Intermolecular H-bond shown as dashed line going right to next molecule's O=C -->
  <line x1="336" y1="180" x2="380" y2="160" stroke-width="1.2" stroke-dasharray="4,3" fill="none"/>
  <text x="380" y="175">O</text>
  <text x="354" y="170" font-size="9" opacity="0.8">分子间氢键</text>
  <text x="370" y="182" font-size="9" opacity="0.7">→ 更高沸点</text>

  <text x="242" y="170" font-size="11">沸点 246°C（较高）</text>
  <text x="242" y="183" font-size="10" opacity="0.7">分子间氢键 → 需更多能量断键</text>
</svg>
