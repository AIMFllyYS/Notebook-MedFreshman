<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 220" aria-label="重氮化反应机理：苯胺与NaNO2+HCl在0-5°C低温下生成重氮盐">
  <title>重氮化反应机理（苯胺→重氮盐）</title>
  <style>text { font-family: serif; fill: currentColor; } line, path, polygon { stroke: currentColor; }</style>
  <defs>
    <marker id="arr-diazo" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0.5 L6,3.5 L0,6.5" stroke="currentColor" stroke-width="1.2" fill="none"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="280" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="currentColor">重氮化反应机理</text>
  <text x="280" y="36" text-anchor="middle" font-size="11" fill="currentColor">条件：NaNO₂ + HCl，0–5 °C（低温）</text>

  <!-- Step 1: HNO2 + HCl → NO+ -->
  <text x="20" y="62" font-size="11" fill="currentColor">步骤 1：生成亲电试剂 NO⁺</text>
  <text x="20" y="80" font-size="12" fill="currentColor">HNO₂</text>
  <text x="70" y="80" font-size="12" fill="currentColor">+</text>
  <text x="82" y="80" font-size="12" fill="currentColor">HCl</text>
  <line x1="115" y1="76" x2="145" y2="76" stroke-width="1.5" fill="none" marker-end="url(#arr-diazo)"/>
  <text x="150" y="80" font-size="12" fill="currentColor">NO⁺</text>
  <text x="183" y="80" font-size="12" fill="currentColor">+</text>
  <text x="195" y="80" font-size="12" fill="currentColor">Cl⁻</text>
  <text x="215" y="80" font-size="12" fill="currentColor">+</text>
  <text x="227" y="80" font-size="12" fill="currentColor">H₂O</text>
  <text x="20" y="96" font-size="10" fill="currentColor" opacity="0.7">（硝酰阳离子，强亲电试剂）</text>

  <!-- Step 2: NO+ attacks ArNH2 -->
  <text x="20" y="118" font-size="11" fill="currentColor">步骤 2：NO⁺ 亲电进攻苯胺 N</text>

  <!-- Aniline -->
  <text x="20" y="138" font-size="12" fill="currentColor">Ar—NH₂</text>
  <text x="20" y="153" font-size="11" fill="currentColor">（苯胺）</text>
  <text x="80" y="138" font-size="12" fill="currentColor">+</text>
  <text x="94" y="138" font-size="12" fill="currentColor">NO⁺</text>
  <line x1="125" y1="134" x2="155" y2="134" stroke-width="1.5" fill="none" marker-end="url(#arr-diazo)"/>

  <!-- Intermediate -->
  <text x="160" y="138" font-size="12" fill="currentColor">Ar—NH—N=O</text>
  <text x="160" y="153" font-size="11" fill="currentColor">（N-亚硝基中间体）</text>

  <!-- Arrow to diazonium -->
  <line x1="280" y1="134" x2="308" y2="134" stroke-width="1.5" fill="none" marker-end="url(#arr-diazo)"/>
  <text x="282" y="126" font-size="10" fill="currentColor">−H₂O</text>

  <!-- Diazonium salt -->
  <text x="315" y="138" font-size="12" fill="currentColor">Ar—N≡N⁺</text>
  <text x="380" y="138" font-size="12" fill="currentColor">Cl⁻</text>
  <text x="315" y="153" font-size="11" fill="currentColor">（重氮盐）</text>

  <!-- Structure of diazonium (linear sp) -->
  <text x="20" y="180" font-size="11" font-weight="bold" fill="currentColor">重氮盐结构：</text>
  <text x="100" y="180" font-size="12" fill="currentColor">Ar—N⁺≡N</text>
  <text x="155" y="175" font-size="11" fill="currentColor">（线性，sp 杂化，键角 180°）</text>

  <!-- Temperature warning -->
  <rect x="20" y="193" width="520" height="22" fill="none" stroke="currentColor" stroke-width="0.8" rx="3" stroke-dasharray="3,2"/>
  <text x="280" y="208" text-anchor="middle" font-size="11" fill="currentColor">⚠ 重氮盐不稳定，需 0–5 °C 低温保存；升温分解放 N₂</text>
</svg>
