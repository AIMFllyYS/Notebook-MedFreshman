<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 350" role="img" aria-labelledby="title desc">
  <title id="title">毛细管中液面上升</title>
  <desc id="desc">玻璃毛细管插入水中，浸润液体在管中上升，液面凹陷。</desc>
  <rect x="0" y="0" width="350" height="350" rx="18" fill="none"/>
  <rect x="120" y="80" width="8" height="220" fill="currentColor" opacity="0.3"/>
  <rect x="222" y="80" width="8" height="220" fill="currentColor" opacity="0.3"/>
  <rect x="50" y="250" width="250" height="60" fill="#a0d8ef" opacity="0.3"/>
  <line x1="50" y1="250" x2="300" y2="250" stroke="currentColor" stroke-width="1.5"/>
  <path d="M 128 160 Q 150 175 175 160 Q 200 145 222 160" fill="#a0d8ef" opacity="0.5" stroke="var(--accent, #2563eb)" stroke-width="2"/>
  <line x1="128" y1="160" x2="128" y2="250" stroke="var(--accent, #2563eb)" stroke-width="1.5"/>
  <line x1="222" y1="160" x2="222" y2="250" stroke="var(--accent, #2563eb)" stroke-width="1.5"/>
  <line x1="100" y1="160" x2="100" y2="250" stroke="currentColor" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="90" y1="160" x2="90" y2="250" stroke="currentColor" stroke-width="1.5"/>
  <line x1="85" y1="160" x2="95" y2="160" stroke="currentColor" stroke-width="1.5"/>
  <line x1="85" y1="250" x2="95" y2="250" stroke="currentColor" stroke-width="1.5"/>
  <g fill="currentColor" font-family="system-ui, sans-serif" font-size="14">
    <text x="60" y="200">h</text>
    <text x="155" y="130">凹液面</text>
    <text x="150" y="200">管内</text>
    <text x="50" y="270">容器中液体</text>
    <text x="150" y="330">h = 2αcosθ / (ρgr)</text>
  </g>
</svg>
