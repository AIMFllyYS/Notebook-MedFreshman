<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" role="img" aria-labelledby="title desc">
<title id="title">皮托管测速示意图</title>
<desc id="desc">迎流口形成驻点，总压与静压的差转化为速度。</desc>

<defs>
  <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#f8fafc"/>

<line x1="40" y1="96" x2="410" y2="96" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="40" y1="126" x2="410" y2="126" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
<path d="M250 72 L250 126 L310 126" fill="none" stroke="#111827" stroke-width="10" stroke-linecap="round"/>
<path d="M310 126 L310 198 L360 198 L360 126" fill="none" stroke="#111827" stroke-width="8"/>
<rect x="306" y="170" width="58" height="28" fill="#93c5fd"/>
<line x1="310" y1="170" x2="360" y2="150" stroke="#93c5fd" stroke-width="8"/>
<text x="276" y="116" font-size="17">驻点</text>
<text x="330" y="174" font-size="17">Δh</text>
<text x="70" y="72" font-size="17" fill="#2563eb">气流速度 v</text>
</svg>

