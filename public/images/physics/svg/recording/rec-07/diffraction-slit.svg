<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" role="img" aria-labelledby="title desc">
  <title id="title">波的衍射</title>
  <desc id="desc">平面波通过狭缝后发生衍射，波长与缝宽可比时衍射明显。</desc>
  <rect x="0" y="0" width="500" height="300" rx="18" fill="none"/>
  <rect x="150" y="30" width="10" height="100" fill="currentColor" opacity="0.6"/>
  <rect x="150" y="170" width="10" height="100" fill="currentColor" opacity="0.6"/>
  <line x1="40" y1="80" x2="150" y2="80" stroke="var(--accent, #2563eb)" stroke-width="2"/>
  <line x1="40" y1="100" x2="150" y2="100" stroke="var(--accent, #2563eb)" stroke-width="2"/>
  <line x1="40" y1="120" x2="150" y2="120" stroke="var(--accent, #2563eb)" stroke-width="2"/>
  <line x1="40" y1="140" x2="150" y2="140" stroke="var(--accent, #2563eb)" stroke-width="2"/>
  <line x1="40" y1="160" x2="150" y2="160" stroke="var(--accent, #2563eb)" stroke-width="2"/>
  <line x1="40" y1="180" x2="150" y2="180" stroke="var(--accent, #2563eb)" stroke-width="2"/>
  <line x1="40" y1="200" x2="150" y2="200" stroke="var(--accent, #2563eb)" stroke-width="2"/>
  <line x1="40" y1="220" x2="150" y2="220" stroke="var(--accent, #2563eb)" stroke-width="2"/>
  <path d="M 160 130 Q 200 80 280 50" fill="none" stroke="var(--accent, #2563eb)" stroke-width="2" stroke-dasharray="6,3"/>
  <path d="M 160 130 Q 200 100 280 90" fill="none" stroke="var(--accent, #2563eb)" stroke-width="2" stroke-dasharray="6,3"/>
  <path d="M 160 130 Q 200 130 280 130" fill="none" stroke="var(--accent, #2563eb)" stroke-width="2"/>
  <path d="M 160 130 Q 200 160 280 170" fill="none" stroke="var(--accent, #2563eb)" stroke-width="2" stroke-dasharray="6,3"/>
  <path d="M 160 130 Q 200 200 280 210" fill="none" stroke="var(--accent, #2563eb)" stroke-width="2" stroke-dasharray="6,3"/>
  <path d="M 160 170 Q 200 220 280 250" fill="none" stroke="var(--accent, #2563eb)" stroke-width="2" stroke-dasharray="6,3"/>
  <g fill="currentColor" font-family="system-ui, sans-serif" font-size="14">
    <text x="20" y="135">入射波</text>
    <text x="130" y="25">障碍物</text>
    <text x="130" y="290">障碍物</text>
    <text x="165" y="135">缝宽 a</text>
    <text x="290" y="80">衍射波</text>
  </g>
</svg>
