<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" role="img" aria-labelledby="title desc">
  <title id="title">t=0 时刻平面简谐波波形图</title>
  <desc id="desc">横轴为 x（cm），纵轴为 y（cm），波从左向右传播，波长 12 cm，振幅 0.04 m。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="600" height="300" rx="18" fill="none"/>
  <g fill="none" stroke="currentColor" stroke-width="2">
    <path d="M 50 200 H 560" marker-end="url(#arrow)"/>
    <path d="M 50 200 V 30" marker-end="url(#arrow)"/>
  </g>
  <g stroke="currentColor" stroke-width="1" opacity="0.15">
    <path d="M 50 120 H 560"/>
    <path d="M 50 160 H 560"/>
    <path d="M 170 30 V 200"/>
    <path d="M 290 30 V 200"/>
    <path d="M 410 30 V 200"/>
    <path d="M 530 30 V 200"/>
  </g>
  <path d="M 50 200 Q 80 200 110 160 Q 140 120 170 120 Q 200 120 230 160 Q 260 200 290 200 Q 320 200 350 160 Q 380 120 410 120 Q 440 120 470 160 Q 500 200 530 200 Q 545 200 560 195" fill="none" stroke="var(--accent, #2563eb)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="50" cy="200" r="4" fill="var(--accent, #2563eb)"/>
  <circle cx="170" cy="120" r="3" fill="var(--accent, #2563eb)"/>
  <circle cx="290" cy="200" r="3" fill="var(--accent, #2563eb)"/>
  <circle cx="410" cy="120" r="3" fill="var(--accent, #2563eb)"/>
  <g fill="currentColor" font-family="system-ui, sans-serif" font-size="16">
    <text x="562" y="218">x (cm)</text>
    <text x="30" y="35">y (cm)</text>
    <text x="160" y="110">A</text>
    <text x="45" y="218">O</text>
    <text x="105" y="225">2</text>
    <text x="260" y="225">8</text>
    <text x="380" y="225">14</text>
    <text x="215" y="245">λ = 12 cm</text>
    <text x="30" y="165">A/2</text>
  </g>
  <line x1="170" y1="120" x2="170" y2="200" stroke="var(--accent, #2563eb)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="410" y1="120" x2="410" y2="200" stroke="var(--accent, #2563eb)" stroke-width="1" stroke-dasharray="4,3"/>
</svg>
