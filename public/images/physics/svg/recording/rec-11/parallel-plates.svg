<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 250" role="img" aria-labelledby="title desc">
  <title id="title">平行板电容器电场</title>
  <desc id="desc">一正一负平行板，中间均匀电场，外侧为零。</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="500" height="250" rx="18" fill="none"/>
  <rect x="150" y="40" width="12" height="170" fill="var(--accent, #2563eb)" opacity="0.3" stroke="var(--accent, #2563eb)" stroke-width="2"/>
  <rect x="280" y="40" width="12" height="170" fill="#e11d48" opacity="0.3" stroke="#e11d48" stroke-width="2"/>
  <line x1="180" y1="80" x2="260" y2="80" stroke="currentColor" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="180" y1="120" x2="260" y2="120" stroke="currentColor" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="180" y1="160" x2="260" y2="160" stroke="currentColor" stroke-width="2" marker-end="url(#arr)"/>
  <g fill="currentColor" font-family="system-ui, sans-serif" font-size="14">
    <text x="145" y="35">+σ</text>
    <text x="285" y="35">-σ</text>
    <text x="210" y="75">E</text>
    <text x="210" y="230">E = σ/ε₀</text>
    <text x="70" y="125">外侧 E = 0</text>
    <text x="350" y="125">外侧 E = 0</text>
    <text x="195" y="120">均匀场</text>
  </g>
</svg>
