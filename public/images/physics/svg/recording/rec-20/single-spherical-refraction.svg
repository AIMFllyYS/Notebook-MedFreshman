<svg xmlns="http://www.w3.org/2000/svg" width="500" height="250" viewBox="0 0 500 250">
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
  </defs>
  <rect width="500" height="250" fill="#fafafa"/>
  <!-- Optical axis -->
  <line x1="30" y1="125" x2="470" y2="125" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Spherical surface -->
  <path d="M 250,25 Q 280,125 250,225" fill="none" stroke="#333" stroke-width="2.5"/>
  <!-- Media labels -->
  <rect x="60" y="30" width="100" height="30" rx="5" fill="#E3F2FD" stroke="#2196F3"/>
  <text x="75" y="50" font-size="13" fill="#1565C0">液体 n₁=1.3</text>
  <rect x="310" y="30" width="100" height="30" rx="5" fill="#FFF3E0" stroke="#FF9800"/>
  <text x="325" y="50" font-size="13" fill="#E65100">玻璃 n₂=1.5</text>
  <!-- Object O -->
  <line x1="100" y1="125" x2="100" y2="65" stroke="#4CAF50" stroke-width="2"/>
  <polygon points="100,65 96,75 104,75" fill="#4CAF50"/>
  <text x="90" y="55" font-size="14" fill="#4CAF50" font-weight="bold">O</text>
  <!-- Object distance u -->
  <line x1="100" y1="200" x2="250" y2="200" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="155" y="215" font-size="13" fill="#4CAF50">u=39 cm</text>
  <!-- Virtual image I -->
  <line x1="180" y1="125" x2="180" y2="80" stroke="#F44336" stroke-width="2" stroke-dasharray="4,2"/>
  <polygon points="180,80 176,90 184,90" fill="#F44336"/>
  <text x="170" y="72" font-size="14" fill="#F44336" font-weight="bold">I (虚像)</text>
  <!-- Image distance v -->
  <line x1="180" y1="225" x2="250" y2="225" stroke="#F44336" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="190" y="240" font-size="13" fill="#F44336">|v|=30 cm</text>
  <!-- Vertex P -->
  <circle cx="250" cy="125" r="3" fill="#333"/>
  <text x="245" y="145" font-size="13" font-weight="bold">P</text>
  <!-- Center C -->
  <circle cx="238" cy="125" r="3" fill="#9C27B0"/>
  <text x="225" y="115" font-size="12" fill="#9C27B0">C</text>
  <!-- R label -->
  <line x1="238" y1="125" x2="250" y2="125" stroke="#9C27B0" stroke-width="1"/>
  <text x="240" y="108" font-size="12" fill="#9C27B0">R</text>
</svg>
