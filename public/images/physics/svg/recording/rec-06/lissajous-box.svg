<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" role="img" aria-labelledby="title desc">
<title id="title">李萨如图切点法</title>
<desc id="desc">通过外接方框水平边和竖直边切点数判断两个方向频率比。</desc>

<defs>
  <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#f8fafc"/>

<rect x="80" y="42" width="260" height="176" fill="none" stroke="#64748b" stroke-width="3"/>
<path d="M80 130 C120 42 180 42 210 130 C240 218 300 218 340 130 C300 42 240 42 210 130 C180 218 120 218 80 130" fill="none" stroke="#2563eb" stroke-width="4"/>
<circle cx="145" cy="42" r="5" fill="#dc2626"/><circle cx="275" cy="42" r="5" fill="#dc2626"/>
<circle cx="145" cy="218" r="5" fill="#dc2626"/><circle cx="275" cy="218" r="5" fill="#dc2626"/>
<circle cx="80" cy="130" r="5" fill="#0f766e"/><circle cx="340" cy="130" r="5" fill="#0f766e"/>
<text x="80" y="238" font-size="17">水平边 4 个切点，竖直边 2 个切点</text>
</svg>

