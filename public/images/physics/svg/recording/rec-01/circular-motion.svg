<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" role="img" aria-labelledby="title desc">
<title id="title">匀速圆周运动位矢速度加速度</title>
<desc id="desc">位矢指向质点，速度沿切线，加速度指向圆心。</desc>

<defs>
  <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#f8fafc"/>

<circle cx="210" cy="130" r="86" fill="none" stroke="#94a3b8" stroke-width="3"/>
<circle cx="210" cy="130" r="4" fill="#111827"/>
<circle cx="283" cy="84" r="6" fill="#dc2626"/>
<line x1="210" y1="130" x2="283" y2="84" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="283" y1="84" x2="329" y2="157" stroke="#0f766e" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="283" y1="84" x2="226" y2="120" stroke="#ea580c" stroke-width="4" marker-end="url(#arrow)"/>
<text x="242" y="101" font-size="18" fill="#2563eb">r⃗</text>
<text x="330" y="168" font-size="18" fill="#0f766e">v⃗</text>
<text x="221" y="80" font-size="18" fill="#ea580c">a⃗=-ω²r⃗</text>
</svg>

