<svg xmlns="http://www.w3.org/2000/svg" viewBox="-150 -150 300 300" width="400" height="400">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
  </defs>
  <!-- Current element -->
  <line x1="-40" y1="0" x2="40" y2="0" stroke="#e74c3c" stroke-width="4" marker-end="url(#arrowhead)"/>
  <text x="50" y="5" font-size="14" fill="#e74c3c">$I\,d\vec{l}$</text>
  <!-- 8 points -->
  <!-- Point 1 (on wire, right) -->
  <circle cx="80" cy="0" r="5" fill="#333"/>
  <text x="88" y="5" font-size="12" fill="#333">1 (B=0)</text>
  <!-- Point 2 (upper right) -->
  <circle cx="57" cy="-57" r="5" fill="#3498db"/>
  <text x="65" y="-60" font-size="12" fill="#3498db">2 (×)</text>
  <!-- Point 3 (top) -->
  <circle cx="0" cy="-80" r="5" fill="#e74c3c"/>
  <text x="8" y="-85" font-size="12" fill="#e74c3c">3 (×, max)</text>
  <!-- Point 4 (upper left) -->
  <circle cx="-57" cy="-57" r="5" fill="#3498db"/>
  <text x="-95" y="-60" font-size="12" fill="#3498db">4 (×)</text>
  <!-- Point 5 (on wire, left) -->
  <circle cx="-80" cy="0" r="5" fill="#333"/>
  <text x="-130" y="5" font-size="12" fill="#333">5 (B=0)</text>
  <!-- Point 6 (lower left) -->
  <circle cx="-57" cy="57" r="5" fill="#2ecc71"/>
  <text x="-95" y="65" font-size="12" fill="#2ecc71">6 (⊙)</text>
  <!-- Point 7 (bottom) -->
  <circle cx="0" cy="80" r="5" fill="#e74c3c"/>
  <text x="8" y="95" font-size="12" fill="#e74c3c">7 (⊙, max)</text>
  <!-- Point 8 (lower right) -->
  <circle cx="57" cy="57" r="5" fill="#2ecc71"/>
  <text x="65" y="65" font-size="12" fill="#2ecc71">8 (⊙)</text>
  <!-- Labels for × and ⊙ -->
  <text x="-140" y="140" font-size="11" fill="#666">× 表示磁场向里</text>
  <text x="-140" y="155" font-size="11" fill="#666">⊙ 表示磁场向外</text>
</svg>
