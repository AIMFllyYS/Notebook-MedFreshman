<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 260" role="img" aria-labelledby="title desc">
<title id="title">简谐振动旋转矢量法</title>
<desc id="desc">匀速旋转矢量在 x 轴上的投影为简谐振动。</desc>

<defs>
  <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#2563eb"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="#f8fafc"/>

<circle cx="160" cy="130" r="80" fill="none" stroke="#94a3b8" stroke-width="3"/>
<line x1="60" y1="130" x2="260" y2="130" stroke="#111827" stroke-width="2"/>
<line x1="160" y1="210" x2="160" y2="50" stroke="#111827" stroke-width="2"/>
<line x1="160" y1="130" x2="110" y2="68" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="110" y1="68" x2="110" y2="130" stroke="#dc2626" stroke-dasharray="6 6" stroke-width="3"/>
<circle cx="110" cy="130" r="5" fill="#dc2626"/>
<text x="102" y="151" font-size="17">x</text>
<text x="125" y="78" font-size="17" fill="#2563eb">A</text>
<path d="M280 130 C310 65 350 65 380 130 C405 184 430 184 452 130" fill="none" stroke="#0f766e" stroke-width="4"/>
<text x="306" y="70" font-size="17" fill="#0f766e">x=Acos(ωt+φ)</text>
</svg>

