<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" width="560" height="320" aria-label="单缝夫琅禾费衍射装置示意" role="img">
  <title>单缝夫琅禾费衍射装置示意</title>
  <defs>
    <marker id="sd-arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 Z" fill="var(--accent,#2563eb)"/>
    </marker>
    <marker id="sd-arr2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 Z" fill="var(--ink,#1a1a1a)" opacity="0.5"/>
    </marker>
  </defs>

  <!-- Incident parallel waves (from left) -->
  <line x1="25" y1="110" x2="140" y2="110" stroke="var(--accent,#2563eb)" stroke-width="1.6" marker-end="url(#sd-arr)"/>
  <line x1="25" y1="135" x2="140" y2="135" stroke="var(--accent,#2563eb)" stroke-width="1.6" marker-end="url(#sd-arr)"/>
  <line x1="25" y1="160" x2="140" y2="160" stroke="var(--accent,#2563eb)" stroke-width="1.6" marker-end="url(#sd-arr)"/>
  <line x1="25" y1="185" x2="140" y2="185" stroke="var(--accent,#2563eb)" stroke-width="1.6" marker-end="url(#sd-arr)"/>
  <line x1="25" y1="210" x2="140" y2="210" stroke="var(--accent,#2563eb)" stroke-width="1.6" marker-end="url(#sd-arr)"/>

  <!-- Barrier (slit) -->
  <rect x="150" y="40" width="14" height="110" fill="var(--ink,#1a1a1a)" rx="1"/>
  <!-- Slit gap: y=150..210 -->
  <rect x="150" y="220" width="14" height="100" fill="var(--ink,#1a1a1a)" rx="1"/>

  <!-- Slit width label 'a' -->
  <line x1="168" y1="150" x2="168" y2="220" stroke="var(--ink,#1a1a1a)" stroke-width="1" opacity="0.65"/>
  <line x1="165" y1="150" x2="171" y2="150" stroke="var(--ink,#1a1a1a)" stroke-width="1" opacity="0.65"/>
  <line x1="165" y1="220" x2="171" y2="220" stroke="var(--ink,#1a1a1a)" stroke-width="1" opacity="0.65"/>
  <text x="174" y="190" font-size="13" fill="var(--ink,#1a1a1a)" font-style="italic" font-family="serif">a</text>

  <!-- Diffracted waves spreading from slit — Huygens wavelet arcs -->
  <!-- Central direction: straight through -->
  <line x1="157" y1="185" x2="320" y2="185"
        stroke="var(--accent,#2563eb)" stroke-width="1.5" marker-end="url(#sd-arr)" opacity="0.85"/>

  <!-- Diffracted upward rays -->
  <line x1="157" y1="170" x2="310" y2="105"
        stroke="var(--accent,#2563eb)" stroke-width="1.3" marker-end="url(#sd-arr)" opacity="0.65"/>
  <line x1="157" y1="165" x2="305" y2="60"
        stroke="var(--accent,#2563eb)" stroke-width="1" marker-end="url(#sd-arr)" opacity="0.4"/>

  <!-- Diffracted downward rays -->
  <line x1="157" y1="200" x2="310" y2="265"
        stroke="var(--accent,#2563eb)" stroke-width="1.3" marker-end="url(#sd-arr)" opacity="0.65"/>
  <line x1="157" y1="205" x2="305" y2="310"
        stroke="var(--accent,#2563eb)" stroke-width="1" marker-end="url(#sd-arr)" opacity="0.4"/>

  <!-- Arc indicating wavefront spreading -->
  <path d="M165,150 Q220,120 220,185 Q220,250 165,220"
        fill="none" stroke="var(--accent,#2563eb)" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Lens -->
  <path d="M330,80 Q358,185 330,290 Q302,185 330,80 Z"
        fill="var(--accent,#2563eb)" fill-opacity="0.08"
        stroke="var(--accent,#2563eb)" stroke-width="1.8"/>

  <!-- Screen -->
  <rect x="440" y="40" width="12" height="280" fill="var(--ink,#1a1a1a)" rx="1" opacity="0.12"/>
  <rect x="440" y="40" width="12" height="280" fill="none" stroke="var(--ink,#1a1a1a)" stroke-width="1.5" rx="1"/>

  <!-- Diffraction pattern on screen -->
  <!-- Central maximum (wide bright band) -->
  <rect x="441" y="130" width="10" height="110" fill="var(--accent,#2563eb)" opacity="0.85" rx="1"/>
  <!-- First order dark: just above/below central -->
  <rect x="441" y="115" width="10" height="15" fill="#f0f0f0" opacity="0.9"/>
  <rect x="441" y="240" width="10" height="15" fill="#f0f0f0" opacity="0.9"/>
  <!-- First order maxima (narrower, dimmer) -->
  <rect x="441" y="90" width="10" height="25" fill="var(--accent,#2563eb)" opacity="0.35" rx="1"/>
  <rect x="441" y="255" width="10" height="25" fill="var(--accent,#2563eb)" opacity="0.35" rx="1"/>
  <!-- Second dark -->
  <rect x="441" y="75" width="10" height="15" fill="#f0f0f0" opacity="0.9"/>
  <rect x="441" y="280" width="10" height="15" fill="#f0f0f0" opacity="0.9"/>
  <!-- Second order maxima (faint) -->
  <rect x="441" y="55" width="10" height="20" fill="var(--accent,#2563eb)" opacity="0.15" rx="1"/>
  <rect x="441" y="295" width="10" height="20" fill="var(--accent,#2563eb)" opacity="0.15" rx="1"/>

  <!-- Central max label -->
  <text x="455" y="189" font-size="10" fill="var(--ink,#1a1a1a)" opacity="0.75" font-family="sans-serif">中央明纹</text>

  <!-- Central width annotation -->
  <line x1="454" y1="130" x2="454" y2="240" stroke="var(--ink,#1a1a1a)" stroke-width="1" opacity="0.45"/>
  <line x1="451" y1="130" x2="457" y2="130" stroke="var(--ink,#1a1a1a)" stroke-width="1" opacity="0.45"/>
  <line x1="451" y1="240" x2="457" y2="240" stroke="var(--ink,#1a1a1a)" stroke-width="1" opacity="0.45"/>
  <text x="458" y="175" font-size="9.5" fill="var(--ink,#1a1a1a)" opacity="0.6" font-family="serif" font-style="italic">2f λ/a</text>

  <!-- θ angle for first dark fringe -->
  <path d="M157,185 Q200,185 192,158" fill="none" stroke="var(--ink,#1a1a1a)" stroke-width="1" opacity="0.5"/>
  <text x="200" y="172" font-size="11" fill="var(--ink,#1a1a1a)" font-style="italic" font-family="serif">θ</text>

  <!-- Condition label -->
  <text x="24" y="305" font-size="11" fill="var(--ink,#1a1a1a)" opacity="0.6" font-family="serif" font-style="italic">
    暗纹: a sinθ = kλ
  </text>

  <!-- Screen label -->
  <text x="420" y="33" font-size="11" fill="var(--ink,#1a1a1a)" opacity="0.7" font-family="sans-serif">焦平面</text>
</svg>
