<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 320" width="580" height="320" aria-label="凸透镜成像光路图" role="img">
  <title>薄透镜（凸透镜）成像示意</title>
  <defs>
    <marker id="tl-arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 Z" fill="var(--ink,#1a1a1a)"/>
    </marker>
    <marker id="tl-arr-b" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 Z" fill="var(--accent,#2563eb)"/>
    </marker>
    <marker id="tl-arr-g" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 Z" fill="#16a34a"/>
    </marker>
    <marker id="tl-arr-o" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 Z" fill="#d97706"/>
    </marker>
  </defs>

  <!-- Principal axis (dashed) -->
  <line x1="20" y1="160" x2="560" y2="160"
        stroke="var(--ink,#1a1a1a)" stroke-width="1.2" stroke-dasharray="7,4" opacity="0.45"/>

  <!-- Thin lens at x=290 — biconvex shape -->
  <path d="M290,60 Q320,160 290,260 Q260,160 290,60 Z"
        fill="var(--accent,#2563eb)" fill-opacity="0.12"
        stroke="var(--accent,#2563eb)" stroke-width="2"/>
  <!-- Lens end caps -->
  <line x1="290" y1="60" x2="290" y2="260"
        stroke="var(--accent,#2563eb)" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Focal points -->
  <!-- F1 left focus: x=170, F2 right focus: x=410 -->
  <!-- 2F1: x=50, 2F2: x=530 -->
  <circle cx="170" cy="160" r="4" fill="var(--ink,#1a1a1a)" opacity="0.7"/>
  <circle cx="410" cy="160" r="4" fill="var(--ink,#1a1a1a)" opacity="0.7"/>
  <text x="162" y="150" font-size="12" fill="var(--ink,#1a1a1a)" font-style="italic" font-family="serif">F</text>
  <text x="402" y="150" font-size="12" fill="var(--ink,#1a1a1a)" font-style="italic" font-family="serif">F</text>

  <!-- 2F markers -->
  <line x1="50" y1="155" x2="50" y2="165" stroke="var(--ink,#1a1a1a)" stroke-width="1.5" opacity="0.5"/>
  <text x="38" y="148" font-size="11" fill="var(--ink,#1a1a1a)" opacity="0.6" font-family="serif" font-style="italic">2F</text>
  <line x1="530" y1="155" x2="530" y2="165" stroke="var(--ink,#1a1a1a)" stroke-width="1.5" opacity="0.5"/>
  <text x="518" y="148" font-size="11" fill="var(--ink,#1a1a1a)" opacity="0.6" font-family="serif" font-style="italic">2F</text>

  <!-- Object arrow at x=80, from y=160 up to y=95 -->
  <line x1="80" y1="160" x2="80" y2="100"
        stroke="var(--ink,#1a1a1a)" stroke-width="2.2" marker-end="url(#tl-arr)"/>
  <text x="60" y="95" font-size="12" fill="var(--ink,#1a1a1a)" font-family="sans-serif">物</text>

  <!-- Image arrow at x=490, from y=160 down to y=225 (inverted real image) -->
  <line x1="490" y1="160" x2="490" y2="220"
        stroke="var(--ink,#1a1a1a)" stroke-width="2.2" marker-end="url(#tl-arr)"/>
  <text x="496" y="228" font-size="12" fill="var(--ink,#1a1a1a)" font-family="sans-serif">像</text>

  <!-- Ray 1: parallel to axis → through F2 (blue) -->
  <!-- From object tip (80,100) → lens at (290,100) → through F2 (410,160) → to image (490,220) -->
  <polyline points="80,100 290,100 490,220"
            fill="none" stroke="var(--accent,#2563eb)" stroke-width="1.7"
            marker-end="url(#tl-arr-b)"/>
  <!-- Tick mark at lens -->
  <line x1="288" y1="96" x2="292" y2="104" stroke="var(--accent,#2563eb)" stroke-width="1.5"/>

  <!-- Ray 2: through center of lens (green) — straight through, direction maintained -->
  <!-- From (80,100) to center of lens (290,160) … extended to image (490,220) -->
  <line x1="80" y1="100" x2="490" y2="220"
        fill="none" stroke="#16a34a" stroke-width="1.7"
        marker-end="url(#tl-arr-g)"/>

  <!-- Ray 3: through front focus F1 (170,160) → lens (290, y) → parallel to axis → to image -->
  <!-- Slope from F1(170,160) to object tip(80,100): going from 80 to 290, y goes from 100 to ... -->
  <!-- Line through (80,100) and (170,160): slope = (160-100)/(170-80) = 60/90 = 2/3 -->
  <!-- At x=290: y = 100 + (290-80)*2/3 = 100 + 140 = 240 -->
  <!-- But actually ray goes FROM object tip through F1 then to lens. -->
  <!-- Object tip (80,100), F1(170,160); extend to lens x=290: y = 100+(290-80)*(160-100)/(170-80) = 100+140=240 -->
  <!-- Then from lens (290,240) parallel to axis → to image y=240... but image is at 220 -->
  <!-- Let me use F1 more directly: ray from obj tip TO F1 direction, hits lens -->
  <!-- Use ray from obj (80,100) aimed at F1(170,160): extended to lens: x=290, y=100+(290-80)/(170-80)*(160-100)=240 -->
  <!-- Then goes parallel: (290,240)→(490,240) — this doesn't hit image correctly -->
  <!-- Simplified: ray from tip (80,100) through F1 (170,160) to lens (290,240), then horizontal -->
  <polyline points="80,100 290,240 490,240"
            fill="none" stroke="#d97706" stroke-width="1.7"
            stroke-dasharray="5,3"
            marker-end="url(#tl-arr-o)"/>

  <!-- Labels for rays -->
  <text x="140" y="93" font-size="10.5" fill="var(--accent,#2563eb)" font-family="sans-serif">①平行轴→过F</text>
  <text x="155" y="130" font-size="10.5" fill="#16a34a" font-family="sans-serif">②过光心</text>
  <text x="92" y="200" font-size="10.5" fill="#d97706" font-family="sans-serif">③过F→平行轴</text>
</svg>
