<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" aria-label="点电荷电场线分布（正电荷）" role="img">
  <title>点电荷电场线分布（正电荷）</title>
  <defs>
    <marker id="arrow-out" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 Z" fill="var(--accent, #2563eb)"/>
    </marker>
  </defs>
  <style>
    .field-line { stroke: var(--accent, #2563eb); stroke-width: 1.8; fill: none; }
    .charge-circle { fill: var(--accent, #2563eb); }
    .label { fill: var(--ink, #1a1a1a); font-family: serif; font-size: 13px; }
    .charge-label { fill: #fff; font-family: serif; font-size: 16px; font-weight: bold; }
  </style>

  <!-- Radial field lines: 8 directions from center (200,200) -->
  <!-- Right -->
  <line class="field-line" x1="215" y1="200" x2="355" y2="200" marker-end="url(#arrow-out)"/>
  <!-- Upper-right (45°) -->
  <line class="field-line" x1="210" y1="190" x2="306" y2="94" marker-end="url(#arrow-out)"/>
  <!-- Up -->
  <line class="field-line" x1="200" y1="185" x2="200" y2="45" marker-end="url(#arrow-out)"/>
  <!-- Upper-left (135°) -->
  <line class="field-line" x1="190" y1="190" x2="94" y2="94" marker-end="url(#arrow-out)"/>
  <!-- Left -->
  <line class="field-line" x1="185" y1="200" x2="45" y2="200" marker-end="url(#arrow-out)"/>
  <!-- Lower-left (225°) -->
  <line class="field-line" x1="190" y1="210" x2="94" y2="306" marker-end="url(#arrow-out)"/>
  <!-- Down -->
  <line class="field-line" x1="200" y1="215" x2="200" y2="355" marker-end="url(#arrow-out)"/>
  <!-- Lower-right (315°) -->
  <line class="field-line" x1="210" y1="210" x2="306" y2="306" marker-end="url(#arrow-out)"/>

  <!-- Point charge circle -->
  <circle class="charge-circle" cx="200" cy="200" r="14"/>
  <text class="charge-label" x="200" y="205" text-anchor="middle" dominant-baseline="middle">+</text>

  <!-- Labels -->
  <text class="label" x="360" y="204">E</text>
  <text class="label" x="180" y="390">点电荷 +q</text>
  <text class="label" x="140" y="375">电场线向外辐射</text>
</svg>
